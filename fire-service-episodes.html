<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fire Service Tales – Episodes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial, Helvetica, sans-serif;
  padding:20px;
}
h1{
  text-align:center;
  color:#f2c300;
  margin-bottom:25px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;
  max-width:1200px;
  margin:auto;
}
.card{
  background:#111;
  border-radius:12px;
  padding:12px;
  box-shadow:0 0 15px rgba(0,0,0,.6);
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover{
  transform: translateY(-6px);
  box-shadow:0 0 25px rgba(242,195,0,0.8);
}
video{
  width:100%;
  border-radius:8px;
  display:block;
  background:#000;
}
.title{
  text-align:center;
  margin-top:8px;
  font-weight:bold;
  font-size:14px;
}
.back{
  display:block;
  margin:35px auto 10px;
  width:230px;
  text-align:center;
  padding:14px;
  background:#f2c300;
  color:#000;
  font-weight:bold;
  border-radius:10px;
  text-decoration:none;
}
.back:hover{
  background:#e6b800;
}
</style>
</head>

<body>

<h1>🎬 Fire Service Tales – Story Episodes</h1>

<div class="grid">

  <div class="card">
    <video controls preload="metadata">
      <source src="EPISODES/episode1.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="title">Episode 1 – Fire Awareness</div>
  </div>

  <div class="card">
    <video controls preload="metadata">
      <source src="EPISODES/episode2.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="title">Episode 2 – Community Safety</div>
  </div>

  <div class="card">
    <video controls preload="metadata">
      <source src="EPISODES/episode3.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="title">Episode 3 – Emergency Response</div>
  </div>

  <div class="card">
    <video controls preload="metadata">
      <source src="EPISODES/episode4.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="title">Episode 4 – Fire Drill Practice</div>
  </div>

</div>

<a href="index.html" class="back">⬅ Back to Main Menu</a>

</body>
</html>
