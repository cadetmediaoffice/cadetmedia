<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customs Education – Ghana Revenue Authority</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function(){
  'use strict';
  var _cs=document.createElement('style');
  _cs.id='cmg-cloak';
  _cs.textContent='body{visibility:hidden!important;pointer-events:none!important;}';
  document.head.appendChild(_cs);
  if(window.history&&window.history.pushState) window.history.pushState({cmgGuard:true},'',window.location.href);
  window.CMG_GUARD={
    init:function(opts){
      var quizKey=opts.quizKey||'unknown';
      var repeatable=opts.repeatable===true;
      var HUB='cadetnationalquiz.html';
      if(localStorage.getItem('cmgActivated')!=='true'||!localStorage.getItem('cadetName')||!localStorage.getItem('cmgCode')){
        window.location.replace('activate.html');return;
      }
      if(localStorage.getItem(quizKey+'Completed')==='true'&&!repeatable){window.location.replace(HUB);return;}
      var n=localStorage.getItem('cadetName')||'',c=localStorage.getItem('cmgCode')||'',exp=n+'|'+c;
      var sk=localStorage.getItem('cmgSessionKey');
      if(!sk){localStorage.setItem('cmgSessionKey',exp);}
      else if(sk!==exp){window.location.replace('activate.html');return;}
      localStorage.setItem('cmgLastPage',window.location.pathname.split('/').pop());
      window.addEventListener('popstate',function(){
        if(localStorage.getItem(quizKey+'Completed')==='true'&&!repeatable){window.location.replace(HUB);}
        else if(!localStorage.getItem('cmgActivated')){window.location.replace('activate.html');}
        else if(window.history&&window.history.pushState) window.history.pushState({cmgGuard:true},'',window.location.href);
      });
      var el=document.getElementById('cmg-cloak');if(el)el.parentNode.removeChild(el);
      document.body.style.visibility='';document.body.style.pointerEvents='';
    },
    complete:function(quizKey,score,repeatable){
      localStorage.setItem(quizKey+'Score',String(score));
      if(!repeatable)localStorage.setItem(quizKey+'Completed','true');
      if(window.history&&window.history.replaceState) window.history.replaceState({cmgDone:true},'',window.location.href);
      window.location.replace('cadetnationalquiz.html');
    }
  };
})();
</script>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(160deg,#1a0e00 0%,#2d1800 25%,#4a2a00 55%,#6b3d00 80%,#8B5000 100%);
  animation:customsFlicker 5s ease-in-out infinite alternate;
  color:#fff;display:flex;flex-direction:column;align-items:center;padding:15px;margin:0;min-height:100vh;}
.logos{display:flex;flex-direction:column;align-items:center;width:100%;max-width:900px;margin-bottom:10px;}
.logos img:first-child{height:150px;margin-bottom:8px;}
.all-services-logo{width:700px;max-width:95%;display:block;margin:0 auto 10px auto;
  filter:drop-shadow(0 0 15px rgba(255,255,255,0.6)) drop-shadow(0 0 30px rgba(255,215,0,0.6));
  animation:fadeInLogo 2s ease-out,floatLogo 4s ease-in-out infinite;}
@keyframes fadeInLogo{from{opacity:0;transform:scale(0.7);}to{opacity:1;transform:scale(1);}}
@keyframes floatLogo{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
h1{font-size:20px;margin:5px 0 12px;text-align:center;}
.quiz-container{background:rgba(12,6,0,0.65);position:relative;z-index:1;padding:20px;border-radius:12px;
  width:100%;max-width:560px;display:flex;flex-direction:column;gap:12px;}
.timer-row{display:flex;align-items:center;gap:10px;font-size:14px;}
.timer-bar-container{flex:1;background:rgba(255,255,255,0.2);border-radius:12px;height:12px;}
.timer-bar{width:100%;height:100%;background:#00ff00;border-radius:12px;}
.progress-bar{width:100%;background:rgba(255,255,255,0.2);border-radius:12px;overflow:hidden;height:10px;}
.progress{height:100%;width:0%;background:#f2c300;transition:width 0.3s;}
.meta-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.q-counter{font-size:12px;opacity:0.65;}
.q-type{font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;letter-spacing:.5px;}
#question{font-size:15px;font-weight:bold;line-height:1.6;}
.answers{display:flex;flex-direction:column;gap:8px;}
.answers button{background:rgba(255,255,255,0.08);color:#fff;
  border:2px solid rgba(255,255,255,0.15);border-radius:10px;padding:11px 13px;
  font-size:13px;font-weight:bold;cursor:pointer;text-align:left;transition:all 0.2s;}
.answers button:hover:not(:disabled){background:rgba(255,255,255,0.2);transform:scale(1.02);}
.answers button.correct{background:rgba(0,200,80,0.5)!important;border-color:#00c850!important;}
.answers button.wrong{background:rgba(220,50,50,0.5)!important;border-color:#dc3232!important;}
.answers button:disabled{cursor:default;}
.result{text-align:center;display:none;padding:25px 15px;}

/* ══════════════════════════════════════
   CMG WELCOME SCREEN
══════════════════════════════════════ */
#cmgWelcome{
  position:fixed;inset:0;z-index:99999;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center, #3d2000 0%, #0f0700 100%);
  overflow:hidden;
}
/* animated star field */
#cmgWelcome .stars{
  position:absolute;inset:0;pointer-events:none;overflow:hidden;
}
#cmgWelcome .star{
  position:absolute;border-radius:50%;background:#fff;
  animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}

/* floating particles */
#cmgWelcome .particle{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:floatUp var(--pd,6s) ease-in-out infinite var(--pdelay,0s);
  opacity:0;
}
@keyframes floatUp{
  0%{transform:translateY(0) scale(0);opacity:0;}
  20%{opacity:.7;}
  80%{opacity:.4;}
  100%{transform:translateY(-120vh) scale(1.5);opacity:0;}
}

/* card */
#cmgCard{
  position:relative;z-index:2;
  background:linear-gradient(160deg,rgba(30,15,0,.97) 0%,rgba(65,30,0,.97) 100%);
  border:2px solid rgba(255,215,0,.6);
  border-radius:22px;padding:32px 28px 26px;
  width:92%;max-width:400px;text-align:center;
  box-shadow:0 0 60px rgba(255,215,0,.2),0 20px 60px rgba(0,0,0,.8);
  animation:cardPop .55s cubic-bezier(.175,.885,.32,1.275) forwards;
}
@keyframes cardPop{
  0%{transform:scale(.6) translateY(40px);opacity:0;}
  100%{transform:scale(1) translateY(0);opacity:1;}
}

/* gold glow ring */
#cmgCard::before{
  content:'';position:absolute;inset:-3px;border-radius:24px;z-index:-1;
  background:linear-gradient(45deg,#FFD700,#ff6b00,#FFD700,#00d4ff,#FFD700);
  background-size:300% 300%;
  animation:ringRotate 3s linear infinite;
  filter:blur(6px);opacity:.6;
}
@keyframes ringRotate{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}

.wBadge{
  display:inline-block;
  background:linear-gradient(135deg,#FFD700,#e6a800);
  color:#000;font-weight:900;font-size:11px;letter-spacing:2px;
  text-transform:uppercase;border-radius:20px;padding:4px 14px;margin-bottom:12px;
}
.wEmoji{font-size:54px;display:block;margin-bottom:4px;animation:bounce .8s ease-in-out infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-8px);}}

.wGreeting{font-size:13px;color:rgba(255,215,0,.7);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.wName{
  font-size:28px;font-weight:900;
  background:linear-gradient(90deg,#FFD700,#fff,#FFD700);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 2s linear infinite;margin-bottom:2px;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}

.wService{font-size:16px;font-weight:700;color:#fff;margin-bottom:2px;}
.wOrg{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-bottom:16px;}

/* tip box */
.wTip{
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);
  border-radius:10px;padding:10px 14px;margin-bottom:18px;
  font-size:12.5px;color:rgba(255,255,255,.78);line-height:1.55;font-style:italic;
}
.wTip span{color:#FFD700;font-weight:700;font-style:normal;}

/* progress dots (3 animated) */
.wDots{display:flex;justify-content:center;gap:6px;margin-bottom:16px;}
.wDot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,215,0,.3);
  animation:dotPulse 1.2s ease-in-out infinite;
}
.wDot:nth-child(2){animation-delay:.2s;}
.wDot:nth-child(3){animation-delay:.4s;}
@keyframes dotPulse{0%,100%{background:rgba(255,215,0,.3);transform:scale(1);}50%{background:#FFD700;transform:scale(1.4);}}

/* CTA button */
#cmgStartBtn{
  background:linear-gradient(45deg,#FFD700,#e6a800);
  color:#000;border:none;border-radius:14px;
  padding:15px 0;width:100%;font-size:17px;font-weight:900;
  cursor:pointer;letter-spacing:.4px;
  box-shadow:0 6px 24px rgba(255,215,0,.45);
  transition:transform .15s,box-shadow .15s;
  animation:ctaPulse 1.8s ease-in-out infinite;
}
@keyframes ctaPulse{
  0%,100%{box-shadow:0 6px 24px rgba(255,215,0,.4);}
  50%{box-shadow:0 6px 40px rgba(255,215,0,.9);}
}
#cmgStartBtn:active{transform:scale(.96);}

.wFooter{margin-top:12px;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:1px;}

.q-image-wrap{
  width:100%;border-radius:12px;overflow:hidden;
  border:2px solid rgba(180,120,0,0.4);background:#1a0e00;
  position:relative;padding:10px;box-sizing:border-box;
}
.q-image-wrap svg{width:100%!important;height:auto!important;max-height:220px;display:block;}
.q-image-wrap>img{width:100%!important;height:auto!important;max-height:220px;display:block;object-fit:contain;border-radius:6px;}
.q-image-wrap>div{width:100%!important;display:flex!important;gap:4px!important;box-sizing:border-box;}
.q-image-wrap>div>img{flex:1!important;min-width:0!important;max-height:190px!important;object-fit:cover!important;border-radius:6px!important;display:block!important;}
.q-image-label{position:absolute;top:8px;left:8px;background:rgba(80,40,0,0.9);color:#fff;font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;z-index:2;}


/* ══ LIVE STAR SCORE BAR ══ */
#starBar{width:100%;max-width:560px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,215,0,0.25);border-radius:12px;padding:8px 12px;display:none;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:4px;}
#starBar .sb-label{font-size:11px;font-weight:bold;color:rgba(255,215,0,0.7);margin-right:6px;white-space:nowrap;}
.sb-star{font-size:20px;line-height:1;display:inline-block;opacity:0.25;transition:opacity 0.2s;}
.sb-star.earned{opacity:1;animation:starPop 0.45s cubic-bezier(0.175,0.885,0.32,1.6) forwards;}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg);}60%{transform:scale(1.5) rotate(10deg);}100%{transform:scale(1) rotate(0deg);}}
</style>
</head>

const QUESTION_BANK = [

  // ── IMAGE QUESTIONS (18) ──
  {type:"image",svgKey:"gra_badge",question:"This is the Ghana Revenue Authority crest. What does GRA stand for and which division handles customs?",answers:["Ghana Revenue Authority — the Customs Division manages imports", "Government Revenue Agency — handled by the Ports Division", "Ghana Roads Authority — the Customs Unit collects road tolls", "General Revenue Administration — the Duty Division"],correct:0,explain:"GRA stands for Ghana Revenue Authority, established by Act 791 of 2009 by merging the Internal Revenue Service, Customs Excise and Preventive Service, and VAT Service into one authority. The Customs Division handles all import and export duties, border control and anti-smuggling operations."},

  {type:"image",svgKey:"gra_badge",question:"The GRA badge shows the customs hotline. What is the GRA Customs toll-free number to report smuggling or corruption?",answers:["193", "0800 900 110 or 112", "191 — the police handle all customs complaints", "Only the GRA website accepts smuggling reports — there is no phone hotline"],correct:1,explain:"The GRA Customs toll-free hotline is 0800 900 110, available to report smuggling, under-declaration, corruption by customs officers, or any customs violation. The general emergency number 112 also connects to relevant authorities. Reports can be made anonymously."},

  {type:"image",svgKey:"smuggling_scene",question:"This image shows a truck avoiding the official customs checkpoint. What is the specific crime being committed?",answers:["Speeding on a public road — a traffic offence only", "Trespassing on government land near the border", "Illegal parking on a restricted government access road", "Smuggling — illegally moving goods across a border to evade customs d"],correct:3,explain:"Smuggling is the criminal offence of moving goods across an international border while evading customs controls — avoiding duty payment and regulatory inspection. Under the Customs Act 2015 (Act 891), smuggling attracts seizure of goods, fine up to three times the value of goods, vehicle confiscation and imprisonment."},

  {type:"image",svgKey:"smuggling_scene",question:"This truck is smuggling goods across the border. Which category of smuggled goods poses the GREATEST risk to human life in Ghana?",answers:["Smuggled electronics like phones and laptops that avoid import duty", "Second-hand vehicles that avoid import duty", "Textiles and fabrics that undercut local weavers by unfair pricing", "Counterfeit and substandard medicines and pharmaceuticals that have no active ingr"],correct:3,explain:"Counterfeit and substandard medicines kill patients directly — a patient who takes fake malaria medication gets no treatment while the disease progresses. In Ghana, up to 30% of medicines in some markets have been found to be substandard or counterfeit. GRA Customs works with FDA and NACOC to intercept pharmaceutical smuggling at all ports of entry."},

  {type:"image",svgKey:"customs_declaration",question:"This image shows a customs declaration form. A passenger arrives at Kotoka Airport with GHS 80,000 cash. Must they declare it?",answers:["Yes — cash or foreign currency equivalent to USD 10,000 or more must be declared to GRA Customs on arrival and de", "No — cash is personal property and never needs to be declared at any border", "Only foreign currency must be declared — Ghana cedis are never subject to declaration requirements", "Only if the cash is in foreign currency — Ghanaian cedis have no declaration requirement"],correct:0,explain:"Ghana requires declaration of any currency (local or foreign) equivalent to or exceeding USD 10,000 (or equivalent in other currencies) when entering or leaving Ghana. Failure to declare is an offence. This requirement supports anti-money laundering efforts and is enforced by GRA Customs and the Financial Intelligence Centre (FIC)."},

  {type:"image",svgKey:"customs_declaration",question:"Mensah arrives from London with 3 laptops, 5 phones and 200 pairs of shoes. He claims they are personal gifts. What does GRA Customs actually consider?",answers:["The quantity and nature of goods — multiple identical items clearly for resale are treated as ", "The passenger's word is always taken at face value — no further checks are done", "Customs only checks goods at sea ports, not at airports", "Only goods above GHS 50,000 value require declaration at the airport"],correct:0,explain:"GRA Customs officers assess the nature and quantity of goods to determine whether they are truly for personal use or for commercial resale. Multiple identical items (shoes, phones, electronics in large quantities) are treated as commercial imports even if the passenger claims they are gifts. Commercial imports are subject to full import duties, VAT and levy payments."},

  {type:"image",svgKey:"counterfeit_goods",question:"This image shows genuine versus counterfeit products. What is the PRIMARY legal consequence for a market trader knowingly selling counterfeit goods in Ghana?",answers:["A small warning fine of GHS 500 — counterfeit goods enforcement is lenient for small traders", "Only the manufacturer of the counterfeit goods is liable — traders who sell are not prosecuted", "Criminal prosecution under the Copyright Act and trade mark laws — fines, imprisonment and seizure of all counterfeit stock", "Counterfeit goods are only illegal if imported — locally produced counterfeits are permitted"],correct:2,explain:"Knowingly selling counterfeit goods violates Ghana's Copyright Act 2005, trade mark laws and the Standards Act. GRA Customs, the Ghana Standards Authority (GSA) and Police conduct joint market enforcement operations. Traders face seizure of all counterfeit stock, prosecution, fines and imprisonment. The Ghana Standards Authority manages the Product Conformity Assessment Programme (PCAP) for quality control."},

  {type:"image",svgKey:"counterfeit_goods",question:"This counterfeit goods image shows fake medicines as the most dangerous category. What agency works with GRA Customs to intercept fake medicines at Ghana's borders?",answers:["The Ghana Prisons Service — they hold smugglers after arrest", "The Ghana Police Service exclusively — other agencies have no border inspection role", "The National Ambulance Service — which treats patients poisoned by fake medicines", "The Food and Drugs Authority (FDA) — which certifies medicines and works with GRA Customs to test a"],correct:3,explain:"The Food and Drugs Authority (FDA) works closely with GRA Customs at ports of entry to inspect and test pharmaceutical imports. The FDA can certify or condemn medicines at the border before they enter Ghana's market. GRA Customs can hold pharmaceutical shipments for FDA inspection. This partnership has intercepted millions of dollars worth of fake medicines destined for Ghanaian markets."},

  {type:"image",svgKey:"import_process",question:"This diagram shows the import process. What is the ICUMS (Integrated Customs Management System) used in Ghana?",answers:["An international customs database shared only between ECOWAS member states", "A physical inspection machine that scans container contents at Tema Port", "A payment system used only by clearing agents to pay duties", "Ghana's electronic customs management platform through which all import and export declar"],correct:3,explain:"ICUMS (Integrated Customs Management System), also known as GCNet, is Ghana's electronic platform for customs processing. All import and export declarations are submitted electronically through ICUMS, which calculates duties, manages permits, tracks containers and generates reports. It replaced manual paper-based processing and has significantly improved customs revenue collection and reduced fraud."},

  {type:"image",svgKey:"import_process",question:"This import process diagram shows a clearing agent. Can an importer process customs clearance without using a licensed clearing agent?",answers:["No — all importers must use a licensed clearing agent by law", "Yes — importers may clear their own goods personally without a clearing agent", "Only companies can clear their own goods — individual importers must always use agents", "Clearing agents are only required for sea port imports — airport imports can be cleared by anyone"],correct:1,explain:"Importers may personally clear their own goods without using a licensed clearing agent — it is legally permitted. However, most importers use licensed clearing agents (also called customs brokers) because the documentation process (Bill of Lading, IDF, valuation, duty calculation) is complex and requires expertise. Licensed agents are regulated by GRA. Using an unlicensed person to clear goods is an offence."},

  {type:"image",svgKey:"trade_routes",question:"This map shows Ghana's trade ports and borders. Which port handles the LARGEST volume of Ghana's imports and exports?",answers:["Takoradi Port — it is the oldest and largest commercial port", "Kotoka International Airport — air cargo is fastest and most valuable", "Tema Port (Port of Tema) — Ghana's principal deep-water port handling over 80% of ma", "Aflao land border — West Africa's busiest land crossing point"],correct:2,explain:"Tema Port (Port of Tema) in the Greater Accra Region is Ghana's principal deep-water port and handles the vast majority (over 80%) of Ghana's maritime imports and exports. The Ghana Ports and Harbours Authority (GPHA) manages Tema and Takoradi. Tema handles container shipping, petroleum products, vehicles and general cargo. GRA Customs has its largest operational presence at Tema Port."},

  {type:"image",svgKey:"trade_routes",question:"This map shows land border crossings. What makes the Aflao border crossing strategically important for GRA Customs?",answers:["Aflao handles only agricultural goods — it is the only border for food imports", "Aflao is important only because it is close to Accra — proximity to the capital is the main factor", "Aflao is Ghana's oldest border post — its historical significance is the main strategic factor", "Aflao is the busiest land border crossing between Ghana and Togo"],correct:3,explain:"Aflao on the Ghana-Togo border is one of West Africa's busiest land crossings with extremely high volumes of daily trade and passenger movement. This high volume creates significant opportunity for smuggling and under-declaration. GRA Customs has a major presence at Aflao to monitor the Lomé-Accra trade corridor. It is particularly important for textiles, electronics and consumer goods coming from Asia via Togo's free port at Lomé."},

  {type:"image",svgKey:"revenue_chart",question:"This chart shows how customs revenue funds government services. What percentage of Ghana's total government revenue does GRA Customs typically contribute?",answers:["About 30% — making customs one of the largest single contributors to government revenue", "About 5% — customs is a minor revenue source compared to income tax", "Over 60% — customs is by far the largest source of government income in Ghana", "About 12% — customs contributes equally with other tax categories"],correct:0,explain:"GRA Customs contributes approximately 25-35% of Ghana's total government revenue, making it one of the most important revenue sources for the state. Every customs duty paid funds public services — roads, hospitals, schools and security. Every cedi lost to smuggling and under-declaration directly reduces government capacity to fund these services. This is why customs compliance is a patriotic duty."},

  {type:"image",svgKey:"revenue_chart",question:"This revenue chart shows customs funding education and health. What happens to Ghana's development when smuggling reduces customs revenue?",answers:["Nothing — the government borrows more money internationally to cover the gap easily", "Reduced customs revenue means fewer funds for roads, hospitals, schools and public services", "Only the private sector is affected — government services are funded by other means", "Smuggling only affects the luxury goods sector — essential services are separately funded"],correct:1,explain:"When smuggling deprives GRA of revenue, the direct consequences for Ghana include: less money for school buildings and textbooks, fewer hospital medicines, slower road construction, and reduced police and security funding. Ghana's development depends heavily on domestic revenue mobilisation — customs revenue loss forces the government to borrow externally, increasing national debt and reducing funds available for development."},

  // ── SCENARIO QUESTIONS (keep best from original + add new) ──
  {type:"text",question:"Kofi's uncle imports shoes from China. A customs officer demands a bribe to reduce the assessed duty. What should Kofi's uncle do?",answers:["Pay the bribe — it is normal practice and saves money", "Negotiate a smaller bribe to reduce the cost", "Pay the bribe but report it on social media afterwards", "Refuse firmly, note the officer's name and badge number"],correct:3,explain:"Paying a bribe is a criminal offence for both the giver and the receiver. Refuse firmly, document the officer's details, and report to GRA's Anti-Corruption Unit (0800 900 110) or CHRAJ. GRA has zero tolerance for corruption. Paying the bribe makes the importer an accomplice in the crime and does not guarantee fair treatment in future dealings."},

  {type:"text",question:"Yaw brings goods from Togo and declares only half the value to pay less duty. What specific crime is this?",answers:["Legitimate tax planning — businesses minimise costs legally", "Legal if the goods are for personal use only", "A minor administrative error correctable with a small penalty", "Under-declaration or customs fraud — a criminal offence attracting seizure"],correct:3,explain:"Under-declaration (declaring goods at less than their true value to reduce duty payable) is customs fraud under the Customs Act 2015 (Act 891). Consequences include: immediate seizure of all goods, a fine of up to three times the evaded duty, criminal prosecution and permanent red-flagging of the importer for enhanced scrutiny on all future shipments."},

  {type:"text",question:"Abena works near Aflao and notices traders bringing large quantities of goods through a bush path at night. What should she do?",answers:["Report to GRA Customs on 0800 900 110 or Police on 191", "Ignore it — border enforcement is not a civilian responsibility", "Photograph the traders and post on social media to shame them publicly", "Confront the traders and ask them to use the official border instead"],correct:0,explain:"Reporting smuggling to GRA Customs (0800 900 110) or Police (191) is a civic duty. Community intelligence is one of GRA's most effective tools — officers cannot be everywhere along Ghana's long border. Reports can be made anonymously. Do not confront smugglers directly as they may be dangerous. Your report protects Ghana's revenue and your community from counterfeit and dangerous goods."},

  {type:"text",question:"Mensah arrives at Kotoka Airport with 3 laptops but the duty-free allowance is 1. What happens?",answers:["He keeps all 3 — duty-free allowances are flexible at the officer's discretion", "He is arrested and all 3 laptops are confiscated regardless of the declared quantity", "He must leave the extra laptops at the airport warehouse permanently", "He pays import duty on the additional 2 laptops — commercial quantities above the personal allowanc"],correct:3,explain:"Passengers are permitted a personal duty-free allowance for genuine personal goods. Items above the personal allowance (like multiple identical electronics clearly for resale) are assessed for import duty. Mensah would pay duty on the additional 2 laptops calculated on their assessed value. If he had tried to conceal them or under-declare, he would face fines and possible prosecution."},

  {type:"text",question:"Esi receives a package from abroad and the courier asks her to pay customs duty before delivery. How can she verify this is legitimate?",answers:["Pay immediately — courier companies always collect customs duty accurately", "Refuse to pay all courier-collected duties — GRA always collects duty directly at the port, never through couriers", "Verify by contacting GRA directly on 0800 900 110 or checking GCNet", "Pay only if the courier provides a receipt — couriers collecting duty is perfectly standard practice"],correct:2,explain:"Legitimate couriers (DHL, FedEx, EMS) do sometimes collect customs duties on behalf of GRA as part of their clearance service, but always with official GRA documentation. If you are unsure, verify by calling GRA on 0800 900 110 or checking the ICUMS/GCNet portal. Fraudsters impersonate courier companies demanding fake customs payments — always verify before paying."},

  {type:"text",question:"Adwoa's father imports expired food items to sell cheaply in Ghana. What are the risks?",answers:["No legal risk — buyers know the food is cheap and accept the risk themselves", "Risk only applies to perishable foods — non-perishable expired food is legally importable", "Minor fine only — expired food is a health issue not a customs issue", "Criminal prosecution under the Food and Drugs Act, seizure of all goods and liability for any harm cause"],correct:3,explain:"Importing expired, substandard or prohibited foodstuffs is an offence under both the Customs Act and the Food and Drugs Act. GRA Customs and FDA jointly enforce food safety at borders. Consequences: immediate seizure and destruction of goods, criminal prosecution, potential civil liability for any consumers harmed, and ban from future importation. The Ghana Standards Authority (GSA) monitors imported food quality."},

  {type:"text",question:"Kojo is offered quick money helping smuggle electronics across the Burkina Faso border. What should he understand about this offer?",answers:["He is only liable if he organises the smuggling — helpers face no legal consequences", "It is a one-time risk — if he is not caught the first time he is safe", "Smuggling electronics is treated as a minor offence with small fines in Ghana", "He faces arrest, seizure of goods, criminal conviction, imprisonment and a permanent criminal record"],correct:3,explain:"Anyone participating in smuggling — whether as organiser, driver, porter or lookout — faces the same criminal liability under the Customs Act 2015. Consequences: arrest, seizure of all goods (including your vehicle if used), fines and imprisonment. A criminal conviction affects future employment, travel, professional licensing and family life permanently. The short-term payment is never worth it."},

  {type:"text",question:"Akosua reads that counterfeit medicines are being smuggled into Ghana. What is the greatest danger to public health?",answers:["Patients receive no effective treatment while believing they are being cured — diseases progress and people die from preventable illnesses", "Loss of revenue for pharmaceutical companies — the main harm is economic not medical", "Counterfeit medicines only harm people who do not have prescriptions", "The danger is only to people who buy from street vendors — pharmacies never stock counterfeits"],correct:1,explain:"The greatest danger of counterfeit medicines is therapeutic failure — the patient receives no actual treatment while believing they are being cured. Malaria patients taking fake artemisinin die. TB patients taking fake antibiotics develop drug-resistant TB. HIV patients with fake ARVs deteriorate. Additionally, wrong dosages can cause direct harm. Ghana's FDA and GRA Customs conduct joint operations to intercept pharmaceutical smuggling."},

  {type:"text",question:"Kwame is at the border and his goods are detained for inspection. He wants to bribe an officer to speed up release. What is the right approach?",answers:["Offer a moderate amount — small bribes are unofficially tolerated for speeding up legitimate processes", "Detention always means confiscation — bribery is the only way to recover legitimately imported goods", "Wait patiently — detention for inspection is a legal and normal customs procedure", "Bribery is only wrong if the goods are actually illegal — bribing for legitimate goods is acceptable"],correct:2,explain:"Customs detention for inspection is a legitimate legal process. Legal goods will be released after inspection with the proper duties paid. Offering a bribe is a criminal offence for both giver and receiver. If you believe the detention is unjustified or excessive, escalate formally to the GRA District Manager or call 0800 900 110. Patience and compliance is always the right approach for legally imported goods."},

  {type:"text",question:"Ama notices traders at Kantamanto selling very cheap imported fabrics with no labels or documentation. What should she understand?",answers:["Low prices are normal in bulk — cheap fabric with no labels is a legitimate market pricing strategy", "The fabrics may be counterfeit, smuggled or substandard — buying them makes Ama part of the criminal supply chain even unknowingly", "Fabrics are not subject to customs requirements — only electronics and food need documentation", "Cheap fabrics from abroad are beneficial to the poor and should be encouraged regardless of their source"],correct:1,explain:"Undocumented fabrics with no labels are likely smuggled (avoiding duty) or counterfeit. Even unknowing buyers become part of the criminal supply chain. Consequences for traders knowingly selling smuggled goods include prosecution and seizure of stock. Buyers who purchase knowingly may also face legal exposure. The longer-term harm: smuggled fabrics undercut Ghana's textile industry (kente, batik), destroying local jobs."},

  {type:"text",question:"What is the GRA Customs Division toll-free reporting hotline?",answers:["0800 900 110 — available 24 hours to report smuggling, corruption and customs violations", "191 — Police handle all customs complaints", "192 — shared with the Fire Service for emergency border incidents", "193 — the National Ambulance Service number also used for customs emergencies"],correct:0,explain:"The GRA Customs toll-free hotline is 0800 900 110. It is available 24 hours a day to report: smuggling operations, under-declaration, corrupt customs officers, counterfeit goods, or any customs violation. Reports can be made anonymously. The general emergency number 112 can also be used. Police (191) also receive smuggling reports and coordinate with GRA."},

  {type:"text",question:"What does the Ghana Revenue Authority collect?",answers:["Water rates, electricity bills and sanitation levies for district assemblies", "Taxes, duties and levies on behalf of the Government of Ghana to fund public services", "Court fines, legal penalties and bail payments for the judiciary", "School fees and university tuition for public educational institutions"],correct:1,explain:"GRA collects all domestic taxes and import/export duties on behalf of the Government of Ghana. This includes: corporate tax, personal income tax, VAT, import and export duties, excise duties and various levies. GRA has three main divisions: Domestic Tax Division, Customs Division and Support Services Division. All collected revenue goes to the Consolidated Fund for government expenditure."},

  {type:"text",question:"What is import duty and why does Ghana charge it?",answers:["A fine charged to importers as a punishment for bringing goods into Ghana", "A fee paid to the port authority for using Ghana's harbour facilities", "A tax paid on goods brought into Ghana — it generates government revenue", "A charge paid to clearing agents for processing import documentation"],correct:2,explain:"Import duty is a tax levied on goods imported into Ghana, collected by GRA Customs. Its purposes include: generating revenue for government (GRA Customs contributes ~30% of total govt revenue), protecting Ghanaian industries from unfair cheap competition, and regulating the types and quantities of goods entering Ghana. Duty rates vary by product category — essential goods may attract lower or zero duty while luxury items face higher rates."},

  {type:"text",question:"What is smuggling and what are the penalties in Ghana?",answers:["Transporting goods legally by sea to avoid road transportation costs — not illegal", "Importing goods without prior booking on the GRA electronic system — correctable with a late filing fee", "Selling goods below their actual market value — controlled by competition law not customs law", "Illegally moving goods across borders to evade customs duties and regulations"],correct:3,explain:"Smuggling under the Customs Act 2015 (Act 891) is the illegal movement of goods across Ghana's borders to avoid customs duties, taxes or prohibited goods regulations. Penalties: immediate seizure of all goods, fines up to three times the assessed value of the goods, confiscation of the vehicle or vessel used, and imprisonment. Repeat offenders face enhanced penalties and permanent blacklisting."},

  {type:"text",question:"What is a Bill of Lading and why is it important in customs clearance?",answers:["A legal document issued by the shipping carrier listing goods being transported by sea", "A retail invoice from a foreign shop showing the purchase price of goods", "A customs fine notice issued to importers who declare goods late", "A letter of credit issued by the importer's bank guaranteeing payment to the supplier"],correct:0,explain:"A Bill of Lading (B/L) is a legal document issued by the shipping carrier that: lists the goods being transported, their quantity and condition, identifies the shipper and consignee, and serves as a receipt of goods and document of title. GRA Customs requires the B/L as part of the import documentation package. Without it, goods cannot be legally cleared. It is one of the most important international trade documents."},

  {type:"text",question:"What does HS Code stand for in customs and why is it important?",answers:["Hazardous Substances Code — used only for dangerous chemical shipments", "Home Supply Code — a GRA internal system for domestically produced goods", "Harmonised System Code — an international product classification system that determines", "Heavy Shipment Code — used for cargo above a certain weight threshold"],correct:2,explain:"The Harmonised System (HS) Code is an internationally standardised numerical code for classifying traded products, maintained by the World Customs Organisation (WCO). Every product category has a specific HS Code which determines: the applicable import duty rate, applicable regulations (permits, bans), and statistical tracking of trade flows. Using the wrong HS Code (under-classification) to reduce duty is a form of customs fraud."},

  {type:"text",question:"What is a licensed customs clearing agent and what services do they provide?",answers:["A government customs officer who inspects goods at the border on behalf of GRA", "A border security guard who escorts commercial trucks through checkpoint areas", "A private company or individual licensed by GRA to prepare and submit customs documentation", "A port authority official who assigns berths to ships carrying commercial cargo"],correct:2,explain:"A licensed customs clearing agent (also called a customs broker) is a private professional licensed by GRA to: prepare import/export declarations on ICUMS/GCNet, calculate and pay duties on behalf of clients, liaise with GRA officers during inspection, and manage the logistics of goods release from ports. Using an unlicensed person to clear goods is an offence. Clearing agents must renew their GRA licence annually."},

  {type:"text",question:"What are counterfeit goods and what law governs them in Ghana?",answers:["Very expensive genuine luxury goods that are unaffordable to most Ghanaians", "Goods donated by foreign governments to Ghana for humanitarian purposes", "Legitimate second-hand imported goods sold below original retail price", "Fake products manufactured to appear as genuine branded goods"],correct:3,explain:"Counterfeit goods are products that illegally use another brand's trade mark, design or packaging to deceive buyers into thinking they are genuine. They are illegal under the Copyright Act 2005, Trade Marks Act 2004, and Ghana Standards Authority regulations. GRA Customs works with the Anti-Counterfeiting Unit and GSA to intercept counterfeits at ports. The economic damage: it kills jobs, destroys brand investment and harms consumers through unsafe products."},

  {type:"text",question:"What is the purpose of a customs seal on a shipping container?",answers:["To certify the container has been officially processed by customs", "To decorate the container with the GRA logo for official identification purposes", "To protect the container's contents from weather and humidity during ocean transportation", "To identify which shipping company owns the container in port"],correct:0,explain:"A customs seal (also called a container seal or customs lock) is placed by GRA officers after inspection and clearance to certify that the container's contents match the declared manifest. Breaking a customs seal without authorisation is a criminal offence under the Customs Act and immediately triggers re-inspection, potential seizure and prosecution. The seal number is recorded in the customs system for tracking and audit purposes."},

  {type:"text",question:"Which of these items is prohibited from importation into Ghana?",answers:["Books, educational materials and school supplies", "Expired pharmaceuticals, counterfeit goods, prohibited weapons and narcotics", "Used clothes (obroni wawu) imported for resale in Ghanaian markets", "Second-hand electronic equipment imported for personal use"],correct:1,explain:"Prohibited imports into Ghana include: expired, substandard or counterfeit medicines (FDA Act), narcotics and illegal drugs (NACOC Act), pornographic materials, weapons without permits, certain second-hand goods (some vehicle types), and goods from sanctioned countries. GRA Customs enforces these prohibitions at all ports of entry. Note: used clothing imports are currently a major policy debate but not fully banned."},

  {type:"text",question:"What is the difference between customs duty and VAT on imports?",answers:["They are the same tax with different names — importers pay either one but not both", "Only VAT is payable on imports — customs duty was abolished by ECOWAS in 2020", "Customs duty is a tax on the act of importing goods across the border", "Customs duty applies only to manufactured goods while VAT applies only to food and agricultural products"],correct:2,explain:"Import duty and import VAT are two separate taxes both collected by GRA Customs. Import duty is levied on the CIF (Cost, Insurance and Freight) value of the goods. VAT is then calculated on the combined value of the goods plus the import duty. Commercial importers typically pay: import duty + VAT + NHIL + GETFL + various levies. The total tax burden can be 25-40%+ of the CIF value depending on the product category."},

  {type:"text",question:"What is the ECOWAS Common External Tariff and how does it affect Ghana's customs rates?",answers:["A maximum speed limit for trucks at West African border crossings — not related to customs", "An emergency tariff that only activates during regional crises — not a normal trading arrangement", "A free trade agreement that eliminates all duties between Ghana and Togo — but does not affect other countries", "A uniform tariff rate applied by all 15 ECOWAS member states on imports from outside ECOWAS"],correct:3,explain:"The ECOWAS Common External Tariff (CET) is a harmonised set of tariff rates applied by all 15 ECOWAS member states on goods imported from outside ECOWAS. It has five bands: 0% (essential social goods), 5% (basic necessities and raw materials), 10% (intermediate goods), 20% (consumer goods), and 35% (sensitive goods needing protection). Ghana's import duty rates are largely set by the CET framework."},

  {type:"text",question:"What is AML/CFT and why does GRA Customs have a role?",answers:["Anti-Money Laundering and Countering the Financing of Terrorism", "Agricultural Marketing Levy — a tax on farm exports for which Customs collects revenue", "Air Mile Levy and Cargo Freight Tax — a charge on aviation cargo processed by Customs", "Authorised Market Licence and Certificate of Free Trade — a business registration for importers"],correct:0,explain:"AML/CFT stands for Anti-Money Laundering and Countering the Financing of Terrorism. GRA Customs plays a key role because: large cash movements across borders must be declared (over USD 10,000), trade-based money laundering uses over/under-invoicing of goods to move funds illegally, and certain trade patterns can indicate terrorist financing. GRA Customs works with the Financial Intelligence Centre (FIC) and Bank of Ghana on AML/CFT enforcement."},

  {type:"text",question:"Abena's class visits GRA headquarters. A student asks why customs is important for Ghana's development. What is the BEST answer?",answers:["Customs is important mainly for security — its economic contribution is secondary", "Customs revenue contributes ~30% of government income funding roads, schools, hospitals and national development", "Customs is only important for large corporations importing raw materials — it has no impact on ordinary Ghanaians", "Customs was important before Ghana's oil production began — petroleum revenue now makes customs less significant"],correct:1,explain:"GRA Customs is fundamental to Ghana's development: it contributes approximately 25-35% of total government revenue, it regulates what enters Ghana (protecting health, security and local industries), and it facilitates legitimate trade which drives economic growth. Every Ghanaian benefits from customs revenue through public services, and every Ghanaian is harmed when smuggling and fraud reduce that revenue."},

  {type:"text",question:"Mensah sees an advertisement offering to help people clear goods quickly without paying full duties. What is this?",answers:["A customs fraud service — using it makes Mensah criminally liable as an accessory to tax evasion eve", "A government scheme to help small importers with reduced duties", "A legitimate clearing agent advertisement — competition between agents reduces prices", "A legitimate GRA approved fast-track service for priority importers"],correct:0,explain:"Advertisements offering to help evade customs duties are fraud services. Using them makes the importer criminally liable regardless of claimed ignorance — the importer knowingly participated in tax evasion. Consequences: prosecution, seizure of goods, fines and criminal record. Always use GRA-licensed clearing agents whose names can be verified on the GRA website. If a deal sounds too good to be legal, it probably is illegal."},

  {type:"text",question:"Esi's father wants to export cocoa beans from Ghana. What must he do?",answers:["Simply drive the cocoa to the border — exports are not regulated only imports are", "Pay a flat fee of GHS 1,000 to GRA per tonne exported — the process is entirely self-service", "File an import declaration at the destination country on behalf of the buyer — GRA has no role in exports", "Register with COCOBOD (Ghana Cocoa Board), obtain an export licence, file an export declaration with GRA Customs"],correct:3,explain:"Cocoa export is strictly regulated because it is Ghana's most important agricultural export and a major foreign exchange earner. Exporters must be registered with COCOBOD, which manages cocoa quality and export licensing. GRA Customs processes the export declaration and collects applicable levies. All export documentation must match the actual quantity and quality of cocoa shipped. Smuggling cocoa out of Ghana to avoid COCOBOD regulations is a serious offence."},

  {type:"text",question:"Adwoa hears Ghana loses billions of cedis to customs fraud annually. What is one major consequence of this loss?",answers:["Reduced government revenue means less funding for schools, hospitals, roads and public services", "Only wealthy importers are affected — ordinary Ghanaians face no consequences", "The private sector is not affected by government revenue loss", "Ghana borrows internationally to replace lost customs revenue at no cost to citizens"],correct:0,explain:"Ghana's Public Financial Management Act requires that government services are funded from domestic revenue. When customs fraud reduces GRA collections: school infrastructure projects are delayed, hospital medicines and equipment are underfunded, road maintenance budgets are cut, and the government must borrow externally at interest to fill the gap. The cumulative effect is slower development and increased national debt — consequences borne by every citizen."},

  {type:"text",question:"Kojo wants to import a second-hand car from Japan. His clearing agent advises him to under-declare the value. What should Kojo do?",answers:["Follow the advice — clearing agents know the system and under-declaration is common practice", "Refuse — under-declaration is customs fraud making Kojo criminally liable", "Under-declare slightly — a small reduction is tolerated by GRA", "Only follow the advice if the under-declaration is less than 10% of the true value"],correct:1,explain:"Any clearing agent advising under-declaration is acting illegally and is not properly licensed. Kojo should: refuse the advice, report the agent to GRA's licensing authority (0800 900 110), and use a properly licensed GRA clearing agent. Under-declaration makes the importer criminally liable even if the agent suggested it. GRA has a vehicle valuation database that flags suspected under-declarations for investigation."},

  {type:"text",question:"Akosua reads that GRA introduced a valuation database for imported goods. Why is this important in fighting customs fraud?",answers:["It automatically collects duty electronically without requiring any human officers at the border", "It is important mainly for accounting purposes — the database tracks revenue but does not affect fraud prevention", "It establishes reference prices for common imported goods so customs officers can identify under-declarations where declared val", "The database only covers luxury goods — ordinary consumer imports are not included"],correct:2,explain:"GRA's customs valuation database (based on WTO Customs Valuation Agreement standards) establishes reference prices for categories of commonly imported goods. When an importer declares a value significantly below the database reference price, this triggers automatic review and possible physical inspection. This has significantly reduced under-declaration fraud. Importers must prove the declared lower value is genuine with documentation (invoices, bank records)."},

  {type:"text",question:"Kwame discovers his employer is importing restricted chemical substances without required permits. What is his responsibility?",answers:["Ignore it — employees are not responsible for their employer's customs violations", "Wait until the employer is caught — reporting an employer is disloyal and unprofessional", "Only report if the chemicals pose immediate physical danger to employees", "Report to GRA Customs (0800 900 110), the Environmental Protection Agency or Ghana Police"],correct:3,explain:"Ghana's whistleblower protections cover employees who report corporate wrongdoing including customs violations. Knowingly assisting customs violations — even as an employee — creates criminal liability. The correct action is to report to GRA Customs (0800 900 110), EPA (for chemical imports), or Ghana Police (191). Reports can be made anonymously. Restricted chemicals without permits may include pesticides, industrial chemicals and controlled substances that require FDA, EPA or other agency permits."},

  {type:"text",question:"What is the TRIPS Agreement and how does it relate to counterfeit goods enforcement in Ghana?",answers:["The WTO Agreement on Trade-Related Aspects of Intellectual Property Rights", "Transport, Routes and International Port Standards — a GPHA document governing port operations", "A tax treaty between Ghana and the USA reducing customs duties on American imports", "A bilateral agreement between Ghana and China about trade mark licensing"],correct:0,explain:"TRIPS (Trade-Related Aspects of Intellectual Property Rights) is a WTO agreement that Ghana is bound by as a member. It requires Ghana to: provide border enforcement against counterfeit trade mark goods and pirated copyright goods, allow rights holders to apply for customs suspension of suspected counterfeit shipments, and maintain systems for intellectual property enforcement. GRA Customs implements TRIPS through its Anti-Counterfeiting Unit in coordination with brand owners."},

  {type:"text",question:"As a Ghanaian student, how can you directly support GRA Customs' mission?",answers:["By applying for a job at GRA Customs when you complete your education", "By not buying smuggled or counterfeit goods, reporting suspicious border activity to 0800 900 110", "By lobbying Parliament to reduce import duties so smuggling becomes less profitable", "By only supporting local products and never buying any imported goods"],correct:1,explain:"Every Ghanaian is a stakeholder in customs revenue. Students can directly support GRA's mission: not purchasing smuggled or counterfeit goods (reducing demand), reporting suspicious smuggling or market activity (0800 900 110), educating peers about the consequences of customs fraud for Ghana's development, and choosing to be informed citizens who understand why tax compliance matters. Your customs duty is your contribution to Ghana's schools, roads and hospitals."}

function launchQuiz(name,school,gender){
  var bank=FULL_BANK.slice();
  for(var i=bank.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=bank[i];bank[i]=bank[j];bank[j]=t;}
  QUESTIONS_ACTIVE=bank.slice(0,30);
  var sb=document.getElementById('starBar');
  if(sb){
    sb.style.display='flex';
    sb.innerHTML='<span class="sb-label">⭐ Score:</span>';
    for(var si=0;si<QUESTIONS_ACTIVE.length;si++){
      var s=document.createElement('span');
      s.className='sb-star';s.id='sbStar'+si;s.textContent='★';
      sb.appendChild(s);
    }
  }
  document.getElementById('quizContainer').style.display='flex';
  var bar=document.getElementById('cadetBar');bar.style.display='block';
  var title=gender==='Female'?'Cadetess':'Cadet';
  bar.innerHTML='🛃 <strong>'+title+' '+name+'</strong> &nbsp;·&nbsp; '+school+' &nbsp;<span onclick="goBack()" style="font-size:11px;opacity:.5;cursor:pointer;text-decoration:underline;font-weight:normal;">Not you?</span>';
  showQuestion();
}
function goBack(){localStorage.removeItem('cadetName');localStorage.removeItem('cadetGender');localStorage.removeItem('cadetSchool');window.location.href='quiz_questions.html';}
function showQuestion(){
  if(window.speechSynthesis)speechSynthesis.cancel();
  document.getElementById('explanation').style.display='none';
  if(current>=QUESTIONS_ACTIVE.length){showResult();return;}
  var q=QUESTIONS_ACTIVE[current];
  document.getElementById('qCounter').textContent='Q'+(current+1)+' / '+QUESTIONS_ACTIVE.length;
  var qt=document.getElementById('qType');
  if(q.type==='image'&&q.svgKey){qt.textContent='🖼️ Image Question';qt.style.background='rgba(80,40,0,0.6)';}
  else{qt.textContent='🛃 Ghana Customs Authority';qt.style.background='rgba(60,30,0,0.6)';}
  var imgArea=document.getElementById('qImageArea');
  if(q.svgKey&&IMAGES[q.svgKey]){imgArea.innerHTML='<div class="q-image-wrap"><span class="q-image-label">🛃 Study This</span>'+IMAGES[q.svgKey]+'</div>';}
  else{imgArea.innerHTML='';}
  document.getElementById('question').textContent=q.question;
  document.getElementById('progress').style.width=(current/QUESTIONS_ACTIVE.length*100)+'%';
  var ans=document.getElementById('answers');ans.innerHTML='';
  var labels=['A','B','C','D'];
  var shuffled=q.answers.map(function(text,origIdx){return{text:text,orig:origIdx};});
  for(var si=shuffled.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var st=shuffled[si];shuffled[si]=shuffled[sj];shuffled[sj]=st;}
  var newCorrect=shuffled.findIndex(function(item){return item.orig===q.correct;});
  window._currentShuffled=shuffled;window._currentNewCorrect=newCorrect;
  shuffled.forEach(function(item,i){
    var btn=document.createElement('button');
    btn.innerHTML='<span class="opt-label">'+labels[i]+'</span>'+item.text;
    btn.onclick=(function(idx,b){return function(){checkAnswer(idx,b);};})(i,btn);

function startTimer(){
  clearInterval(timerInterval);timeLeft=maxTime;
  document.getElementById('time').textContent=timeLeft;
  var bar=document.getElementById('timerBar');bar.style.width='100%';bar.style.background='#00ff00';

  var yellowAt=Math.floor(maxTime*0.5);
  var redAt=Math.floor(maxTime*0.25);
  var _yellowed=false,_redded=false;

  function timerSpeak(text,pitch,rate){
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang='en-GB';u.pitch=pitch||1.05;u.rate=rate||0.95;u.volume=1.0;
    function pickV(){
      var vs=window.speechSynthesis.getVoices();
      return vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})||
             vs.find(function(v){return v.lang.startsWith('en-GB');})||
             vs.find(function(v){return v.lang.startsWith('en');});
    }
    var v=pickV();if(v)u.voice=v;
    speechSynthesis.speak(u);
  }

  timerInterval=setInterval(function(){
    timeLeft--;document.getElementById('time').textContent=timeLeft;
    var pct=timeLeft/maxTime*100;bar.style.width=pct+'%';bar.style.background=pct>50?'#00ff00':pct>25?'#ffd700':'#ff4444';

    var firstName=(localStorage.getItem('cadetName')||'Cadet').split(' ')[0];

    if(!_yellowed&&timeLeft<=yellowAt&&timeLeft>redAt){
      _yellowed=true;
      var msgs=['Keep going, '+firstName+'! You are halfway through your time.',
                firstName+', stay focused! You still have time — think carefully.',
                'You can do it, '+firstName+'! Choose your answer soon.'];
      timerSpeak(msgs[Math.floor(Math.random()*msgs.length)],1.1,0.95);
    }

    if(!_redded&&timeLeft<=redAt&&timeLeft>10){
      _redded=true;
      var rmsgs=[firstName+'! Time is running out — answer now!',
                 'Hurry, '+firstName+'! Only seconds left — pick your answer!',
                 firstName+', quick! Running out of time!'];
      timerSpeak(rmsgs[Math.floor(Math.random()*rmsgs.length)],1.2,1.1);
    }

    if(timeLeft<=10&&timeLeft>0){
      var AC=window.AudioContext||window.webkitAudioContext;
      if(AC){try{
        var ctx=new AC(),o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='square';o.frequency.value=400+(10-timeLeft)*80;
        g.gain.setValueAtTime(0.35,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
        o.start(ctx.currentTime);o.stop(ctx.currentTime+0.15);
      }catch(e){}}
      if(timeLeft===10) timerSpeak(firstName+'! Ten seconds! Answer now!',1.3,1.2);
      else if(timeLeft===5) timerSpeak('Five! '+firstName+' — now!',1.4,1.3);
      else if(timeLeft===3) timerSpeak('Three!',1.5,1.4);
      else if(timeLeft===2) timerSpeak('Two!',1.5,1.5);
      else if(timeLeft===1) timerSpeak('One!',1.5,1.5);
    }

    if(timeLeft<=0){clearInterval(timerInterval);timeExpired();}
  },1000);
}
function speakFeedbackThenAdvance(msg,pitch){
  var PAUSE_AFTER=3500,FALLBACK=90000;
  function doAdvance(){current++;showQuestion();}
  if(!window.speechSynthesis){setTimeout(doAdvance,PAUSE_AFTER);return;}
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(msg);u.lang='en-GB';u.pitch=pitch||1.05;u.rate=0.88;u.volume=1.0;
  function pickVoice(){
    var vs=window.speechSynthesis.getVoices();
    return vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})
        ||vs.find(function(x){return x.lang.startsWith('en-GB');})
        ||vs.find(function(x){return x.lang.startsWith('en-US');})
        ||vs.find(function(x){return x.lang.startsWith('en');})
        ||vs[0]||null;
  }
  var advanced=false,fallbackTimer=null;
  function advance(){if(advanced)return;advanced=true;if(fallbackTimer)clearTimeout(fallbackTimer);setTimeout(doAdvance,PAUSE_AFTER);}
  u.onend=advance;u.onerror=advance;
  fallbackTimer=setTimeout(advance,FALLBACK);
  var vs=window.speechSynthesis.getVoices();
  if(vs.length>0){
    var v=pickVoice();if(v)u.voice=v;
    try{speechSynthesis.speak(u);}catch(e){advance();}
  } else {
    window.speechSynthesis.onvoiceschanged=function(){
      window.speechSynthesis.onvoiceschanged=null;
      var v2=pickVoice();if(v2)u.voice=v2;
      try{speechSynthesis.speak(u);}catch(e){advance();}
    };
  }
}

(function(){
  var AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;
  var ctx = null;
  function getCtx(){
    if(!ctx){ ctx = new AC(); }
    if(ctx.state==='suspended') ctx.resume();
    return ctx;
  }
  function osc(freq,type,start,dur,gainVal,fadeOut){
    var c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(gainVal,c.currentTime+start);
    if(fadeOut) g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+start+dur);
    o.start(c.currentTime+start);o.stop(c.currentTime+start+dur);
  }
  function noise(start,dur,gainVal){
    var c=getCtx();
    var buf=c.createBuffer(1,c.sampleRate*dur,c.sampleRate);
    var data=buf.getChannelData(0);
    for(var i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
    var src=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();
    f.type='bandpass';f.frequency.value=2200;f.Q.value=0.8;
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(gainVal,c.currentTime+start);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+start+dur);
    src.start(c.currentTime+start);src.stop(c.currentTime+start+dur);
  }
  window.sndClick=function(){try{osc(800,'sine',0,0.04,0.18,true);osc(400,'square',0,0.04,0.07,true);}catch(e){}};
  window.sndCorrect=function(){try{
    osc(880,'sine',0,0.18,0.45,true);osc(1320,'sine',0,0.18,0.25,true);
    osc(1100,'sine',0.12,0.22,0.35,true);osc(1650,'sine',0.12,0.22,0.20,true);
    for(var i=0;i<7;i++) noise(0.28+i*0.1,0.07,0.5-i*0.03);
  }catch(e){}};
  window.sndWrong=function(){try{
    osc(220,'sawtooth',0,0.15,0.40,true);
    osc(180,'sawtooth',0,0.15,0.25,true);
    osc(150,'square',0.10,0.20,0.35,true);
  }catch(e){}};
  window.sndTick=function(){try{osc(1047,'square',0,0.07,0.22,true);}catch(e){}};
  window.sndWin=function(pct){try{
    if(pct>=80){
      [523,659,784,1047,1319].forEach(function(f,i){
        osc(f,'sine',i*0.12,0.35,0.35,true);
        osc(f*2,'triangle',i*0.12,0.25,0.18,true);
      });
      for(var i=0;i<14;i++) noise(0.55+i*0.09,0.07,0.55-i*0.02);
    } else if(pct>=50){
      osc(523,'sine',0,0.28,0.35,true);
      osc(659,'sine',0.14,0.28,0.30,true);
      osc(784,'sine',0.28,0.28,0.25,true);
      for(var j=0;j<7;j++) noise(0.5+j*0.1,0.07,0.35-j*0.02);
    } else {
      osc(440,'sine',0,0.30,0.20,true);
      osc(392,'sine',0.20,0.30,0.15,true);
    }
  }catch(e){}};

  var voices=[],praiseIdx=0;
  function loadV(){ voices=window.speechSynthesis?speechSynthesis.getVoices():[]; }
  if(window.speechSynthesis){ speechSynthesis.onvoiceschanged=loadV; loadV(); }
  function speak(t,pitch,rate,vol){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(t);
  u.lang='en-GB'; u.pitch=pitch||1.05; u.rate=rate||0.92; u.volume=vol||1;
  function pickVoice(){
    var vs=window.speechSynthesis.getVoices();
    return vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})
        ||vs.find(function(v){return v.lang.startsWith('en-GB');})
        ||vs.find(function(v){return v.lang.startsWith('en');});
  }
  function doSpeak(){ var v=pickVoice(); if(v) u.voice=v; speechSynthesis.speak(u); }
  window.speechSynthesis.onvoiceschanged=function(){
    window.speechSynthesis.onvoiceschanged=null;
    speechSynthesis.cancel();
    var v=pickVoice(); if(v) u.voice=v; speechSynthesis.speak(u);
  };
  if(window.speechSynthesis.getVoices().length>0){
    window.speechSynthesis.onvoiceschanged=null; doSpeak();
  }
}
  var PRAISE=['Excellent!','Outstanding!','Brilliant!','Well done!','Correct!','Perfect!','Amazing!'];
  window.voiceCorrect=function(){speak(PRAISE[praiseIdx%PRAISE.length],1.2,1.1,1.0);praiseIdx++;};
  window.voiceWrong=function(){speak('Not quite. Try next!',0.9,0.95,0.85);};
  window.voiceResult=function(pct){
    if(pct>=80)      speak('Amazing result! You are a champion!',1.2,1.0,1.0);
    else if(pct>=50) speak('Good effort! Keep studying!',1.1,1.0,0.9);
    else             speak('Keep practising! You will improve!',1.0,0.95,0.85);
  };
})();

//  BACKGROUND MUSIC ENGINE (plays ../MEDIA/bg_music.mp3 at 20% volume)
// ══════════════════════════════════════
var _bgMusic = (function(){
  var a = new Audio();
  a.src     = '../MEDIA/bg_music.mp3';
  a.loop    = true;
  a.volume  = 0.20;
  a.preload = 'auto';
  return a;
})();

function startBgMusic(){
  _bgMusic.currentTime = 0;
  var p = _bgMusic.play();
  if(p && p.catch){ p.catch(function(){}); }
}

function stopBgMusic(){
  var step = _bgMusic.volume / 18;
  var fade = setInterval(function(){
    if(_bgMusic.volume > step){
      _bgMusic.volume = Math.max(0, _bgMusic.volume - step);
    } else {
      _bgMusic.volume = 0;
      _bgMusic.pause();
      clearInterval(fade);
    }
  }, 50);
}
