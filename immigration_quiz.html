<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Immigration Education – Ghana Immigration Service</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function(){
  'use strict';
  var _cs=document.createElement('style');
  _cs.id='cmg-cloak';
  _cs.textContent='body{visibility:hidden!important;pointer-events:none!important;}';
  document.head.appendChild(_cs);
  if(window.history&&window.history.pushState) window.history.pushState({cmgGuard:true},'',window.location.href);
  window.CMG_GUARD={
    init:function(opts){
      var quizKey=opts.quizKey||'unknown';
      var repeatable=opts.repeatable===true;
      var HUB='cadetnationalquiz.html';
      if(localStorage.getItem('cmgActivated')!=='true'||!localStorage.getItem('cadetName')||!localStorage.getItem('cmgCode')){
        window.location.replace('activate.html');return;
      }
      if(localStorage.getItem(quizKey+'Completed')==='true'&&!repeatable){window.location.replace(HUB);return;}
      var n=localStorage.getItem('cadetName')||'',c=localStorage.getItem('cmgCode')||'',exp=n+'|'+c;
      var sk=localStorage.getItem('cmgSessionKey');
      if(!sk){localStorage.setItem('cmgSessionKey',exp);}
      else if(sk!==exp){window.location.replace('activate.html');return;}
      localStorage.setItem('cmgLastPage',window.location.pathname.split('/').pop());
      window.addEventListener('popstate',function(){
        if(localStorage.getItem(quizKey+'Completed')==='true'&&!repeatable){window.location.replace(HUB);}
        else if(!localStorage.getItem('cmgActivated')){window.location.replace('activate.html');}
        else if(window.history&&window.history.pushState) window.history.pushState({cmgGuard:true},'',window.location.href);
      });
      var el=document.getElementById('cmg-cloak');if(el)el.parentNode.removeChild(el);
      document.body.style.visibility='';document.body.style.pointerEvents='';
    },
    complete:function(quizKey,score,repeatable){
      localStorage.setItem(quizKey+'Score',String(score));
      if(!repeatable)localStorage.setItem(quizKey+'Completed','true');
      if(window.history&&window.history.replaceState) window.history.replaceState({cmgDone:true},'',window.location.href);
      window.location.replace('cadetnationalquiz.html');
    }
  };
})();
</script>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(160deg,#001428 0%,#002855 30%,#003d7a 60%,#004d96 80%,#0060b8 100%);
  animation:immigFlicker 5s ease-in-out infinite alternate;
  color:#fff;display:flex;flex-direction:column;align-items:center;padding:15px;margin:0;min-height:100vh;}
.logos{display:flex;flex-direction:column;align-items:center;width:100%;max-width:900px;margin-bottom:10px;}
.logos img:first-child{height:150px;margin-bottom:8px;}
.all-services-logo{width:700px;max-width:95%;display:block;margin:0 auto 10px auto;
  filter:drop-shadow(0 0 15px rgba(255,255,255,0.6)) drop-shadow(0 0 30px rgba(255,215,0,0.6));
  animation:fadeInLogo 2s ease-out,floatLogo 4s ease-in-out infinite;}
@keyframes fadeInLogo{from{opacity:0;transform:scale(0.7);}to{opacity:1;transform:scale(1);}}
@keyframes floatLogo{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
h1{font-size:20px;margin:5px 0 12px;text-align:center;}
.quiz-container{background:rgba(0,8,25,0.65);position:relative;z-index:1;padding:20px;border-radius:12px;
  width:100%;max-width:560px;display:flex;flex-direction:column;gap:12px;}
.timer-row{display:flex;align-items:center;gap:10px;font-size:14px;}
.timer-bar-container{flex:1;background:rgba(255,255,255,0.2);border-radius:12px;height:12px;}
.timer-bar{width:100%;height:100%;background:#00ff00;border-radius:12px;}
.progress-bar{width:100%;background:rgba(255,255,255,0.2);border-radius:12px;overflow:hidden;height:10px;}
.progress{height:100%;width:0%;background:#f2c300;transition:width 0.3s;}
.meta-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.q-counter{font-size:12px;opacity:0.65;}
.q-type{font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;letter-spacing:.5px;}
#question{font-size:15px;font-weight:bold;line-height:1.6;}
.answers{display:flex;flex-direction:column;gap:8px;}
.answers button{background:rgba(255,255,255,0.08);color:#fff;
  border:2px solid rgba(255,255,255,0.15);border-radius:10px;padding:11px 13px;
  font-size:13px;font-weight:bold;cursor:pointer;text-align:left;transition:all 0.2s;}
.answers button:hover:not(:disabled){background:rgba(255,255,255,0.2);transform:scale(1.02);}
.answers button.correct{background:rgba(0,200,80,0.5)!important;border-color:#00c850!important;}
.answers button.wrong{background:rgba(220,50,50,0.5)!important;border-color:#dc3232!important;}
.answers button:disabled{cursor:default;}
.result{text-align:center;display:none;padding:25px 15px;}

/* ══════════════════════════════════════
   CMG WELCOME SCREEN
══════════════════════════════════════ */
#cmgWelcome{
  position:fixed;inset:0;z-index:99999;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center, #002060 0%, #000814 100%);
  overflow:hidden;
}
/* animated star field */
#cmgWelcome .stars{
  position:absolute;inset:0;pointer-events:none;overflow:hidden;
}
#cmgWelcome .star{
  position:absolute;border-radius:50%;background:#fff;
  animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}

/* floating particles */
#cmgWelcome .particle{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:floatUp var(--pd,6s) ease-in-out infinite var(--pdelay,0s);
  opacity:0;
}
@keyframes floatUp{
  0%{transform:translateY(0) scale(0);opacity:0;}
  20%{opacity:.7;}
  80%{opacity:.4;}
  100%{transform:translateY(-120vh) scale(1.5);opacity:0;}
}

/* card */
#cmgCard{
  position:relative;z-index:2;
  background:linear-gradient(160deg,rgba(0,15,40,.97) 0%,rgba(0,30,70,.97) 100%);
  border:2px solid rgba(255,215,0,.6);
  border-radius:22px;padding:32px 28px 26px;
  width:92%;max-width:400px;text-align:center;
  box-shadow:0 0 60px rgba(255,215,0,.2),0 20px 60px rgba(0,0,0,.8);
  animation:cardPop .55s cubic-bezier(.175,.885,.32,1.275) forwards;
}
@keyframes cardPop{
  0%{transform:scale(.6) translateY(40px);opacity:0;}
  100%{transform:scale(1) translateY(0);opacity:1;}
}

/* gold glow ring */
#cmgCard::before{
  content:'';position:absolute;inset:-3px;border-radius:24px;z-index:-1;
  background:linear-gradient(45deg,#FFD700,#ff6b00,#FFD700,#00d4ff,#FFD700);
  background-size:300% 300%;
  animation:ringRotate 3s linear infinite;
  filter:blur(6px);opacity:.6;
}
@keyframes ringRotate{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}

.wBadge{
  display:inline-block;
  background:linear-gradient(135deg,#FFD700,#e6a800);
  color:#000;font-weight:900;font-size:11px;letter-spacing:2px;
  text-transform:uppercase;border-radius:20px;padding:4px 14px;margin-bottom:12px;
}
.wEmoji{font-size:54px;display:block;margin-bottom:4px;animation:bounce .8s ease-in-out infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-8px);}}

.wGreeting{font-size:13px;color:rgba(255,215,0,.7);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.wName{
  font-size:28px;font-weight:900;
  background:linear-gradient(90deg,#FFD700,#fff,#FFD700);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 2s linear infinite;margin-bottom:2px;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}

.wService{font-size:16px;font-weight:700;color:#fff;margin-bottom:2px;}
.wOrg{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-bottom:16px;}

/* tip box */
.wTip{
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);
  border-radius:10px;padding:10px 14px;margin-bottom:18px;
  font-size:12.5px;color:rgba(255,255,255,.78);line-height:1.55;font-style:italic;
}
.wTip span{color:#FFD700;font-weight:700;font-style:normal;}

/* progress dots (3 animated) */
.wDots{display:flex;justify-content:center;gap:6px;margin-bottom:16px;}
.wDot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,215,0,.3);
  animation:dotPulse 1.2s ease-in-out infinite;
}
.wDot:nth-child(2){animation-delay:.2s;}
.wDot:nth-child(3){animation-delay:.4s;}
@keyframes dotPulse{0%,100%{background:rgba(255,215,0,.3);transform:scale(1);}50%{background:#FFD700;transform:scale(1.4);}}

/* CTA button */
#cmgStartBtn{
  background:linear-gradient(45deg,#FFD700,#e6a800);
  color:#000;border:none;border-radius:14px;
  padding:15px 0;width:100%;font-size:17px;font-weight:900;
  cursor:pointer;letter-spacing:.4px;
  box-shadow:0 6px 24px rgba(255,215,0,.45);
  transition:transform .15s,box-shadow .15s;
  animation:ctaPulse 1.8s ease-in-out infinite;
}
@keyframes ctaPulse{
  0%,100%{box-shadow:0 6px 24px rgba(255,215,0,.4);}
  50%{box-shadow:0 6px 40px rgba(255,215,0,.9);}
}
#cmgStartBtn:active{transform:scale(.96);}

.wFooter{margin-top:12px;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:1px;}

.q-image-wrap{
  width:100%;border-radius:12px;overflow:hidden;
  border:2px solid rgba(0,150,255,0.4);background:#000d22;
  position:relative;padding:10px;box-sizing:border-box;
}
.q-image-wrap svg{width:100%!important;height:auto!important;max-height:220px;display:block;}
.q-image-wrap>img{width:100%!important;height:auto!important;max-height:220px;display:block;object-fit:contain;border-radius:6px;}
.q-image-wrap>div{width:100%!important;display:flex!important;gap:4px!important;box-sizing:border-box;}
.q-image-wrap>div>img{flex:1!important;min-width:0!important;max-height:190px!important;object-fit:cover!important;border-radius:6px!important;display:block!important;}
.q-image-label{position:absolute;top:8px;left:8px;background:rgba(0,40,100,0.9);color:#fff;font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;z-index:2;}


/* ══ LIVE STAR SCORE BAR ══ */
#starBar{width:100%;max-width:560px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,215,0,0.25);border-radius:12px;padding:8px 12px;display:none;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:4px;}
#starBar .sb-label{font-size:11px;font-weight:bold;color:rgba(255,215,0,0.7);margin-right:6px;white-space:nowrap;}
.sb-star{font-size:20px;line-height:1;display:inline-block;opacity:0.25;transition:opacity 0.2s;}
.sb-star.earned{opacity:1;animation:starPop 0.45s cubic-bezier(0.175,0.885,0.32,1.6) forwards;}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg);}60%{transform:scale(1.5) rotate(10deg);}100%{transform:scale(1) rotate(0deg);}}
</style>
</head>

  {type:"image",svgKey:"gis_badge",question:"This is the Ghana Immigration Service emblem. Which ministry does the GIS operate under?",answers:["Ministry of the Interior", "Ministry of Foreign Affairs", "Ministry of Justice", "Ministry of Finance"],correct:0,explain:"The Ghana Immigration Service operates under the Ministry of the Interior alongside the Ghana Police Service, Ghana Prisons Service and NADMO. It was established in 1948 and is responsible for regulating the entry, stay and exit of persons in Ghana."},

  {type:"image",svgKey:"gis_badge",question:"The GIS badge shows its hotline. What number should you call to report a suspected human trafficking case to the GIS?",answers:["191", "+233 302 224 446 or the HCTU on 0800 900 110", "The longer number 0800 111 222 is the correct GIS trafficking hotline", "193"],correct:1,explain:"To report human trafficking or immigration violations, call the GIS on +233 302 224 446 or the Human Trafficking Contact Unit (HCTU) toll-free on 0800 900 110. The Police (191) and the general emergency number (112) can also be used. 0800 111 222 is NADMO's number, not GIS."},

  {type:"image",svgKey:"passport_types",question:"This image shows different Ghana travel documents. Which document allows a child under 18 to travel internationally?",answers:["Children can travel on their parent's passport until age 15", "A child must have their own separate passport — they cannot travel on a parent's passport", "A birth certificate is sufficient for ECOWAS travel for children under 10", "Children only need a school identity card for regional travel"],correct:1,explain:"Every child must have their own passport to travel internationally. A child cannot be included on a parent's passport. Ghana issues child passports valid for 2 years (under 18) compared to 5 years for adults. Even infants travelling internationally require their own passport."},

  {type:"image",svgKey:"passport_types",question:"This image shows Ghana travel documents. How long is a standard Ghanaian adult passport valid?",answers:["10 years", "Indefinitely until all pages are full", "2 years", "5 years"],correct:3,explain:"A standard Ghanaian adult passport is valid for 5 years. Child passports (under 18) are valid for 2 years. The biometric passport contains a chip with the holder's fingerprints and facial recognition data, making it much harder to forge than earlier passport types."},

  {type:"image",svgKey:"ecowas_map",question:"This map shows the 15 ECOWAS member states. How many days can a Ghanaian citizen stay in another ECOWAS country without a visa?",answers:["90 days", "30 days", "14 days", "365 days — ECOWAS citizens have unlimited movement"],correct:0,explain:"ECOWAS citizens, including Ghanaians, can travel to any of the 15 member states and stay for up to 90 days without a visa. This right requires a valid passport or ECOWAS Travel Certificate. After 90 days, a residence permit must be obtained from the host country's immigration authority."},

  {type:"image",svgKey:"ecowas_map",question:"This ECOWAS map shows Ghana's neighbours. Which country, visible on this map, is NOT an ECOWAS member state?",answers:["Togo", "Cameroon", "Burkina Faso", "Côte d'Ivoire"],correct:1,explain:"Cameroon is NOT an ECOWAS member state. ECOWAS has 15 members: Benin, Burkina Faso, Cape Verde, Côte d'Ivoire, The Gambia, Ghana, Guinea, Guinea-Bissau, Liberia, Mali, Niger, Nigeria, Senegal, Sierra Leone and Togo. Cameroon is in Central Africa and is part of ECCAS (Economic Community of Central African States)."},

  {type:"image",svgKey:"human_trafficking",question:"This image shows human trafficking recruitment tactics. Which warning sign is the STRONGEST indicator that a job offer is a trafficking scheme?",answers:["The job is in another country", "The pay offered is higher than local jobs", "The recruiter offers to handle all your travel documents and passport", "The job description involves hospitality or domestic work"],correct:2,explain:"When a recruiter insists on keeping your passport and handling all your documents, this is the most dangerous trafficking warning sign — it removes your ability to leave, seek help or prove your identity. Legitimate employers never need to hold your passport. Any offer where someone else controls your documents is a red flag requiring immediate refusal and reporting."},

  {type:"image",svgKey:"human_trafficking",question:"This image shows trafficking warning signs. What is the Anti-Human Trafficking Unit in Ghana and how does it connect to the GIS?",answers:["The AHTU is a military unit — separate from the Ghana Immigration Service entirely", "The unit only handles trafficking cases involving foreign nationals, not Ghanaians", "AHTU is the name used in Nigeria — Ghana uses a different system entirely", "The HCTU (Human Trafficking Contact Unit) at GIS coordinates with Police"],correct:3,explain:"Ghana's Human Trafficking Contact Unit (HCTU), operated with GIS involvement, coordinates with the Ghana Police, Department of Social Welfare, MOWAC and NGOs like IJM to investigate trafficking, rescue victims and prosecute traffickers. Ghana's Human Trafficking Act 2005 (Act 694) criminalises all forms of trafficking with penalties up to 25 years imprisonment."},

  {type:"image",svgKey:"border_control",question:"This image shows official ports of entry. Why must all international travellers enter Ghana through these official points?",answers:["Because only official points have ATMs and foreign currency exchange", "Because it is the fastest and cheapest route to travel", "Because unofficial routes have poor road surfaces", "To comply with immigration law — official entry allows passport stamping"],correct:3,explain:"Official ports of entry exist for critical reasons: passport stamping records legal entry and permitted duration of stay, customs checks prevent smuggling of prohibited goods, health screening can identify disease outbreaks, and security checks prevent entry of criminals and prohibited persons. Bypassing official entry is a criminal offence and removes all legal protections."},

  {type:"image",svgKey:"border_control",question:"This image shows Ghana's official border crossings. A person crosses into Ghana through a bush path to avoid the official Aflao border post. What crime have they committed?",answers:["No crime — freedom of movement is a human right that cannot be restricted", "Illegal entry — a criminal offence under the Immigration Act 2000 (Act 573) punishable by fine a", "Only a civil offence requiring payment of a processing fee at the nearest GIS office", "A minor administrative violation with no serious consequences"],correct:1,explain:"Illegal entry (entering Ghana outside official ports of entry without immigration processing) is a criminal offence under the Ghana Immigration Act 2000 (Act 573). Consequences include arrest, detention, prosecution, fines, deportation and a possible ban from re-entering Ghana. Illegal entrants have no legal documentation of their stay and are vulnerable to exploitation."},

  {type:"image",svgKey:"visa_types",question:"This image shows visa types. A foreign student accepted at a Ghanaian university needs which document to legally study in Ghana?",answers:["A tourist visa is sufficient — it can be extended indefinitely for students", "Any visa type — the university handles the rest with the immigration service", "A student visa, obtained from a Ghana embassy before arrival", "No visa is required for students from any African country"],correct:2,explain:"Foreign students studying in Ghana require a student visa, obtained from a Ghana High Commission or Embassy in their home country before arrival. Required documents include an acceptance letter from a Ghana Tertiary Education Commission (GTEC)-accredited institution. The student visa must be renewed each academic year. Working without a separate work permit while on a student visa is illegal."},

  {type:"image",svgKey:"visa_types",question:"This visa diagram shows different permits. What is a resident permit and who needs one in Ghana?",answers:["A resident permit is the same as citizenship — both give permanent rights to live in Ghana", "A resident permit is only for diplomats and foreign government officials", "Foreign nationals staying in Ghana beyond their visa period need a resident permit", "Only Commonwealth citizens need resident permits — other nationalities receive automatic long-term residence"],correct:2,explain:"A resident permit allows foreign nationals to legally stay in Ghana beyond their initial visa period — typically for employment, business, family reunion or long-term residence. It must be obtained from the Ghana Immigration Service before the visa expires and renewed annually. Working in Ghana without a work permit (separate from a resident permit) is also illegal and can result in deportation."},

  {type:"image",svgKey:"refugee_asylum",question:"This image shows refugee and asylum seeker definitions. What is Ghana's legal obligation to asylum seekers under international law?",answers:["As a signatory to the 1951 Refugee Convention, Ghana must not return asylum seekers to countries where they face pe", "Ghana has no legal obligation — it may accept or refuse any asylum seeker at its discretion", "Ghana only accepts refugees from neighbouring countries — others must go to UN camps in other countries", "Ghana accepts refugees but is not legally bound by international refugee law"],correct:0,explain:"Ghana ratified the 1951 UN Refugee Convention and its 1967 Protocol, which establishes the principle of non-refoulement — Ghana cannot return a refugee to a country where they face persecution, torture or death. Ghana works with UNHCR, which maintains registration centres at Buduburam and Krisan. Ghana hosts approximately 14,000 registered refugees."},

  {type:"image",svgKey:"deportation_overstay",question:"This image shows consequences of overstaying a visa. What is the correct action if a foreigner in Ghana realises their visa is about to expire?",answers:["Leave Ghana immediately through any available route, including unofficial border crossings", "Visit the Ghana Immigration Service office before the visa expires to apply for an extension or permit", "Overstaying by a few days is always forgiven — GIS only prosecutes those who overstay by months", "Report to the nearest Police station to voluntarily surrender"],correct:1,explain:"The correct action is to visit the nearest Ghana Immigration Service office BEFORE the visa expires to apply for an extension. GIS has offices in Accra (headquarters), Kumasi, Takoradi and all regional capitals. Applying before expiry is legal and usually straightforward. Applying after expiry means the person is already in violation, faces fines and possible detention."},

  {type:"text",question:"What is the Ghana Immigration Service's primary mandate?",answers:["To manage Ghana's customs and revenue collection at all ports", "To regulate the entry, residence, employment and exit of persons in Ghana and enforc", "To provide national security and border defence against military threats", "To issue national identity cards and manage Ghana's civil registration"],correct:1,explain:"The Ghana Immigration Service (GIS) is responsible for: regulating the entry and exit of persons through official ports, managing the stay of foreigners in Ghana, issuing permits and visas, enforcing the Ghana Immigration Act 2000 (Act 573), and combating human trafficking and illegal migration."},

  {type:"text",question:"What is a visa overstay and what is the typical fine in Ghana?",answers:["A visa overstay means leaving Ghana before the visa expires — fine is GHS 500", "A visa overstay only applies to non-African visitors — African visitors have unlimited stay", "A visa overstay is legal for ECOWAS citizens as long as they register with GIS monthly", "A visa overstay means remaining in Ghana beyond the permitted period on the entry stamp or visa"],correct:3,explain:"Overstaying a visa means remaining in Ghana beyond the legally permitted period. This is a criminal offence. Fines can exceed GHS 5,000 per month of overstay. The person may also be detained, deported at their own cost, and banned from re-entering Ghana. Always extend your stay BEFORE the visa expires at a GIS office."},

  {type:"text",question:"Under what law does the Ghana Immigration Service operate?",answers:["The Ghana Immigration Act 2000 (Act 573) as amended", "The Immigration Act 1999", "The Border Control Act 1986", "The ECOWAS Free Movement Protocol exclusively"],correct:0,explain:"The Ghana Immigration Service operates primarily under the Ghana Immigration Act 2000 (Act 573), as amended by the Immigration (Amendment) Act 2012 (Act 848). This Act defines immigration offences, penalties, the powers of immigration officers, and the conditions for entry, stay and work permits for foreigners in Ghana."},

  {type:"text",question:"What is the difference between a migrant worker and a human trafficking victim?",answers:["A migrant worker voluntarily chooses to work abroad and retains their rights and documents", "There is no legal difference — all migration for work is considered trafficking under Ghanaian law", "Migrant workers are legal; trafficking victims are illegal — it is purely a documentation issue", "Trafficking only happens to women and children — adult men cannot be trafficking victims"],correct:0,explain:"The fundamental difference is consent and freedom. A migrant worker voluntarily chooses where to work, retains their passport, can leave, and has agreed to genuine employment terms. A trafficking victim was deceived, coerced or forced — they cannot leave freely, their documents are taken, they are exploited and they do not receive what was promised. Men, women and children can all be trafficking victims."},

  {type:"text",question:"What does ECOWAS stand for and how many member states does it have?",answers:["East Coast West African States — 12 members", "Eastern Community of West Africa and Sudan — 16 members", "Economic Community of West African States — 15 members", "Economic Council of West African States — 14 members"],correct:2,explain:"ECOWAS stands for Economic Community of West African States. It has 15 member states: Benin, Burkina Faso, Cape Verde, Côte d'Ivoire, The Gambia, Ghana, Guinea, Guinea-Bissau, Liberia, Mali, Niger, Nigeria, Senegal, Sierra Leone and Togo. The ECOWAS Protocol on Free Movement allows citizens to travel between member states without a visa for up to 90 days."},

  {type:"text",question:"A friend asks Kofi to carry an envelope across the border for them, saying it contains just documents. What should Kofi do?",answers:["Carry it — his friend is trustworthy and documents are not prohibited items", "Carry it but declare it at the customs counter", "Accept only if the friend shows him the contents first", "Refuse firmly — carrying items across borders for unknown purposes can make him crimina"],correct:3,explain:"Never carry items across borders for others, regardless of what they claim the contents are. Smugglers use innocent people as unwitting carriers of drugs, counterfeit currency, stolen goods or illegal documents. Kofi would face arrest and prosecution regardless of whether he knew the contents. The same applies to luggage being checked in for others — always refuse."},

  {type:"text",question:"What is the Ghana Card (national identity card) and can it be used for international travel?",answers:["The Ghana Card is an immigration document issued by GIS and valid for ECOWAS travel only", "The Ghana Card is a biometric national ID issued by the NIA (National Identification Authority)", "The Ghana Card replaces the passport entirely for all international travel", "The Ghana Card is only for domestic use — it has no international recognition whatsoever"],correct:1,explain:"The Ghana Card is a biometric national identity card issued by the National Identification Authority (NIA), not the GIS. It is accepted for ECOWAS travel within member states as an alternative to a passport. For travel outside ECOWAS countries, a valid passport with appropriate visa is required. The Ghana Card also serves as proof of Ghanaian citizenship."},

  {type:"text",question:"What is illegal immigration and what are Ghana's laws against it?",answers:["Illegal immigration only applies to people who cross land borders — sea and air arrival is always treated as legal", "Illegal immigration means entering, residing or working in Ghana without valid authorization", "Illegal immigration is a civil matter handled by administrative fines only — there is no criminal prosecution", "Illegal immigration only applies to non-ECOWAS citizens — ECOWAS nationals cannot commit illegal immigration offences in Ghana"],correct:1,explain:"Illegal immigration under Ghana's Immigration Act 2000 (Act 573) includes: entering without passing through official ports of entry, remaining after a visa has expired, working without a work permit, using fraudulent documents, and assisting others to enter illegally. All are criminal offences. ECOWAS citizens still require official entry through designated ports even though they need no visa."},

  {type:"text",question:"What is the role of a Ghana Immigration Officer at a port of entry?",answers:["To provide tourism information to arriving passengers and direct them to hotels", "To collect customs duties on imported goods from passengers", "To check travel documents, verify identity, grant or refuse entry", "To coordinate ground transportation for arriving passengers"],correct:2,explain:"Immigration Officers at ports of entry: verify the identity and travel documents of all arriving and departing persons, determine whether entry requirements are met (valid visa, sufficient funds, return ticket), grant or refuse entry, record the permitted duration of stay in the passport, intercept prohibited persons and enforce the Immigration Act. They work alongside Customs and Airport Security."},

  {type:"text",question:"What is a work permit and who needs one in Ghana?",answers:["Any Ghanaian working abroad needs a Ghana work permit to be issued by GIS", "Work permits are only required for non-ECOWAS citizens working in Ghana", "Foreign nationals working in Ghana need a work permit from GIS", "Only manual labourers need work permits — professionals like doctors and engineers work freely under ECOWAS"],correct:2,explain:"Any foreign national wishing to work in Ghana must obtain a work permit from the Ghana Immigration Service, regardless of their nationality. The employer is also legally responsible for ensuring their foreign employees have valid permits. Working without a permit can result in deportation of the employee and prosecution of the employer under Act 573. ECOWAS citizens also require work permits despite having visa-free entry."},

  {type:"text",question:"What is the Non-Citizen Identity Card in Ghana and who receives it?",answers:["A biometric identity card issued by GIS to foreigners legally residing in Ghana", "A special ID given to Ghanaians living abroad to prove their nationality", "A card for immigrants who have applied for citizenship but have not yet received it", "A temporary document issued at the airport to visitors who arrive without valid visas"],correct:0,explain:"The Non-Citizen Identity Card (NCID) is issued by the Ghana Immigration Service to foreign nationals who are legally residing in Ghana. It serves as official proof of legal residence status in Ghana and must be carried at all times. GIS can request to see it at any checkpoint. The card reduces harassment of legally resident foreigners who might otherwise lack documentation."},

  {type:"text",question:"Ama sees a social media post offering young Ghanaian girls jobs as waitresses in a Gulf country with accommodation included. What should she do?",answers:["Apply immediately — Gulf countries pay well and this is a legitimate opportunity", "Research the employer carefully, verify through the Ghana mission in that country, and never travel through an agent who wants to handle your passport", "Report it immediately to the Human Trafficking Contact Unit (0800 900 110) and the GIS — unsolicited overseas job offers matching this pattern are a known trafficking recruitment method", "Accept only if the offer comes with a formal employment contract"],correct:1,explain:"'Waitress' or 'domestic helper' jobs in Gulf countries advertised on social media are a primary trafficking recruitment channel in Ghana. Red flags: offer is unsolicited, agent handles passport, accommodation is included (means you are controlled), the offer sounds too good. Report to the Human Trafficking Contact Unit: 0800 900 110. GIS and Police investigate these cases. Ghana has strict agreements with some Gulf states after documented cases of exploitation."},

  {type:"text",question:"What is the difference between deportation and extradition?",answers:["Deportation is removing an immigration violator to their home country", "Deportation is voluntary — extradition is forced removal", "They are the same — both mean forcibly removing someone from a country", "Deportation is for criminals — extradition is for illegal immigrants"],correct:0,explain:"Deportation removes someone who has violated immigration law (overstayed, entered illegally, lost the right to remain) back to their home country. Extradition transfers a person to another country to face criminal charges for a specific crime committed there — it requires a formal legal treaty and court process. Ghana has extradition agreements with several countries including the UK and USA."},

  {type:"text",question:"What should a Ghanaian student do before travelling abroad for the first time?",answers:["Register with the Ghana Police Service to get a travel clearance letter", "Visit the GIS headquarters in Accra to register the intended travel dates", "Only a passport is required — visa and insurance are optional for students", "Obtain a valid Ghanaian passport, check visa requirements for the destination country"],correct:3,explain:"Before travelling abroad: ensure passport is valid (at least 6 months remaining), check visa requirements for the destination country, register with the nearest Ghana Embassy or High Commission abroad (important for emergencies), obtain travel insurance, keep copies of all documents separately, and share your itinerary with a trusted family member."},

  {type:"text",question:"What is the Tier 1 designation in the US State Department's Trafficking in Persons Report and why does it matter for Ghana?",answers:["Tier 1 means a country fully meets minimum standards to eliminate trafficking", "Tier 1 means a country is the world's worst trafficker — Ghana has been designated Tier 1 multiple times", "Tier 1 is a US military ranking that has no connection to Ghana's immigration policy", "Tier 1 means a country receives US funding for border security programmes"],correct:0,explain:"The US TIP Report Tier 1 designation means the country fully complies with minimum standards for the elimination of human trafficking. Ghana has fluctuated between tiers, reflecting progress and setbacks in anti-trafficking enforcement. Ghana's Human Trafficking Act 2005 (Act 694) provides penalties of up to 25 years imprisonment. The GIS, Police and CHRAJ all play roles in enforcement."},

  {type:"text",question:"Can a Ghanaian citizen be deported from Ghana?",answers:["Yes — the government can deport any citizen if they commit a serious crime", "Yes — dual citizens can be deported if they hold citizenship of another country", "No — Ghanaian citizens cannot be deported from Ghana as they have an absolute right of abod", "Only naturalised citizens can be deported — birth citizens are fully protected"],correct:2,explain:"Ghanaian citizens have an absolute constitutional right of abode in Ghana — they cannot be deported from their own country. Deportation applies only to foreign nationals who violate immigration law. A Ghanaian who commits a crime is subject to Ghanaian criminal law (prosecution, imprisonment) but cannot be sent to another country against their will, unless an extradition process is followed for crimes committed abroad."},

  {type:"text",question:"What is a visa on arrival and does Ghana offer it?",answers:["A visa on arrival means the country has no immigration controls at all", "Ghana offers visa on arrival to all visitors from any country worldwide", "A visa on arrival is granted at the port of entry rather than requiring advance application at an embassy", "Visa on arrival is only available at Kotoka International Airport, not at land or sea borders"],correct:2,explain:"A visa on arrival is issued to a traveller upon arrival at the port of entry, without requiring an advance visa application. Ghana offers visa on arrival to citizens of some countries (the list changes periodically). Most non-ECOWAS visitors are advised to obtain a visa in advance from a Ghana High Commission or Embassy to avoid being turned back at the border. Check the GIS website for current visa on arrival eligibility."},

  {type:"text",question:"What is the significance of the machine-readable zone (MRZ) at the bottom of a passport's photo page?",answers:["It is purely decorative — it has no functional purpose in modern travel", "The MRZ is only read by banks and financial institutions, not immigration services", "The MRZ zone is where immigration officers write entry notes by hand", "The MRZ contains the holder's key personal data in standardised format that airport scanners r"],correct:3,explain:"The Machine Readable Zone (MRZ) at the bottom of the passport bio-data page contains the holder's name, nationality, date of birth, passport number and expiry date in a standardised format. Airport scanners read this automatically, enabling instant cross-checking against Interpol watchlists, stolen passport databases and immigration records from previous travel. Ghana's biometric passport also contains an RFID chip with additional biometric data."},

  {type:"text",question:"What is the purpose of the Ghana Immigration Service's Border Patrol Unit?",answers:["To escort diplomatic vehicles through border checkpoints", "To collect tolls on roads near Ghana's borders", "To manage traffic at official border crossing points", "To monitor and prevent illegal cross-border activity including irreg"],correct:3,explain:"The GIS Border Patrol Unit patrols the areas between official ports of entry to intercept illegal crossings, smugglers, traffickers and other prohibited persons. Ghana's borders with Togo, Côte d'Ivoire, Burkina Faso and Togo span hundreds of kilometres of porous terrain. The unit works with the Ghana Police Service and military (NACOB, Army) on joint border operations."},

  {type:"text",question:"What rights does a detained foreign national have in Ghana?",answers:["None — a detained foreign national has no rights under Ghanaian law", "The right to be informed of the reason for detention", "Only the right to food and water — no legal representation rights", "Rights depend entirely on the nationality of the detained person"],correct:1,explain:"Even detained foreign nationals retain fundamental rights under Ghana's 1992 Constitution and international law: the right to be informed of the reason for detention, the right to contact their embassy or consulate (the embassy must be notified), the right to a lawyer, the right to humane treatment, and the right to challenge detention through habeas corpus. Immigration detention must follow legal procedures and cannot be indefinite."},

  {type:"text",question:"What is naturalisation and what are the requirements in Ghana?",answers:["Naturalisation is only available to persons who marry Ghanaian citizens", "Naturalisation is automatic after 1 year of legal residence for ECOWAS citizens", "Naturalisation is the process by which a foreigner becomes a Ghanaian citizen", "Naturalisation in Ghana takes 25 years of continuous residence and approval by Parliament"],correct:2,explain:"Naturalisation in Ghana allows eligible foreigners to become Ghanaian citizens. Requirements typically include: at least 5 years of legal continuous residence, good character (no criminal record), integration into Ghanaian society, knowledge of an indigenous language or English, and renunciation of previous citizenship (Ghana does not generally allow dual citizenship except in specific circumstances under the Constitution)."},

  {type:"text",question:"What is the role of Ghana's Consulates and High Commissions abroad in relation to immigration?",answers:["They only promote trade and investment — immigration matters are handled entirely within Ghana", "They only serve Ghanaian government officials — ordinary citizens must use private visa agencies", "They issue visas, renew passports for Ghanaians abroad, assist Ghanaians in distress (including trafficking victims)", "They have no power to issue any documents — all passport and visa matters must be handled in Ghana"],correct:2,explain:"Ghana's Diplomatic Missions (High Commissions in Commonwealth countries, Embassies elsewhere, Consulates in major cities) provide: visa issuance for those wishing to visit Ghana, passport renewal for Ghanaians abroad, emergency travel certificates for Ghanaians who lose their passport, consular assistance for Ghanaians arrested or in difficulty abroad, and registration of Ghanaian births and marriages overseas."},

  {type:"text",question:"What is document fraud in the context of immigration and what are the penalties?",answers:["Using forged, altered or fraudulently obtained travel documents — a serious criminal offence under Act 573 with penalties includ", "Using a slightly different spelling of your name on different documents — this is treated as an administrative error", "A minor offence if the underlying information about the person is accurate", "Document fraud only applies to counterfeit documents — altering genuine documents is not an offence"],correct:0,explain:"Document fraud in immigration includes: using a forged passport, altering dates or details in a genuine document, using someone else's document, obtaining a visa through false information, or presenting fraudulent supporting documents. Under the Ghana Immigration Act, document fraud carries penalties including imprisonment, deportation and a permanent ban from re-entering Ghana. It is also an international crime recorded in Interpol databases."},

  {type:"text",question:"What should a Ghanaian do if their passport is lost or stolen while abroad?",answers:["Return immediately to Ghana to apply for a new passport at the GIS headquarters", "Report to the local police to get a police report, then immediately contact the nearest Ghana Embassy ", "Apply online through the GIS website and receive a digital passport within 24 hours", "Contact the Ghanaian airline operating in that country to arrange travel without documents"],correct:1,explain:"If your passport is lost or stolen abroad: immediately report to local police and obtain a police report (essential for the embassy process), then contact the nearest Ghana Embassy or High Commission. They will verify your identity and issue an Emergency Travel Certificate (ETC) — a single-journey document allowing you to return to Ghana. Apply for a replacement passport at GIS on your return. Report a lost passport even if later found."},

  {type:"text",question:"What is the Ghana Immigration Service's stance on child immigration and unaccompanied minors?",answers:["Unaccompanied minors and children not travelling with their parents require special authorisation letters", "Children can travel on their parent's passport and no additional documentation is required", "Children under 18 can travel internationally without any special requirements as long as they have a passport", "Immigration authorities have no special role in child travel — it is the responsibility of airlines only"],correct:0,explain:"GIS applies special scrutiny to children travelling without both parents to prevent child trafficking. Required documentation typically includes: the child's own passport, a notarised parental consent letter if travelling without one or both parents, and the contact details of the receiving adult at the destination. Unaccompanied minors (travelling alone) require additional airline and immigration processing. This protects children from being trafficked across borders."},

  {type:"text",question:"What is the GIPC Investor Visa and how does it relate to GIS?",answers:["It is a military visa for foreign security consultants", "GIPC visas are only available to citizens of countries with bilateral investment treaties with Ghana", "It is a tourist visa specifically branded for business people visiting trade shows", "A special residence permit issued through GIS in coordination with the Ghana Investment Promotion Centre for for"],correct:3,explain:"The GIPC (Ghana Investment Promotion Centre) Investor Visa is a special residence permit for foreign investors who invest the required capital threshold in Ghana. GIS processes the permit in coordination with GIPC. It allows the investor and their immediate family to reside in Ghana for extended periods. It is part of Ghana's strategy to attract foreign direct investment by making immigration easier for qualifying investors."},

  {type:"text",question:"As a Ghanaian student, what is your responsibility if you see someone being recruited for suspicious overseas work?",answers:["Report to the Human Trafficking Contact Unit (0800 900 110), GIS or Police (191)", "Mind your own affairs — reporting could put you in danger from the recruiters", "It is not your business — adults can make their own decisions", "Only report if the person being recruited is a close relative"],correct:0,explain:"Every Ghanaian citizen has a civic responsibility to report suspected human trafficking. You can report anonymously to: the Human Trafficking Contact Unit toll-free on 0800 900 110, GIS on +233 302 224 446, or the Ghana Police on 191. Your tip could prevent someone from being enslaved. Under Ghana's Human Trafficking Act, the person being recruited may not realise the danger they are in — your report could save their life."},

  {type:"text",question:"What is the purpose of Ghana's immigration detention facilities?",answers:["To permanently house foreigners who cannot afford to leave Ghana", "To hold suspected criminals before trial — they serve the same function as police cells", "To punish illegal immigrants with harsh conditions as a deterrent to others", "To temporarily hold immigration violators (overstayers, illegal entrants"],correct:3,explain:"Immigration detention facilities hold foreign nationals who have violated immigration law while their cases are processed — determining their legal status, arranging deportation, or awaiting court proceedings. International standards (UNHCR, UN Detention Guidelines) require: humane conditions, minimum necessary detention period, access to lawyers and consular assistance, and that asylum seekers' claims are processed before deportation. Indefinite detention without due process is illegal."},

  {type:"text",question:"Ghana signed the 1951 Refugee Convention. What is the principle of non-refoulement?",answers:["The principle that refugees must be fluent in the local language before receiving protection", "A rule requiring refugees to pay for their own accommodation in the host country", "The binding international principle that a country must not return a refugee or asylum seeker to a country", "The principle that host countries can determine which nationalities qualify for refugee status"],correct:2,explain:"Non-refoulement (French: not to push back) is the cornerstone of international refugee law. It means Ghana cannot deport or return a refugee to their country of origin or any country where they face persecution, torture or death — even if they entered Ghana illegally. It is a jus cogens norm (non-derogable under international law). Ghana works with UNHCR to process refugee claims at centres in Accra, Buduburam and Krisan."},

  {type:"text",question:"What additional checks will Ghana face at foreign borders if the Ghanaian passport is used for criminal activity?",answers:["No additional checks — all passports are treated equally at all borders", "Individual passports used in crimes are cancelled — but Ghana as a country faces no consequences", "Only countries with direct bilateral agreements with Ghana perform additional checks", "Ghana risks losing visa-free access agreements if the passport gains a negative reputation for fraud or crime"],correct:3,explain:"A country's passport reputation directly affects the visa access and treatment its citizens receive at foreign borders. If Ghana's passport becomes associated with fraud or illegal activity, other countries may add Ghana to visa-required lists, increase scrutiny of Ghanaian travellers, or withdraw visa-free agreements. This is why GIS takes passport fraud extremely seriously and continuously upgrades security features in Ghana's biometric passport."}

let current=0, score=0, timerInterval, timeLeft, maxTime=90;
let QUESTIONS_ACTIVE=[];

window.addEventListener('DOMContentLoaded',function(){
  if(localStorage.getItem('cmgResultsSubmitted')==='true'){
    document.body.innerHTML='<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#001428,#003d7a);color:#fff;font-family:Arial,sans-serif;padding:30px;text-align:center;"><div style="font-size:60px;margin-bottom:16px;">🏅</div><h2 style="color:#FFD700;font-size:22px;margin-bottom:12px;">Quiz Already Submitted</h2><p style="font-size:14px;opacity:.8;max-width:360px;line-height:1.8;margin-bottom:24px;">You have already submitted your results to Cadet Media Ghana.<br>This quiz is now closed.<br><br>You may still practise on the <strong>General Quiz</strong>.</p><a href="quiz_questions.html" style="padding:14px 30px;background:linear-gradient(45deg,#FFD700,#e6a800);color:#000;border-radius:12px;font-weight:bold;font-size:15px;text-decoration:none;display:inline-block;">🏠 Back to Quiz Menu</a></div>';

  (function(){

function launchQuiz(name,school,gender){
  var bank=FULL_BANK.slice();
  for(var i=bank.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=bank[i];bank[i]=bank[j];bank[j]=t;}
  QUESTIONS_ACTIVE=bank.slice(0,30);
  var sb=document.getElementById('starBar');
  if(sb){
    sb.style.display='flex';
    sb.innerHTML='<span class="sb-label">⭐ Score:</span>';
    for(var si=0;si<QUESTIONS_ACTIVE.length;si++){
      var s=document.createElement('span');
      s.className='sb-star';s.id='sbStar'+si;s.textContent='★';
      sb.appendChild(s);
    }
  }
  document.getElementById('quizContainer').style.display='flex';
  var bar=document.getElementById('cadetBar');bar.style.display='block';
  var title=gender==='Female'?'Cadetess':'Cadet';
  bar.innerHTML='🛂 <strong>'+title+' '+name+'</strong> &nbsp;·&nbsp; '+school+' &nbsp;<span onclick="goBack()" style="font-size:11px;opacity:.5;cursor:pointer;text-decoration:underline;font-weight:normal;">Not you?</span>';
  showQuestion();
}
function goBack(){localStorage.removeItem('cadetName');localStorage.removeItem('cadetGender');localStorage.removeItem('cadetSchool');window.location.href='quiz_questions.html';}

function showQuestion(){
  if(window.speechSynthesis)speechSynthesis.cancel();
  document.getElementById('explanation').style.display='none';
  if(current>=QUESTIONS_ACTIVE.length){showResult();return;}
  var q=QUESTIONS_ACTIVE[current];
  document.getElementById('qCounter').textContent='Q'+(current+1)+' / '+QUESTIONS_ACTIVE.length;
  var qt=document.getElementById('qType');
  if(q.type==='image'&&q.svgKey){qt.textContent='🖼️ Image Question';qt.style.background='rgba(0,40,100,0.6)';}
  else{qt.textContent='🛂 Ghana Immigration Service';qt.style.background='rgba(0,30,80,0.6)';}
  var imgArea=document.getElementById('qImageArea');
  if(q.svgKey&&IMAGES[q.svgKey]){imgArea.innerHTML='<div class="q-image-wrap"><span class="q-image-label">🛂 Identify This</span>'+IMAGES[q.svgKey]+'</div>';}
  else{imgArea.innerHTML='';}
  document.getElementById('question').textContent=q.question;
  document.getElementById('progress').style.width=(current/QUESTIONS_ACTIVE.length*100)+'%';
  var ans=document.getElementById('answers');ans.innerHTML='';
  var labels=['A','B','C','D'];
  var shuffled=q.answers.map(function(text,origIdx){return{text:text,orig:origIdx};});
  for(var si=shuffled.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var st=shuffled[si];shuffled[si]=shuffled[sj];shuffled[sj]=st;}
  var newCorrect=shuffled.findIndex(function(item){return item.orig===q.correct;});
  window._currentShuffled=shuffled;window._currentNewCorrect=newCorrect;
  shuffled.forEach(function(item,i){
    var btn=document.createElement('button');
    btn.innerHTML='<span class="opt-label">'+labels[i]+'</span>'+item.text;
    btn.onclick=(function(idx,b){return function(){checkAnswer(idx,b);};})(i,btn);
    ans.appendChild(btn);
  });
  maxTime=90;startTimer();
  if(window.speechSynthesis){
    speechSynthesis.cancel();
    var readText='Ghana Immigration Service Quiz. Question '+(current+1)+'. '+q.question+'. Option A. '+shuffled[0].text+'. Option B. '+shuffled[1].text+'. Option C. '+shuffled[2].text+'. Option D. '+shuffled[3].text+'.';
    var uq=new SpeechSynthesisUtterance(readText);uq.lang='en-GB';uq.pitch=1.05;uq.rate=0.90;uq.volume=1.0;
    (function(){var vs=window.speechSynthesis.getVoices();var v=vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})||vs.find(function(x){return x.lang.startsWith('en-GB');})||vs.find(function(x){return x.lang.startsWith('en');});if(v)uq.voice=v;window.speechSynthesis.speak(uq);})();
    if(!window.speechSynthesis.getVoices().length){window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.onvoiceschanged=null;var vs=window.speechSynthesis.getVoices();var v=vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})||vs.find(function(x){return x.lang.startsWith('en-GB');})||vs.find(function(x){return x.lang.startsWith('en');});if(v)uq.voice=v;window.speechSynthesis.speak(uq);};}
  }
}
function startTimer(){
  clearInterval(timerInterval);timeLeft=maxTime;
  document.getElementById('time').textContent=timeLeft;
  var bar=document.getElementById('timerBar');bar.style.width='100%';bar.style.background='#00ff00';

  var yellowAt=Math.floor(maxTime*0.5);
  var redAt=Math.floor(maxTime*0.25);
  var _yellowed=false,_redded=false;

  function timerSpeak(text,pitch,rate){
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang='en-GB';u.pitch=pitch||1.05;u.rate=rate||0.95;u.volume=1.0;
    function pickV(){
      var vs=window.speechSynthesis.getVoices();
      return vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})||
             vs.find(function(v){return v.lang.startsWith('en-GB');})||
             vs.find(function(v){return v.lang.startsWith('en');});
    }
    var v=pickV();if(v)u.voice=v;
    speechSynthesis.speak(u);
  }

  timerInterval=setInterval(function(){
    timeLeft--;document.getElementById('time').textContent=timeLeft;
    var pct=timeLeft/maxTime*100;bar.style.width=pct+'%';bar.style.background=pct>50?'#00ff00':pct>25?'#ffd700':'#ff4444';

    var firstName=(localStorage.getItem('cadetName')||'Cadet').split(' ')[0];

    if(!_yellowed&&timeLeft<=yellowAt&&timeLeft>redAt){
      _yellowed=true;
      var msgs=['Keep going, '+firstName+'! You are halfway through your time.',
                firstName+', stay focused! You still have time — think carefully.',
                'You can do it, '+firstName+'! Choose your answer soon.'];
      timerSpeak(msgs[Math.floor(Math.random()*msgs.length)],1.1,0.95);
    }
    if(!_redded&&timeLeft<=redAt&&timeLeft>10){
      _redded=true;
      var rmsgs=[firstName+'! Time is running out — answer now!',
                 'Hurry, '+firstName+'! Only seconds left — pick your answer!',
                 firstName+', quick! Running out of time!'];
      timerSpeak(rmsgs[Math.floor(Math.random()*rmsgs.length)],1.2,1.1);
    }
    if(timeLeft<=10&&timeLeft>0){
      var AC=window.AudioContext||window.webkitAudioContext;
      if(AC){try{
        var ctx=new AC(),o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='square';o.frequency.value=400+(10-timeLeft)*80;
        g.gain.setValueAtTime(0.35,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
        o.start(ctx.currentTime);o.stop(ctx.currentTime+0.15);
      }catch(e){}}
      if(timeLeft===10) timerSpeak(firstName+'! Ten seconds! Answer now!',1.3,1.2);
      else if(timeLeft===5) timerSpeak('Five! '+firstName+' — now!',1.4,1.3);
      else if(timeLeft===3) timerSpeak('Three!',1.5,1.4);
      else if(timeLeft===2) timerSpeak('Two!',1.5,1.5);
      else if(timeLeft===1) timerSpeak('One!',1.5,1.5);
    }
    if(timeLeft<=0){clearInterval(timerInterval);timeExpired();}
  },1000);
}
function speakFeedbackThenAdvance(msg,pitch){
  var PAUSE_AFTER=3500,FALLBACK=90000;
  function doAdvance(){current++;showQuestion();}
  if(!window.speechSynthesis){setTimeout(doAdvance,PAUSE_AFTER);return;}
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(msg);u.lang='en-GB';u.pitch=pitch||1.05;u.rate=0.88;u.volume=1.0;
  function pickVoice(){
    var vs=window.speechSynthesis.getVoices();
    return vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})
        ||vs.find(function(x){return x.lang.startsWith('en-GB');})
        ||vs.find(function(x){return x.lang.startsWith('en-US');})
        ||vs.find(function(x){return x.lang.startsWith('en');})
        ||vs[0]||null;
  }
  var advanced=false,fallbackTimer=null;
  function advance(){if(advanced)return;advanced=true;if(fallbackTimer)clearTimeout(fallbackTimer);setTimeout(doAdvance,PAUSE_AFTER);}
  u.onend=advance;u.onerror=advance;
  fallbackTimer=setTimeout(advance,FALLBACK);
  var vs=window.speechSynthesis.getVoices();
  if(vs.length>0){
    var v=pickVoice();if(v)u.voice=v;
    try{speechSynthesis.speak(u);}catch(e){advance();}
  } else {
    window.speechSynthesis.onvoiceschanged=function(){
      window.speechSynthesis.onvoiceschanged=null;
      var v2=pickVoice();if(v2)u.voice=v2;
      try{speechSynthesis.speak(u);}catch(e){advance();}
    };
  }
}
function timeExpired(){

    if(pct>=80)      speak('Amazing result! You are a champion!',1.2,1.0,1.0);
    else if(pct>=50) speak('Good effort! Keep studying!',1.1,1.0,0.9);
    else             speak('Keep practising! You will improve!',1.0,0.95,0.85);
  };
})();

// ══════════════════════════════════════
//  BACKGROUND MUSIC ENGINE (plays ../MEDIA/bg_music.mp3 at 20% volume)
// ══════════════════════════════════════
var _bgMusic = (function(){
  var a = new Audio();
  a.src     = '../MEDIA/bg_music.mp3';
  a.loop    = true;
  a.volume  = 0.20;
  a.preload = 'auto';
  return a;
})();

function startBgMusic(){
  _bgMusic.currentTime = 0;
  var p = _bgMusic.play();
  if(p && p.catch){ p.catch(function(){}); }
}

function stopBgMusic(){
  var step = _bgMusic.volume / 18;
  var fade = setInterval(function(){
    if(_bgMusic.volume > step){
      _bgMusic.volume = Math.max(0, _bgMusic.volume - step);
    } else {
      _bgMusic.volume = 0;
      _bgMusic.pause();
      clearInterval(fade);
    }
  }, 50);
}
