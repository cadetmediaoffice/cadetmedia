<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NADMO – Disaster Management & Galamsey Awareness Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function(){
  'use strict';
  var _cs=document.createElement('style');
  _cs.id='cmg-cloak';
  _cs.textContent='body{visibility:hidden!important;pointer-events:none!important;}';
  document.head.appendChild(_cs);
  if(window.history&&window.history.pushState) window.history.pushState({cmgGuard:true},'',window.location.href);
  window.CMG_GUARD={
    init:function(opts){
      var quizKey=opts.quizKey||'unknown';
      var repeatable=opts.repeatable===true;
      var HUB='cadetnationalquiz.html';
      if(localStorage.getItem('cmgActivated')!=='true'||!localStorage.getItem('cadetName')||!localStorage.getItem('cmgCode')){
        window.location.replace('activate.html');return;
      }
      if(localStorage.getItem(quizKey+'Completed')==='true'&&!repeatable){window.location.replace(HUB);return;}
      var n=localStorage.getItem('cadetName')||'',c=localStorage.getItem('cmgCode')||'',exp=n+'|'+c;
      var sk=localStorage.getItem('cmgSessionKey');
      if(!sk){localStorage.setItem('cmgSessionKey',exp);}
      else if(sk!==exp){window.location.replace('activate.html');return;}
      localStorage.setItem('cmgLastPage',window.location.pathname.split('/').pop());
      window.addEventListener('popstate',function(){
        if(localStorage.getItem(quizKey+'Completed')==='true'&&!repeatable){window.location.replace(HUB);}
        else if(!localStorage.getItem('cmgActivated')){window.location.replace('activate.html');}
        else if(window.history&&window.history.pushState) window.history.pushState({cmgGuard:true},'',window.location.href);
      });
      var el=document.getElementById('cmg-cloak');if(el)el.parentNode.removeChild(el);
      document.body.style.visibility='';document.body.style.pointerEvents='';
    },
    complete:function(quizKey,score,repeatable){
      localStorage.setItem(quizKey+'Score',String(score));
      if(!repeatable)localStorage.setItem(quizKey+'Completed','true');
      if(window.history&&window.history.replaceState) window.history.replaceState({cmgDone:true},'',window.location.href);
      window.location.replace('cadetnationalquiz.html');
    }
  };
})();
</script>
<style>
@keyframes nadmoFlicker{
  0%  {background:linear-gradient(160deg,#1a0e00,#3d2200,#5c3600);}
  50% {background:linear-gradient(160deg,#150a00,#351c00,#533000);}
  100%{background:linear-gradient(160deg,#1c1000,#402500,#5f3800);}
}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 15% 85%,rgba(180,100,0,0.12) 0%,transparent 70%),
             radial-gradient(ellipse 40% 60% at 85% 90%,rgba(200,120,0,0.10) 0%,transparent 70%);}

*{box-sizing:border-box;}
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(160deg,#1a0e00 0%,#2d1800 25%,#3d2200 55%,#4a2c00 80%,#5c3600 100%);
  animation:nadmoFlicker 5s ease-in-out infinite alternate;
  color:#fff;display:flex;flex-direction:column;
  align-items:center;padding:15px;margin:0;min-height:100vh;
}
.logos{display:flex;flex-direction:column;align-items:center;width:100%;max-width:900px;margin-bottom:10px;}
.logos img:first-child{height:110px;margin-bottom:8px;cursor:pointer;border-radius:50%;border:2px solid rgba(255,215,0,0.4);transition:box-shadow .2s;}
.logos img:first-child:hover{box-shadow:0 0 20px rgba(255,215,0,0.8);}
.all-services-logo{width:650px;max-width:95%;display:block;margin:0 auto 10px auto;
  filter:drop-shadow(0 0 15px rgba(255,255,255,0.6)) drop-shadow(0 0 30px rgba(255,215,0,0.6));
  animation:floatLogo 4s ease-in-out infinite;}
@keyframes floatLogo{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.cadet-bar{background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.25);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:bold;width:100%;max-width:560px;text-align:center;margin-bottom:4px;display:none;}
.quiz-container{background:rgba(10,5,0,0.60);position:relative;z-index:1;padding:20px;border-radius:12px;width:100%;max-width:560px;display:flex;flex-direction:column;gap:12px;}
.timer-row{display:flex;align-items:center;gap:10px;font-size:14px;}
.timer-bar-container{flex:1;background:rgba(255,255,255,0.2);border-radius:12px;height:12px;}
.timer-bar{width:100%;height:100%;background:#00ff00;border-radius:12px;transition:width 1s linear,background 1s;}
.progress-bar{width:100%;background:rgba(255,255,255,0.2);border-radius:12px;overflow:hidden;height:10px;}
.progress{height:100%;width:0%;background:#f2c300;transition:width 0.3s;}
.meta-row{display:flex;justify-content:space-between;align-items:center;}
.q-counter{font-size:12px;opacity:0.65;}
.q-type{font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;}
.q-image-wrap{
  width:100%;border-radius:12px;overflow:hidden;
  border:2px solid rgba(255,180,0,0.4);background:#1a0a00;
  position:relative;padding:10px;box-sizing:border-box;
}
.q-image-wrap svg{width:100%!important;height:auto!important;max-height:220px;display:block;}
.q-image-wrap>img{width:100%!important;height:auto!important;max-height:220px;display:block;object-fit:contain;border-radius:6px;}
.q-image-wrap>div{width:100%!important;display:flex!important;gap:4px!important;box-sizing:border-box;}
.q-image-wrap>div>img{flex:1!important;min-width:0!important;max-height:190px!important;object-fit:cover!important;border-radius:6px!important;display:block!important;}
.q-image-label{position:absolute;top:8px;left:8px;background:rgba(40,20,0,0.9);color:#fff;font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;z-index:2;}

#question{font-size:15px;font-weight:bold;line-height:1.6;color:#fff;}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:stretch;}
.answers button{background:rgba(255,255,255,0.08);color:#fff;border:2px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px 10px 10px 36px;font-size:12px;font-weight:bold;cursor:pointer;text-align:left;transition:all 0.2s;width:100%;line-height:1.5;position:relative;height:100%;}
.answers button .opt-label{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.15);font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;color:#FFD700;}
.answers button:hover:not(:disabled){background:rgba(255,255,255,0.2);transform:scale(1.02);}
.answers button:hover:not(:disabled) .opt-label{background:rgba(255,215,0,0.3);}
.answers button.correct{background:rgba(0,200,80,0.5)!important;border-color:#00c850!important;}
.answers button.correct .opt-label{background:rgba(0,200,80,0.5);}
.answers button.wrong{background:rgba(220,50,50,0.5)!important;border-color:#dc3232!important;}
.answers button.wrong .opt-label{background:rgba(220,50,50,0.5);}
.answers button:disabled{cursor:default;}
.explanation{background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);border-radius:8px;padding:10px 13px;font-size:12px;line-height:1.6;color:#ffe082;display:none;}
.result{text-align:center;display:none;padding:25px 15px;width:100%;max-width:560px;}
@media(max-width:420px){.answers{grid-template-columns:1fr;}}

/* ══════════════════════════════════════
   CMG WELCOME SCREEN
══════════════════════════════════════ */
#cmgWelcome{
  position:fixed;inset:0;z-index:99999;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center, #3d1800 0%, #0f0500 100%);
  overflow:hidden;
}
/* animated star field */
#cmgWelcome .stars{
  position:absolute;inset:0;pointer-events:none;overflow:hidden;
}
#cmgWelcome .star{
  position:absolute;border-radius:50%;background:#fff;
  animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}

/* floating particles */
#cmgWelcome .particle{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:floatUp var(--pd,6s) ease-in-out infinite var(--pdelay,0s);
  opacity:0;
}
@keyframes floatUp{
  0%{transform:translateY(0) scale(0);opacity:0;}
  20%{opacity:.7;}
  80%{opacity:.4;}
  100%{transform:translateY(-120vh) scale(1.5);opacity:0;}
}

/* card */
#cmgCard{
  position:relative;z-index:2;
  background:linear-gradient(160deg,rgba(30,12,0,.97) 0%,rgba(60,28,0,.97) 100%);
  border:2px solid rgba(255,215,0,.6);
  border-radius:22px;padding:32px 28px 26px;
  width:92%;max-width:400px;text-align:center;
  box-shadow:0 0 60px rgba(255,215,0,.2),0 20px 60px rgba(0,0,0,.8);
  animation:cardPop .55s cubic-bezier(.175,.885,.32,1.275) forwards;
}
@keyframes cardPop{
  0%{transform:scale(.6) translateY(40px);opacity:0;}
  100%{transform:scale(1) translateY(0);opacity:1;}
}

/* gold glow ring */
#cmgCard::before{
  content:'';position:absolute;inset:-3px;border-radius:24px;z-index:-1;
  background:linear-gradient(45deg,#FFD700,#ff6b00,#FFD700,#00d4ff,#FFD700);
  background-size:300% 300%;
  animation:ringRotate 3s linear infinite;
  filter:blur(6px);opacity:.6;
}
@keyframes ringRotate{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}

.wBadge{
  display:inline-block;
  background:linear-gradient(135deg,#FFD700,#e6a800);
  color:#000;font-weight:900;font-size:11px;letter-spacing:2px;
  text-transform:uppercase;border-radius:20px;padding:4px 14px;margin-bottom:12px;
}
.wEmoji{font-size:54px;display:block;margin-bottom:4px;animation:bounce .8s ease-in-out infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-8px);}}

.wGreeting{font-size:13px;color:rgba(255,215,0,.7);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.wName{
  font-size:28px;font-weight:900;
  background:linear-gradient(90deg,#FFD700,#fff,#FFD700);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 2s linear infinite;margin-bottom:2px;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}

.wService{font-size:16px;font-weight:700;color:#fff;margin-bottom:2px;}
.wOrg{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-bottom:16px;}

/* tip box */
.wTip{
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);
  border-radius:10px;padding:10px 14px;margin-bottom:18px;
  font-size:12.5px;color:rgba(255,255,255,.78);line-height:1.55;font-style:italic;
}
.wTip span{color:#FFD700;font-weight:700;font-style:normal;}

/* progress dots (3 animated) */
.wDots{display:flex;justify-content:center;gap:6px;margin-bottom:16px;}
.wDot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,215,0,.3);
  animation:dotPulse 1.2s ease-in-out infinite;
}
.wDot:nth-child(2){animation-delay:.2s;}
.wDot:nth-child(3){animation-delay:.4s;}
@keyframes dotPulse{0%,100%{background:rgba(255,215,0,.3);transform:scale(1);}50%{background:#FFD700;transform:scale(1.4);}}

/* CTA button */
#cmgStartBtn{
  background:linear-gradient(45deg,#FFD700,#e6a800);
  color:#000;border:none;border-radius:14px;
  padding:15px 0;width:100%;font-size:17px;font-weight:900;
  cursor:pointer;letter-spacing:.4px;
  box-shadow:0 6px 24px rgba(255,215,0,.45);
  transition:transform .15s,box-shadow .15s;
  animation:ctaPulse 1.8s ease-in-out infinite;
}
@keyframes ctaPulse{
  0%,100%{box-shadow:0 6px 24px rgba(255,215,0,.4);}
  50%{box-shadow:0 6px 40px rgba(255,215,0,.9);}
}
#cmgStartBtn:active{transform:scale(.96);}

.wFooter{margin-top:12px;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:1px;}


/* ══ LIVE STAR SCORE BAR ══ */
#starBar{width:100%;max-width:560px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,215,0,0.25);border-radius:12px;padding:8px 12px;display:none;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:4px;}
#starBar .sb-label{font-size:11px;font-weight:bold;color:rgba(255,215,0,0.7);margin-right:6px;white-space:nowrap;}
.sb-star{font-size:20px;line-height:1;display:inline-block;opacity:0.25;transition:opacity 0.2s;}
.sb-star.earned{opacity:1;animation:starPop 0.45s cubic-bezier(0.175,0.885,0.32,1.6) forwards;}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg);}60%{transform:scale(1.5) rotate(10deg);}100%{transform:scale(1) rotate(0deg);}}
</style>
</head>

deforestation:`<svg viewBox="0 0 320 240" xmlns="http://www.w3.org/2000/svg">
<defs><linearGradient id="dfBg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#1a1000"/><stop offset="100%" stop-color="#0a0800"/></linearGradient></defs>
<rect width="320" height="240" rx="12" fill="url(#dfBg)" stroke="rgba(150,80,0,0.4)" stroke-width="2"/>
<text x="160" y="14" text-anchor="middle" fill="#FFD700" font-size="10" font-weight="900" font-family="Arial">DEFORESTATION — BEFORE AND AFTER</text>
<!-- Left: Before (forested) -->
<rect x="5" y="22" width="148" height="130" rx="6" fill="#0d1a05" stroke="#2a5a10" stroke-width="1.5"/>
<text x="79" y="36" text-anchor="middle" fill="#88cc44" font-size="9" font-weight="bold" font-family="Arial">BEFORE — HEALTHY FOREST</text>
<!-- Trees -->
<g fill="#1a5510">
  <polygon points="50,120 65,80 80,120"/><polygon points="75,125 92,78 109,125"/>
  <polygon points="100,118 118,72 136,118"/><polygon points="20,122 35,85 50,122"/>
  <polygon points="115,124 130,82 145,124"/>
</g>
<g fill="#0d3308"><rect x="57" y="120" width="6" height="12"/><rect x="83" y="125" width="6" height="12"/><rect x="109" y="118" width="6" height="12"/></g>
<!-- Rain/clouds indicating rainfall captured -->
<text x="79" y="60" text-anchor="middle" font-size="14">☁️🌧️</text>
<text x="79" y="140" text-anchor="middle" fill="#44aa22" font-size="7.5" font-family="Arial">Trees: hold soil, absorb rain</text>
<text x="79" y="150" text-anchor="middle" fill="#44aa22" font-size="7.5" font-family="Arial">reduce floods &amp; drought</text>
<!-- Right: After (deforested) -->
<rect x="162" y="22" width="150" height="130" rx="6" fill="#1a0e05" stroke="#553300" stroke-width="1.5"/>
<text x="237" y="36" text-anchor="middle" fill="#ff6633" font-size="9" font-weight="bold" font-family="Arial">AFTER — GALAMSEY DAMAGE</text>
<!-- Tree stumps -->
<g fill="#332200"><rect x="185" y="100" width="15" height="20" rx="2"/><rect x="215" y="105" width="14" height="15" rx="2"/><rect x="245" y="98" width="16" height="22" rx="2"/><rect x="275" y="103" width="14" height="17" rx="2"/></g>
<!-- Bare dirt and erosion -->
<rect x="163" y="100" width="148" height="50" fill="#2a1500" rx="0"/>
<!-- Flooding arrows -->
<text x="200" y="72" fill="#ff4444" font-size="24">💧</text><text x="235" y="60" fill="#ff4444" font-size="24">💧</text><text x="265" y="75" fill="#ff4444" font-size="20">💧</text>
<text x="237" y="140" text-anchor="middle" fill="#ff6633" font-size="7.5" font-family="Arial">No roots = floods, landslides</text>
<text x="237" y="150" text-anchor="middle" fill="#ff6633" font-size="7.5" font-family="Arial">soil erosion, drought</text>
<!-- Consequences at bottom -->
<rect x="5" y="162" width="310" height="30" rx="6" fill="rgba(150,50,0,0.15)" stroke="rgba(200,80,0,0.3)" stroke-width="1"/>
<text x="160" y="174" text-anchor="middle" fill="#ff8844" font-size="8.5" font-weight="bold" font-family="Arial">DEFORESTATION WORSENS EVERY DISASTER IN GHANA</text>
<text x="160" y="186" text-anchor="middle" fill="white" font-size="8" font-family="Arial">Floods · Landslides · Drought · Loss of biodiversity · Climate change</text>
<text x="160" y="210" text-anchor="middle" fill="rgba(255,215,0,0.7)" font-size="8" font-family="Arial">Ghana has lost over 80% of its original forest cover since 1950</text>
<text x="160" y="224" text-anchor="middle" fill="rgba(255,215,0,0.7)" font-size="8" font-family="Arial">Report illegal logging / galamsey: Forestry Commission · EPA · NADMO</text>

const QUESTION_BANK = [
  {type:"image",svgKey:"nadmo_logo",question:"This is the NADMO emblem. NADMO was established in 1996 under Act 517. Under which government ministry does NADMO operate?",answers:["Ministry of the Interior", "Ministry of Defence", "Ministry of Environment", "Ministry of Health"],correct:0,explain:"NADMO — National Disaster Management Organisation — operates under the Ministry of the Interior alongside the Ghana Police Service, Ghana Prisons Service and Ghana Immigration Service. It is a civilian government agency, not military. It was established by the National Disaster Management Organisation Act 1996 (Act 517)."},

  {type:"image",svgKey:"nadmo_logo",question:"The NADMO emblem shows its emergency number. What is the dedicated NADMO emergency toll-free number?",answers:["191", "0800-111-222", "192", "193"],correct:1,explain:"NADMO's toll-free emergency number is 0800-111-222, available 24 hours a day. The general multi-agency emergency number 112 also connects to disaster response. Police is 191, Fire Service is 192, and National Ambulance is 193."},

  {type:"image",svgKey:"flooded_accra",question:"This image shows the Accra floods. The June 3 2015 disaster combined floods with a petrol station fire. How many people died in total?",answers:["Around 15 people", "Around 50 people", "More than 150 people", "More than 500 people"],correct:2,explain:"The June 3, 2015 Accra disaster killed more than 150 people — one of Ghana's deadliest disasters. The Kwame Nkrumah Circle area flooded severely, and people sheltering from rain at a petrol station died when it ignited. It exposed the deadly combination of blocked drains, buildings on floodplains, and fuel storage near flood zones."},

  {type:"image",svgKey:"flooded_accra",question:"This flooded street shows why walking through floodwater is dangerous. Moving floodwater at what depth can knock an adult off their feet?",answers:["At least 1 metre deep", "At least 60cm deep", "Only when above waist height", "As shallow as 15cm deep"],correct:3,explain:"Moving floodwater as shallow as 15cm can knock a child or adult off their feet due to the current force. At 30cm, moving water can sweep away a vehicle. Submerged open drains are invisible beneath the water surface. Never walk, drive or swim through floodwater regardless of how shallow it appears."},

  {type:"image",svgKey:"emergency_kit",question:"This 72-hour emergency kit is recommended by NADMO. What is the significance of the 72-hour period specifically?",answers:["Research shows survival rates drop sharply after 72 hours without rescue in major disasters", "Food stored longer than 72 hours becomes unsafe to eat in tropical climates", "NADMO regulations require exactly 72 hours of supplies in every household", "Government relief distribution always arrives exactly 72 hours after a disaster is declared"],correct:0,explain:"The 72-hour rule comes from disaster research: most survivors of building collapses and major disasters are rescued within 3 days. After 72 hours, survival rates drop sharply. Your emergency kit must sustain you until help arrives. NADMO recommends every household maintain a prepared kit in a easily accessible location."},

  {type:"image",svgKey:"emergency_kit",question:"An emergency kit should include a battery-powered radio. Why is this particularly important during a disaster in Ghana?",answers:["To communicate with NADMO directly by sending radio signals", "To receive official NADMO alerts, GMA weather warnings and government emergency broadcasts when phones and internet are unavailable", "To charge mobile phones when electricity is cut", "To listen to entertainment and maintain mental health during stressful evacuations"],correct:1,explain:"During major disasters in Ghana, electricity is often cut, mobile networks become overloaded or fail, and internet access is unavailable. A battery-powered radio allows communities to receive official NADMO alerts, Ghana Meteorological Authority warnings and government emergency broadcasts — potentially life-saving information when all digital communication fails."},

  {type:"image",svgKey:"choked_drain",question:"This choked drain is a flood hazard. What is the MOST responsible and impactful action a student can take when they see this?",answers:["Pour a bucket of water in to test if it still flows", "Place a stone at the entrance to stop more rubbish entering", "Organise a community clean-up to clear the drain AND report it to the Local Assembly", "Post on social media asking followers to report it"],correct:2,explain:"Clearing the drain through community action AND reporting it to the Local Assembly addresses the immediate problem and creates official accountability. Choked drains are a primary cause of urban flooding in Ghana. NADMO actively partners with District Assemblies on drainage maintenance. A cleared drain before the rainy season can prevent deaths."},

  {type:"image",svgKey:"drop_cover_hold",question:"This diagram shows earthquake safety. Why is running outside during an earthquake WRONG even though it seems like the logical thing to do?",answers:["Running consumes too much oxygen causing people to lose consciousness", "NADMO regulations prohibit outdoor movement during any declared seismic event", "Most earthquake injuries come from ground movement making indoor shelter statistically safer", "Falling debris from buildings — glass, concrete, signage"],correct:3,explain:"Falling debris from buildings kills more people outside during earthquakes than the structural collapse itself. Glass, concrete panels, signage and masonry fall outward as buildings shake. Drop, Cover and Hold On under a sturdy desk or table provides the best protection. Stay away from windows and exterior walls. Only evacuate after shaking stops."},

  {type:"image",svgKey:"drop_cover_hold",question:"Ghana sits on the Akwapim-Togo fault line. Which Ghanaian city is most at risk from a significant earthquake?",answers:["Accra", "Tamale", "Kumasi", "Takoradi"],correct:0,explain:"Accra sits on and near the Akwapim-Togo fault line — the most significant seismic risk in Ghana. Historical earthquakes have struck the Greater Accra region. The June 22, 1939 earthquake killed 17 people and caused significant damage in Accra. NADMO maintains earthquake preparedness programmes for Accra due to its high population density and proximity to the fault."},

  {type:"image",svgKey:"galamsey_pit",question:"This abandoned galamsey pit has filled with water. What makes this water significantly more dangerous than an ordinary river?",answers:["The pit water is much colder causing hypothermia in swimmers within minutes", "The pit contains mercury and cyanide chemicals plus bacteria from stagnant water", "The steep unstable walls can collapse without warning burying anyone near the edge", "Abandoned pits attract criminal groups who use them for illegal activities"],correct:1,explain:"Abandoned galamsey pits contain mercury, cyanide and other chemicals used in gold extraction. The water is stagnant, deeply contaminated and often very deep. Pit walls collapse without warning. Children who swim in these pits risk drowning, chemical poisoning and burial under collapsing walls. NADMO works with the Minerals Commission to fill and fence abandoned pits."},

  {type:"image",svgKey:"mercury_danger",question:"This image shows mercury used in galamsey. What makes mercury particularly dangerous compared to most other poisons?",answers:["Mercury is completely colourless and odourless so you cannot detect it in water", "Mercury evaporates in sunlight making airborne inhalation the only route of exposure", "Symptoms of mercury poisoning appear months or years after exposure when brain damage is already irreversible", "Mercury bonds with gold making all galamsey gold radioactive and toxic forever"],correct:2,explain:"Mercury's most treacherous characteristic is delayed symptoms. Tremors, memory loss, nerve damage and blindness appear months or years after exposure — by which time brain and nervous system damage is often permanent and irreversible. Mercury is especially dangerous to pregnant women and children under 5, causing developmental damage to unborn children."},

  {type:"image",svgKey:"contaminated_river",question:"This image shows a mercury-contaminated river. A fisherman wants to sell fish caught from this river. What must he understand?",answers:["Fish are safe if washed thoroughly and cooked at very high temperature", "Only bottom-feeding fish accumulate mercury — surface fish remain safe", "The brown colour indicates soil erosion only — the fish are still edible", "Mercury accumulates in fish tissue and cooking does not destroy it"],correct:3,explain:"Mercury bioaccumulates in fish tissue — it concentrates in muscles, organs and fat. Cooking at any temperature does not destroy or remove mercury. Eating fish from contaminated rivers directly transfers mercury into the human body. Rivers Pra, Offin and Birim in Ghana have been severely contaminated by galamsey, making fish from these rivers dangerous to eat regularly."},

  {type:"image",svgKey:"deforestation",question:"This image compares forested and deforested landscapes. How does deforestation directly worsen flooding in Ghana?",answers:["Tree roots absorb rainwater and anchor soil — removing trees increases surface runoff", "Trees make the ground harder so deforestation actually improves water drainage", "Deforestation has no effect on flooding — flooding is caused purely by rainfall volume", "Deforestation only affects coastal flooding — inland flooding is not affected by tree cover"],correct:0,explain:"Tree roots absorb significant amounts of rainfall and anchor the soil. Removing trees means rainwater runs off the surface rapidly rather than being absorbed, dramatically increasing flood volumes and speed. Deforestation is a major contributor to Ghana's worsening floods. It also increases landslide risk on slopes and contributes to drought during dry seasons."},

  {type:"image",svgKey:"bushfire",question:"This diagram shows bushfire escape. During a bushfire, which direction should residents run relative to the wind?",answers:["Directly into the wind — fire cannot burn against the wind direction", "Crosswind — at 90 degrees to the wind direction to exit the fire path fastest", "Directly away from the fire following the same direction the smoke is blowing", "Downhill — bushfires cannot burn against gravity on steep slopes"],correct:1,explain:"Run crosswind — at 90 degrees to the wind direction. Running with the wind means fire travels the same direction as you and may travel faster. Running into the wind means running into the fire. Running crosswind exits the burn path quickest. Bushfires in Ghana's Northern Region are most severe November to March during the harmattan dry season."},

  {type:"image",svgKey:"landslide",question:"This image shows a deforested slope with landslide risk. What is the most effective long-term action communities can take to prevent landslides?",answers:["Build concrete retaining walls at the base of all hills near communities", "Apply chemical stabilisers to slopes during the rainy season annually", "Plant and maintain trees on slopes — roots anchor soil and absorb water preventing slides", "Relocate all communities away from any hilly terrain in Ghana"],correct:2,explain:"Planting and maintaining trees on slopes is the most effective and sustainable landslide prevention. Tree roots hold soil in place and absorb rainfall that would otherwise saturate and destabilise slopes. NADMO's community tree-planting initiatives target high-risk areas. In the short term, NADMO issues alerts and evacuates communities from high-risk slopes before heavy rains."},

  {type:"image",svgKey:"nadmo_response",question:"This diagram shows NADMO's four response phases. Which phase comes BEFORE a disaster occurs?",answers:["Response — NADMO deploys rescue teams before disasters strike", "Rehabilitation — rebuilding happens in advance so it is ready", "All four phases happen simultaneously during every disaster event", "Prevention and Preparedness — risk mapping, community education"],correct:3,explain:"The Prevention/Mitigation and Preparedness phases occur before a disaster strikes. NADMO conducts flood risk mapping, community education, disaster drills, assembly point identification and early warning system installation. These pre-disaster activities save far more lives than post-disaster response alone. Investing in preparedness is the core of NADMO's civilian mandate."},

  {type:"image",svgKey:"nadmo_response",question:"During NADMO's Response phase, which agency coordinates all rescue and relief efforts in a major disaster?",answers:["NADMO — it coordinates all responding agencies including military, police, health", "The Ghana Police Service — they control public safety", "The Ghana Armed Forces — they have the equipment and training", "The District Chief Executive — local government leads all disaster response"],correct:0,explain:"During a major disaster, NADMO serves as the coordinating agency for all responding parties: Police, Fire Service, Ambulance, Ghana Armed Forces (when requested for heavy equipment/logistics), health services, NGOs and community groups. NADMO operates National, Regional and District Disaster Management Committees to manage multi-agency coordination. It is a civilian coordination body."},

  // ── TEXT QUESTIONS ──
  {type:"text",question:"What does NADMO stand for and when was it established?",answers:["National Army Disaster and Military Operations — established 1986", "National Disaster Management Organisation — established 1996 under Act 517", "National Development and Management Office — established 2001", "National Aid and Disaster Mobilisation Organisation — established 1992"],correct:1,explain:"NADMO stands for National Disaster Management Organisation. It was established by the National Disaster Management Organisation Act 1996 (Act 517) under the military government and later strengthened as a civilian agency. It operates under the Ministry of the Interior to coordinate disaster prevention, risk reduction, response and rehabilitation at national, regional and district levels."},

  {type:"text",question:"Which of the following correctly describes NADMO's role?",answers:["A military agency that defends Ghana from foreign invasion", "A private company contracted by government to provide disaster relief supplies", "A civilian government agency that manages emergencies", "An international UN agency stationed in Ghana to respond to disasters"],correct:2,explain:"NADMO is a civilian government agency — NOT military. Its mandate is: disaster prevention and mitigation, preparedness, coordinating emergency response (working with Police, Fire, Ambulance and others), and post-disaster rehabilitation and recovery. It operates at national, regional and district levels through Disaster Management Committees."},

  {type:"text",question:"What is the emergency number for NADMO in Ghana?",answers:["191", "192", "193", "0800-111-222 or 112"],correct:3,explain:"NADMO's toll-free emergency number is 0800-111-222. The general emergency number 112 also connects to disaster response coordination. Police is 191, Fire Service is 192, and National Ambulance is 193. Know all five numbers: 191, 192, 193, 0800-111-222 and 112."},

  {type:"text",question:"What is the difference between a disaster and an emergency that determines when NADMO gets involved?",answers:["A disaster overwhelms local capacity requiring coordinated multi-agency response", "NADMO responds to all emergencies regardless of scale — it works alongside the Police and Ambulance Service on every incident", "NADMO only responds to natural disasters — man-made emergencies are handled by the Police", "NADMO responds only to national disasters — regional and district incidents are handled by local authorities without NADMO involvement"],correct:0,explain:"A disaster is defined by the scale and complexity — when an event overwhelms local capacity and requires coordinated multi-agency response, NADMO activates. Single incidents (car accidents, house fires) are handled by Police, Fire and Ambulance. Major floods, earthquakes, disease outbreaks or industrial accidents affecting many people trigger NADMO coordination."},

  {type:"text",question:"A student notices their street floods every rainy season. Which combination of actions would have the most impact before the rains begin?",answers:["Buy sandbags every year and build barriers higher each season", "Identify evacuation routes, prepare an emergency kit, know the nearest assembly point", "Move all valuables to the top floor and buy flood insurance", "Report the flood classification to authorities and demand they reclassify the area"],correct:1,explain:"Personal preparedness (knowing your evacuation route, assembly point, having a kit) combined with community action (clearing drains) addresses both the immediate flood risk and the structural cause. NADMO's pre-disaster work includes identifying assembly points, mapping routes and educating communities. These actions before the rains save more lives than any post-flood response."},

  {type:"text",question:"After a flood recedes in a community, which disease spreads fastest through contaminated floodwater and remaining stagnant pools?",answers:["Malaria — spread by Anopheles mosquitoes that breed in any stagnant water", "Typhoid — spread through contaminated food only, unrelated to floodwater", "Cholera — spread through water contaminated by human faeces mixing with floodwater", "Tuberculosis — spread through respiratory contact increased in crowded evacuation centres"],correct:2,explain:"Cholera spreads fastest in post-flood environments where human faeces contaminate floodwater and water sources. It causes severe diarrhoea and dehydration and can kill within hours if untreated. NADMO works with Ghana Health Service to distribute Oral Rehydration Salts (ORS), set up water purification and advise communities to boil water after floods. Malaria risk also rises but takes longer."},

  {type:"text",question:"Kofi's street floods during a rainstorm. The water is knee-deep but appears to be moving slowly. Why is even this situation life-threatening?",answers:["The visual appearance of depth is always deceiving — all visible floodwater is 3 times deeper than it appears", "Floodwater always contains cholera bacteria making any skin contact immediately fatal", "Floodwater conducts electricity from fallen power lines making any contact likely fatal", "Moving water just 15cm deep can knock an adult off their feet and invisible open drains are below the surface"],correct:3,explain:"Moving water as shallow as 15cm can knock an adult off their feet. The current force, not just depth, is the primary danger. Submerged open drains are completely invisible below floodwater — a person can step into an open drain and be swept underground. Never walk through any moving floodwater. NADMO advises: turn around, go back, find higher ground."},

  {type:"text",question:"Yaw receives a social media post claiming a major dam will burst tonight and telling his family to evacuate immediately. What should he do?",answers:["Check the information with NADMO directly (0800-111-222) or GMA before acting or sharing", "Share the message widely to warn as many people as possible", "Evacuate immediately — better safe than sorry when a dam burst is mentioned", "Ignore all dam-related warnings unless they come directly from the government"],correct:0,explain:"Unverified disaster warnings spread on social media have caused fatal stampedes and dangerous panic evacuations in Ghana. Verify with NADMO (0800-111-222), the Ghana Meteorological Authority or official government channels before acting or sharing. False warnings waste emergency resources and cause real harm. Sharing unverified warnings can make you legally liable for the harm caused."},

  {type:"text",question:"NADMO is conducting a disaster preparedness drill at a school. A student complains it is a waste of time since no disaster has hit their area. What is the correct response?",answers:["Agree — drills are only necessary for communities that have already experienced disasters", "Disagree — disaster preparedness drills save lives because people who have practised respond calmly and correctly under real stress", "Partially agree — text-based training is equally effective and less disruptive than physical drills", "Agree — NADMO should focus resources only on high-risk flood zones rather than conducting drills in safe areas"],correct:1,explain:"Preparedness drills are proven to save lives. People who have physically practised evacuation procedures respond faster, make fewer errors, help others and avoid panic in real emergencies. Muscle memory from drills overrides the freeze response that kills unprepared people. NADMO mandates school disaster drills specifically because schools concentrate large numbers of children who must know what to do."},

  {type:"text",question:"What is a NADMO District Disaster Management Committee (DDMC) and what does it do?",answers:["A committee of disaster survivors who advise NADMO on compensation payments", "A temporary committee formed only after a disaster to manage relief distribution", "A district-level coordination body that identifies local disaster risks, develops response plans", "A committee of military officers who advise the district on security threats"],correct:2,explain:"NADMO operates at three levels: National, Regional and District. The District Disaster Management Committee (DDMC) consists of the District Chief Executive, NADMO district officer, Police, Fire, Health and community representatives. It identifies local risks, develops district-specific response plans, conducts community preparedness education, and coordinates local response — the civilian frontline of disaster management."},

  {type:"text",question:"Over 60 percent of Ghana's forest cover has been lost. How does this directly affect NADMO's disaster response workload?",answers:["Deforestation reduces NADMO's workload by clearing land that previously blocked rescue vehicles", "Deforestation reduces flooding by creating more open ground for water to drain quickly", "Deforestation only affects NADMO's agricultural rehabilitation work, not emergency disaster response", "Deforestation worsens flooding severity, increases landslide risk, worsens drought and intensifies bushfires"],correct:3,explain:"Deforestation is a disaster amplifier. Without trees: floods are faster and more severe (no root absorption), landslides increase on slopes, drought worsens during dry season (no water retention), and bushfires spread faster through dry dead vegetation. Every hectare of forest lost increases the frequency and severity of disasters NADMO must manage. Environmental protection is disaster prevention."},

  {type:"text",question:"What is the single most important reason galamsey continues in Ghana despite being illegal under the Minerals and Mining Act?",answers:["Extreme poverty and lack of alternative income in mining communities combined with high gold prices create desperate economic incentives that override legal deterrents", "Lack of public knowledge — most people do not know galamsey is illegal", "Foreign companies operating galamsey are protected by international trade agreements", "The Environmental Protection Agency has approved limited galamsey as a traditional practice"],correct:0,explain:"Extreme poverty in mining communities combined with high gold prices creates powerful economic incentives. When a family can earn more from one day of galamsey than from one month of farming, legal deterrents are insufficient alone. Sustainable solutions require: genuine economic alternatives, community development, strengthened enforcement, and addressing the organised crime networks that fund small-scale operators."},

  {type:"text",question:"A student in a community near a mining area notices the borehole water has a metallic taste and grey sheen. What should they do?",answers:["Boil the water — boiling removes all chemical contaminants including heavy metals", "Immediately stop using the water for drinking, cooking and bathing children — report to NADMO and the EPA urgently", "Switch to sachet water temporarily — the metallic taste is seasonal and usually clears in weeks", "Add lemon juice which neutralises metallic tastes from heavy metal contamination"],correct:1,explain:"Metallic taste and a grey sheen in water are warning signs of possible mercury or heavy metal contamination. Boiling does NOT remove mercury or heavy metals — it concentrates them. Stop using the water immediately, especially for children. Report to NADMO (0800-111-222) and the EPA. The community needs professional water testing before resuming use. This is a public health emergency."},

  {type:"text",question:"What is the Ghana Meteorological Authority's role in relation to NADMO?",answers:["The GMA provides weather forecasts for NADMO's agricultural programmes only", "The GMA is a branch of NADMO responsible for weather monitoring", "The GMA provides scientific weather data, rainfall forecasts", "The GMA and NADMO are competing agencies with no formal working relationship"],correct:2,explain:"The Ghana Meteorological Authority (GMA) is NADMO's primary scientific partner. GMA provides: daily weather forecasts, seasonal rainfall predictions, extreme weather warnings (heavy rain, storms), and climate data. NADMO uses GMA data to issue early warnings to communities, pre-position relief stocks before flooding, and advise District Assemblies on weather-related risks. This partnership is central to effective disaster preparedness."},

  {type:"text",question:"What should communities do at an Assembly Point during a disaster evacuation?",answers:["Rush to the nearest road and flag down any passing vehicle to escape", "Drive personal vehicles away as quickly as possible before roads become congested", "Disperse in all directions to maximise chances of at least some people surviving", "Gather at the pre-designated safe location, await NADMO/emergency services"],correct:3,explain:"Assembly points are pre-designated safe locations identified before disasters occur. During evacuation: go to the designated assembly point, account for all family members, await NADMO and emergency services, and follow ONLY official instructions. Do not attempt individual improvised escapes — rescue teams search assembly points first. Do not return home until officially cleared. NADMO maps community assembly points during preparedness activities."},

  {type:"text",question:"What is the role of community volunteers in NADMO's disaster management system?",answers:["Community volunteers form the frontline of NADMO's early warning and response network", "Community volunteers have no official role — NADMO uses only professional staff", "Community volunteers replace NADMO professional staff in rural areas where NADMO has no offices", "Community volunteers are paid government workers who work alongside NADMO officers in every district"],correct:0,explain:"NADMO's Community-Based Disaster Management (CBDM) volunteers are trained members of the public who serve as the local early warning and first response network. They monitor local conditions, warn neighbours, assist vulnerable community members during evacuations, support relief distribution and act as the communication link between NADMO and their communities. Volunteers are unpaid but receive training and recognition."},

  {type:"text",question:"A bushfire is approaching a village in the Northern Region. What is the most important immediate action community members should take?",answers:["Fight the fire with available tools to prevent it reaching the village", "Alert all community members, identify a clear escape route crosswind", "Run directly away from the fire in the direction the smoke is blowing", "Dig fire trenches around the village perimeter to create a firebreak"],correct:1,explain:"Immediately alert everyone, identify a clear crosswind escape route, call NADMO (0800-111-222) and evacuate without delay. Do not attempt to fight an approaching bushfire without proper equipment and training — it moves faster than it appears. Running crosswind (90 degrees to wind) exits the fire's path fastest. Northern Region communities should plan bushfire escape routes before the dry season begins."},

  {type:"text",question:"What is the Hyogo Framework and how does it relate to Ghana's NADMO?",answers:["A UN military cooperation treaty that authorises NADMO to use armed force in disaster zones", "A bilateral Ghana-Japan agreement that funds NADMO's equipment and vehicles", "A global disaster risk reduction framework Ghana committed to", "A regional West African disaster management treaty that replaced NADMO's founding Act"],correct:2,explain:"The Hyogo Framework for Action (2005-2015), replaced by the Sendai Framework (2015-2030), are UN global frameworks for disaster risk reduction. Ghana, through NADMO, committed to reducing disaster losses by building national and community resilience. NADMO implements these frameworks through: risk mapping, community education, early warning systems, building codes enforcement, and integrating disaster risk reduction into national development planning."},

  {type:"text",question:"How should a student report an illegal galamsey operation they witness in their community?",answers:["Confront the operators directly and tell them to stop", "Post a video on social media showing the operators' faces", "Ignore it — galamsey is too powerful to stop and reporting creates personal danger", "Report to NADMO (0800-111-222), the Minerals Commission, the EPA or the Ghana Police Service on 191"],correct:3,explain:"Report illegal galamsey to: NADMO (0800-111-222), the Minerals Commission (which regulates mining), the Environmental Protection Agency (EPA) which monitors environmental violations, or the Ghana Police Service (191). Reports can be made anonymously. Community reporting is essential — the government's SWAT team and Operation Halt have successfully acted on community intelligence. Your report protects your river, your soil and your future."},

  {type:"text",question:"What are the health consequences of drinking water contaminated by galamsey mercury in Ghana?",answers:["Progressive neurological damage — tremors, memory loss, blindness, kidney failure", "Mild headaches that resolve within 48 hours without treatment", "Immediate death within hours of first consumption", "Skin rashes only — internal organs are not affected by mercury in drinking water"],correct:0,explain:"Mercury poisoning from contaminated water causes progressive neurological damage: starting with subtle tremors and memory problems, progressing to coordination loss, vision and hearing damage, kidney failure and ultimately death. The damage is often irreversible by the time symptoms are recognised. Children are most vulnerable — mercury crosses the placental barrier causing developmental damage to unborn children."},

  {type:"text",question:"What is the Volta River Authority's connection to disaster risk in Ghana?",answers:["The VRA manages Ghana's borders and has no connection to disaster risk", "The Akosombo Dam managed by the VRA, when releasing water during high rainfall", "The VRA is a military organisation responsible for protecting river resources from galamsey", "The VRA funds NADMO's disaster response operations through a dedicated levy on electricity bills"],correct:1,explain:"When the Akosombo and Kpong Dams managed by the Volta River Authority (VRA) must release excess water during exceptionally heavy rainfall, downstream communities along the Volta River can face sudden severe flooding. The VRA is required to coordinate with NADMO to provide advance warning to downstream communities — Volta Region, parts of Greater Accra and communities near the river basin are at risk."},

  {type:"text",question:"What practical steps should a school in a flood-prone area take before the rainy season begins?",answers:["Build permanent flood barriers around the school at the start of every rainy season", "Close the school throughout the rainy season to prevent flood-related accidents", "Identify the school assembly point, establish communication trees, practise evacuation drills", "Paint the school building with waterproof paint to prevent structural damage from flooding"],correct:2,explain:"A flood-prepared school: has a designated and practised assembly point, a communication tree reaching all parents quickly, annual evacuation drills, cleared surrounding drains, and students and staff who know early warning signs and NADMO's number (0800-111-222). Schools are community hubs — when schools are prepared, they serve as models and information centres for entire communities."},

  {type:"text",question:"What is the role of traditional rulers and community leaders in NADMO's disaster management framework?",answers:["Traditional rulers have no formal role — NADMO works only with government-appointed officials", "Traditional leaders are responsible for personally funding disaster relief in their communities under NADMO's framework", "Traditional rulers are legally prohibited from interfering in government emergency management operations", "Traditional leaders are recognised by NADMO as vital community mobilisers"],correct:3,explain:"NADMO actively partners with traditional rulers (chiefs, Queen Mothers, family heads) and religious leaders because their authority and trust within communities makes disaster management more effective. When a chief endorses an evacuation order or supports a drain clean-up, community compliance rises dramatically. NADMO trains community leaders, engages durbar grounds for public education and uses traditional structures as part of its early warning communication network."},

  {type:"text",question:"What environmental violation should be reported to the Environmental Protection Agency in relation to NADMO's disaster mandate?",answers:["Illegal dumping of waste in water bodies", "Playing music loudly near a riverbank", "Building a house without planning permission in a non-flood zone", "Using plastic bags in areas where they are not officially banned"],correct:0,explain:"The EPA enforces environmental laws that directly prevent disasters: illegal dumping in water bodies (which blocks drainage), illegal felling in water catchment areas (which worsens floods and drought), and galamsey activities near rivers (which contaminate water). Report to EPA: 0302-664697 or any regional EPA office. Environmental crime is disaster creation — preventing it is preventing future NADMO responses."},

  {type:"text",question:"How does NADMO's work connect to national development planning in Ghana?",answers:["NADMO has no connection to development planning — it only responds to disasters after they occur", "NADMO integrates disaster risk reduction into national development plans", "NADMO advises only on military infrastructure such as barracks and border posts", "NADMO manages Ghana's National Development Fund independent of other development planning"],correct:1,explain:"NADMO's mandate includes ensuring disaster risk reduction is integrated into national development. This means: advising against building on flood plains, recommending building codes for earthquake-resistant construction, ensuring road infrastructure includes flood culverts, and integrating early warning into development planning. Disaster resilience built into development prevents costly post-disaster rehabilitation — every Ghana cedis spent on prevention saves multiple cedis in response costs."},

  {type:"text",question:"As a Ghanaian student, what is your most important civic responsibility regarding disaster prevention?",answers:["To financially contribute to NADMO's budget through voluntary donations", "To join NADMO as a professional employee after completing education", "To not dump rubbish in drains or water bodies, report galamsey and environmental violations", "To build flood barriers around your home and school every rainy season"],correct:2,explain:"Every student can contribute directly to disaster prevention: never dumping rubbish in drains or water bodies (a direct cause of urban flooding), reporting galamsey and environmental violations to NADMO and EPA, participating in community clean-up activities, attending disaster preparedness drills, and knowing NADMO's emergency number (0800-111-222). These simple actions, multiplied across millions of Ghanaian students, save lives every rainy season."}
];

function showQuestion(){

  else{qt.textContent='🌊 NADMO Disaster Management';qt.style.background='rgba(40,20,0,0.6)';}
  var imgArea=document.getElementById('qImageArea');
  if(q.svgKey&&IMAGES[q.svgKey]){imgArea.innerHTML='<div class="q-image-wrap"><span class="q-image-label">🌊 Identify &amp; Analyse</span>'+IMAGES[q.svgKey]+'</div>';}
  else{imgArea.innerHTML='';}
  document.getElementById('question').textContent=q.question;
  document.getElementById('progress').style.width=(current/QUESTIONS_ACTIVE.length*100)+'%';
  var ans=document.getElementById('answers');ans.innerHTML='';
  var labels=['A','B','C','D'];
  var shuffled=q.answers.map(function(text,origIdx){return{text:text,orig:origIdx};});
  for(var si=shuffled.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var st=shuffled[si];shuffled[si]=shuffled[sj];shuffled[sj]=st;}
  var newCorrect=shuffled.findIndex(function(item){return item.orig===q.correct;});
  window._currentShuffled=shuffled;window._currentNewCorrect=newCorrect;
  shuffled.forEach(function(item,i){
    var btn=document.createElement('button');
    btn.innerHTML='<span class="opt-label">'+labels[i]+'</span>'+item.text;
    btn.onclick=(function(idx,b){return function(){checkAnswer(idx,b);};})(i,btn);
    ans.appendChild(btn);
  });
  maxTime=90;startTimer();
  if(window.speechSynthesis){
    speechSynthesis.cancel();
    var readText='NADMO Disaster Management Quiz. Question '+(current+1)+'. '+q.question+'. Option A. '+shuffled[0].text+'. Option B. '+shuffled[1].text+'. Option C. '+shuffled[2].text+'. Option D. '+shuffled[3].text+'.';
    var uq=new SpeechSynthesisUtterance(readText);uq.lang='en-GB';uq.pitch=1.05;uq.rate=0.90;uq.volume=1.0;
    (function(){var vs=window.speechSynthesis.getVoices();var v=vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})||vs.find(function(x){return x.lang.startsWith('en-GB');})||vs.find(function(x){return x.lang.startsWith('en');});if(v)uq.voice=v;window.speechSynthesis.speak(uq);})();
    if(!window.speechSynthesis.getVoices().length){window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.onvoiceschanged=null;var vs=window.speechSynthesis.getVoices();var v=vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})||vs.find(function(x){return x.lang.startsWith('en-GB');})||vs.find(function(x){return x.lang.startsWith('en');});if(v)uq.voice=v;window.speechSynthesis.speak(uq);};}
  }
}
function startTimer(){
  clearInterval(timerInterval);timeLeft=maxTime;
  document.getElementById('time').textContent=timeLeft;
  var bar=document.getElementById('timerBar');bar.style.width='100%';bar.style.background='#00ff00';
  var yellowAt=Math.floor(maxTime*0.5);
  var redAt=Math.floor(maxTime*0.25);
  var _yellowed=false,_redded=false;

  function timerSpeak(text,pitch,rate){
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang='en-GB';u.pitch=pitch||1.05;u.rate=rate||0.95;u.volume=1.0;
    function pickV(){
      var vs=window.speechSynthesis.getVoices();
      return vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})||
             vs.find(function(v){return v.lang.startsWith('en-GB');})||
             vs.find(function(v){return v.lang.startsWith('en');});
    }
    var v=pickV();if(v)u.voice=v;
    speechSynthesis.speak(u);
  }

  timerInterval=setInterval(function(){
    timeLeft--;document.getElementById('time').textContent=timeLeft;
    var pct=timeLeft/maxTime*100;bar.style.width=pct+'%';bar.style.background=pct>50?'#00ff00':pct>25?'#ffd700':'#ff4444';

    var firstName=(localStorage.getItem('cadetName')||'Cadet').split(' ')[0];

    if(!_yellowed&&timeLeft<=yellowAt&&timeLeft>redAt){
      _yellowed=true;
      var msgs=['Keep going, '+firstName+'! You are halfway through your time.',
                firstName+', stay focused! You still have time — think carefully.',
                'You can do it, '+firstName+'! Choose your answer soon.'];
      timerSpeak(msgs[Math.floor(Math.random()*msgs.length)],1.1,0.95);
    }
    if(!_redded&&timeLeft<=redAt&&timeLeft>10){
      _redded=true;
      var rmsgs=[firstName+'! Time is running out — answer now!',
                 'Hurry, '+firstName+'! Only seconds left — pick your answer!',
                 firstName+', quick! Running out of time!'];
      timerSpeak(rmsgs[Math.floor(Math.random()*rmsgs.length)],1.2,1.1);
    }
    if(timeLeft<=10&&timeLeft>0){
      var AC=window.AudioContext||window.webkitAudioContext;
      if(AC){try{
        var ctx=new AC(),o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='square';o.frequency.value=400+(10-timeLeft)*80;
        g.gain.setValueAtTime(0.35,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
        o.start(ctx.currentTime);o.stop(ctx.currentTime+0.15);
      }catch(e){}}
      if(timeLeft===10) timerSpeak(firstName+'! Ten seconds! Answer now!',1.3,1.2);
      else if(timeLeft===5) timerSpeak('Five! '+firstName+' — now!',1.4,1.3);
      else if(timeLeft===3) timerSpeak('Three!',1.5,1.4);
      else if(timeLeft===2) timerSpeak('Two!',1.5,1.5);
      else if(timeLeft===1) timerSpeak('One!',1.5,1.5);
    }
    if(timeLeft<=0){clearInterval(timerInterval);timeExpired();}
  },1000);
}
function speakFeedbackThenAdvance(msg,pitch){
  var PAUSE_AFTER=3500,FALLBACK=90000;
  function doAdvance(){current++;showQuestion();}
  if(!window.speechSynthesis){setTimeout(doAdvance,PAUSE_AFTER);return;}
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(msg);u.lang='en-GB';u.pitch=pitch||1.05;u.rate=0.88;u.volume=1.0;
  function pickVoice(){
    var vs=window.speechSynthesis.getVoices();
    return vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})
        ||vs.find(function(x){return x.lang.startsWith('en-GB');})
        ||vs.find(function(x){return x.lang.startsWith('en-US');})
        ||vs.find(function(x){return x.lang.startsWith('en');})
        ||vs[0]||null;
  }
  var advanced=false,fallbackTimer=null;
  function advance(){if(advanced)return;advanced=true;if(fallbackTimer)clearTimeout(fallbackTimer);setTimeout(doAdvance,PAUSE_AFTER);}
  u.onend=advance;u.onerror=advance;
  fallbackTimer=setTimeout(advance,FALLBACK);
  var vs=window.speechSynthesis.getVoices();
  if(vs.length>0){
    var v=pickVoice();if(v)u.voice=v;
    try{speechSynthesis.speak(u);}catch(e){advance();}
  } else {
    window.speechSynthesis.onvoiceschanged=function(){
      window.speechSynthesis.onvoiceschanged=null;
      var v2=pickVoice();if(v2)u.voice=v2;
      try{speechSynthesis.speak(u);}catch(e){advance();}
    };
  }
}
function timeExpired(){
  var q=QUESTIONS_ACTIVE[current];
  if(!q) return;
  var btns=document.getElementById('answers').querySelectorAll('button');btns.forEach(function(b){b.disabled=true;});
  var nc=(window._currentNewCorrect!==undefined)?window._currentNewCorrect:q.correct;
  if(btns[nc]) btns[nc].classList.add('correct');if(window.sndWrong)sndWrong();
  var _ooh=document.getElementById('sndOohnewAudio');if(_ooh){_ooh.currentTime=0;_ooh.play().catch(function(){});}
  showExplanation();
  speakFeedbackThenAdvance('Time is up! The correct answer is option '+['A','B','C','D'][nc]+'.'+(q.explain?' '+q.explain:''),0.95);
}
function checkAnswer(sel,btn){
  if(window.sndClick)sndClick();clearInterval(timerInterval);
  var btns=document.getElementById('answers').querySelectorAll('button');btns.forEach(function(b){b.disabled=true;});
  var q=QUESTIONS_ACTIVE[current];
  if(!q) return;
  var nc=(window._currentNewCorrect!==undefined)?window._currentNewCorrect:q.correct;
  var labels=['A','B','C','D'];var ex=q.explain?' '+q.explain:'';
  if(sel===nc){
    btn.classList.add('correct');score++;if(window.sndCorrect)sndCorrect();
    (function(idx){var se=document.getElementById('sbStar'+idx);if(se)se.classList.add('earned');})(score-1);
    var _clap=document.getElementById('sndClapAudio');if(_clap){_clap.currentTime=0;_clap.play().catch(function(){});}
    var PRAISE=['Excellent!','Outstanding!','Brilliant!','Well done!','Correct!','Perfect!','Amazing!'];
    window._praiseIdx=(window._praiseIdx||0);var praise=PRAISE[window._praiseIdx%PRAISE.length];window._praiseIdx++;
    showExplanation();
    speakFeedbackThenAdvance(praise+' The correct answer is option '+labels[nc]+'.'+ex,1.15);
  }else{
    btn.classList.add('wrong');btns[nc].classList.add('correct');if(window.sndWrong)sndWrong();
    var _ooh=document.getElementById('sndOohnewAudio');if(_ooh){_ooh.currentTime=0;_ooh.play().catch(function(){});}
    showExplanation();
    speakFeedbackThenAdvance('That is not correct. You chose option '+labels[sel]+'. The correct answer is option '+labels[nc]+'.'+ex,0.95);
  }
}
function showExplanation(){var q=QUESTIONS_ACTIVE[current];if(q && q.explain){var el=document.getElementById('explanation');el.textContent='💡 '+q.explain;el.style.display='block';}}
function showResult(){
  clearInterval(timerInterval);document.getElementById('quizContainer').style.display='none';
  stopBgMusic();
  var pct=Math.round(score/QUESTIONS_ACTIVE.length*100);
  setTimeout(function(){if(window.sndWin)sndWin(pct);if(window.voiceResult)voiceResult(pct);},400);
  var badge,msg;
  if(pct>=85){badge='🏅 GOLD';msg='Outstanding Disaster Management Knowledge!';}
  else if(pct>=70){badge='🥈 SILVER';msg='Excellent work — great safety awareness!';}
  else if(pct>=50){badge='🥉 BRONZE';msg='Good effort — keep studying NADMO!';}
  else{badge='🎓 PARTICIPANT';msg='Study disaster management and try again!';}
  localStorage.setItem('nadmoScore',score+'/'+QUESTIONS_ACTIVE.length);
  if(pct>=70){confetti({particleCount:200,spread:120,origin:{y:0.6}});}
  document.getElementById('result').style.display='block';
  document.getElementById('result').innerHTML=
    '<div style="font-size:54px;margin-bottom:10px;">🌊</div>'+
    '<h2 style="font-size:22px;margin-bottom:6px;">'+badge+'</h2>'+
    '<p style="font-size:32px;font-weight:900;color:#FFD700;">'+score+' / '+QUESTIONS_ACTIVE.length+'</p>'+
    '<p style="font-size:18px;margin:6px 0 4px;">'+pct+'%</p>'+
    '<p style="opacity:.7;font-size:14px;margin-bottom:6px;">'+msg+'</p>'+
    '<p style="font-size:13px;opacity:.6;margin-bottom:20px;">🔓 Immigration quiz is now unlocked!</p>'+
    '<button onclick="CMG_GUARD.complete(\'nadmo\','+score+')" style="padding:14px 32px;background:linear-gradient(45deg,#FFD700,#e6a800);color:#000;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;box-shadow:0 4px 18px rgba(255,215,0,0.4);width:100%;margin-bottom:10px;">🏠 Back to Quiz Menu</button>'+
    '<button onclick="window.location.href=\'immigration_quiz.html\'" style="padding:12px 32px;background:rgba(255,255,255,0.1);color:#fff;border:2px solid rgba(255,255,255,0.3);border-radius:12px;font-size:14px;font-weight:bold;cursor:pointer;width:100%;">⏭ Go Directly to Next Quiz</button>';
  setTimeout(function(){ CMG_GUARD.complete('nadmo',score); },10000);
}

</script>

  // ── Init on DOM ready ──────────────────────────────

  if(document.readyState==='loading'){

})();

<script>

// ═══════════════════════════════════════════════════════
//  CMG QUIZ SOUND ENGINE  –  Web Audio API (offline)
// ═══════════════════════════════════════════════════════
(function(){
  var AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;
  var ctx = null;
  function getCtx(){
    if(!ctx){ ctx = new AC(); }
    if(ctx.state==='suspended') ctx.resume();
    return ctx;
  }
  function osc(freq,type,start,dur,gainVal,fadeOut){
    var c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(gainVal,c.currentTime+start);
    if(fadeOut) g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+start+dur);
    o.start(c.currentTime+start);o.stop(c.currentTime+start+dur);
  }
  function noise(start,dur,gainVal){
    var c=getCtx();
    var buf=c.createBuffer(1,c.sampleRate*dur,c.sampleRate);
    var data=buf.getChannelData(0);
    for(var i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
    var src=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();
    f.type='bandpass';f.frequency.value=2200;f.Q.value=0.8;
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(gainVal,c.currentTime+start);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+start+dur);
    src.start(c.currentTime+start);src.stop(c.currentTime+start+dur);
  }
  window.sndClick=function(){try{osc(800,'sine',0,0.04,0.18,true);osc(400,'square',0,0.04,0.07,true);}catch(e){}};
  window.sndCorrect=function(){try{
    osc(880,'sine',0,0.18,0.45,true);osc(1320,'sine',0,0.18,0.25,true);
    osc(1100,'sine',0.12,0.22,0.35,true);osc(1650,'sine',0.12,0.22,0.20,true);
    for(var i=0;i<7;i++) noise(0.28+i*0.1,0.07,0.5-i*0.03);
  }catch(e){}};
  window.sndWrong=function(){try{
    osc(220,'sawtooth',0,0.15,0.40,true);
    osc(180,'sawtooth',0,0.15,0.25,true);
    osc(150,'square',0.10,0.20,0.35,true);
  }catch(e){}};
  window.sndTick=function(){try{osc(1047,'square',0,0.07,0.22,true);}catch(e){}};
  window.sndWin=function(pct){try{
    if(pct>=80){
      [523,659,784,1047,1319].forEach(function(f,i){
        osc(f,'sine',i*0.12,0.35,0.35,true);
        osc(f*2,'triangle',i*0.12,0.25,0.18,true);
      });
      for(var i=0;i<14;i++) noise(0.55+i*0.09,0.07,0.55-i*0.02);
    } else if(pct>=50){
      osc(523,'sine',0,0.28,0.35,true);
      osc(659,'sine',0.14,0.28,0.30,true);
      osc(784,'sine',0.28,0.28,0.25,true);
      for(var j=0;j<7;j++) noise(0.5+j*0.1,0.07,0.35-j*0.02);
    } else {
      osc(440,'sine',0,0.30,0.20,true);
      osc(392,'sine',0.20,0.30,0.15,true);
    }
  }catch(e){}};

  var voices=[],praiseIdx=0;
  function loadV(){ voices=window.speechSynthesis?speechSynthesis.getVoices():[]; }
  if(window.speechSynthesis){ speechSynthesis.onvoiceschanged=loadV; loadV(); }
  function speak(t,pitch,rate,vol){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(t);
  u.lang='en-GB'; u.pitch=pitch||1.05; u.rate=rate||0.92; u.volume=vol||1;
  function pickVoice(){
    var vs=window.speechSynthesis.getVoices();
    return vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})
        ||vs.find(function(v){return v.lang.startsWith('en-GB');})
        ||vs.find(function(v){return v.lang.startsWith('en');});
  }
  function doSpeak(){ var v=pickVoice(); if(v) u.voice=v; speechSynthesis.speak(u); }
  window.speechSynthesis.onvoiceschanged=function(){
    window.speechSynthesis.onvoiceschanged=null;
    speechSynthesis.cancel();
    var v=pickVoice(); if(v) u.voice=v; speechSynthesis.speak(u);
  };
  if(window.speechSynthesis.getVoices().length>0){
    window.speechSynthesis.onvoiceschanged=null; doSpeak();
  }
}
  var PRAISE=['Excellent!','Outstanding!','Brilliant!','Well done!','Correct!','Perfect!','Amazing!'];
  window.voiceCorrect=function(){speak(PRAISE[praiseIdx%PRAISE.length],1.2,1.1,1.0);praiseIdx++;};
  window.voiceWrong=function(){speak('Not quite. Try next!',0.9,0.95,0.85);};
  window.voiceResult=function(pct){
    if(pct>=80)      speak('Amazing result! You are a champion!',1.2,1.0,1.0);
    else if(pct>=50) speak('Good effort! Keep studying!',1.1,1.0,0.9);
    else             speak('Keep practising! You will improve!',1.0,0.95,0.85);
  };
})();

// ══════════════════════════════════════
//  BACKGROUND MUSIC ENGINE (plays ../MEDIA/bg_music.mp3 at 20% volume)
// ══════════════════════════════════════
var _bgMusic = (function(){
  var a = new Audio();
  a.src     = '../MEDIA/bg_music.mp3';
  a.loop    = true;
  a.volume  = 0.20;
  a.preload = 'auto';
  return a;
})();

function startBgMusic(){
  _bgMusic.currentTime = 0;
  var p = _bgMusic.play();
  if(p && p.catch){ p.catch(function(){}); }
}

function stopBgMusic(){
  var step = _bgMusic.volume / 18;
  var fade = setInterval(function(){
    if(_bgMusic.volume > step){
      _bgMusic.volume = Math.max(0, _bgMusic.volume - step);
    } else {
      _bgMusic.volume = 0;
      _bgMusic.pause();
      clearInterval(fade);
    }
  }, 50);
}

</script>
