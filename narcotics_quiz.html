<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drug Safety & Awareness – NACOC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function(){
  'use strict';
  var _cs=document.createElement('style');
  _cs.id='cmg-cloak';
  _cs.textContent='body{visibility:hidden!important;pointer-events:none!important;}';
  document.head.appendChild(_cs);
  if(window.history&&window.history.pushState) window.history.pushState({cmgGuard:true},'',window.location.href);
  window.CMG_GUARD={
    init:function(opts){
      var quizKey=opts.quizKey||'unknown';
      var repeatable=opts.repeatable===true;
      var HUB='cadetnationalquiz.html';
      if(localStorage.getItem('cmgActivated')!=='true'||!localStorage.getItem('cadetName')||!localStorage.getItem('cmgCode')){
        window.location.replace('activate.html');return;
      }
      if(localStorage.getItem(quizKey+'Completed')==='true'&&!repeatable){window.location.replace(HUB);return;}
      var n=localStorage.getItem('cadetName')||'',c=localStorage.getItem('cmgCode')||'',exp=n+'|'+c;
      var sk=localStorage.getItem('cmgSessionKey');
      if(!sk){localStorage.setItem('cmgSessionKey',exp);}
      else if(sk!==exp){window.location.replace('activate.html');return;}
      localStorage.setItem('cmgLastPage',window.location.pathname.split('/').pop());
      window.addEventListener('popstate',function(){
        if(localStorage.getItem(quizKey+'Completed')==='true'&&!repeatable){window.location.replace(HUB);}
        else if(!localStorage.getItem('cmgActivated')){window.location.replace('activate.html');}
        else if(window.history&&window.history.pushState) window.history.pushState({cmgGuard:true},'',window.location.href);
      });
      var el=document.getElementById('cmg-cloak');if(el)el.parentNode.removeChild(el);
      document.body.style.visibility='';document.body.style.pointerEvents='';
    },
    complete:function(quizKey,score,repeatable){
      localStorage.setItem(quizKey+'Score',String(score));
      if(!repeatable)localStorage.setItem(quizKey+'Completed','true');
      if(window.history&&window.history.replaceState) window.history.replaceState({cmgDone:true},'',window.location.href);
      window.location.replace('cadetnationalquiz.html');
    }
  };
})();
</script>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#00006b,#0000FF);
  color:#fff;display:flex;flex-direction:column;align-items:center;padding:15px;margin:0;min-height:100vh;}
.logos{display:flex;flex-direction:column;align-items:center;width:100%;max-width:900px;margin-bottom:10px;}
.logos img:first-child{height:150px;margin-bottom:8px;}
.all-services-logo{width:700px;max-width:95%;display:block;margin:0 auto 10px auto;
  filter:drop-shadow(0 0 15px rgba(255,255,255,0.6)) drop-shadow(0 0 30px rgba(255,215,0,0.6));
  animation:fadeInLogo 2s ease-out,floatLogo 4s ease-in-out infinite;}
@keyframes fadeInLogo{from{opacity:0;transform:scale(0.7);}to{opacity:1;transform:scale(1);}}
@keyframes floatLogo{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
h1{font-size:20px;margin:5px 0 12px;text-align:center;}
.quiz-container{background:rgba(0,0,0,0.35);padding:20px;border-radius:12px;
  width:100%;max-width:560px;display:flex;flex-direction:column;gap:12px;}
.timer-row{display:flex;align-items:center;gap:10px;font-size:14px;}
.timer-bar-container{flex:1;background:rgba(255,255,255,0.2);border-radius:12px;height:12px;}
.timer-bar{width:100%;height:100%;background:#00ff00;border-radius:12px;}
.progress-bar{width:100%;background:rgba(255,255,255,0.2);border-radius:12px;overflow:hidden;height:10px;}
.progress{height:100%;width:0%;background:#f2c300;transition:width 0.3s;}
.meta-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.q-counter{font-size:12px;opacity:0.65;}
.q-type{font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;letter-spacing:.5px;}
#question{font-size:15px;font-weight:bold;line-height:1.6;}
.answers{display:flex;flex-direction:column;gap:8px;}
.answers button{background:rgba(255,255,255,0.08);color:#fff;
  border:2px solid rgba(255,255,255,0.15);border-radius:10px;padding:11px 13px;
  font-size:13px;font-weight:bold;cursor:pointer;text-align:left;transition:all 0.2s;}
.answers button:hover:not(:disabled){background:rgba(255,255,255,0.2);transform:scale(1.02);}
.answers button.correct{background:rgba(0,200,80,0.5)!important;border-color:#00c850!important;}
.answers button.wrong{background:rgba(220,50,50,0.5)!important;border-color:#dc3232!important;}
.answers button:disabled{cursor:default;}
.result{text-align:center;display:none;padding:25px 15px;}

/* ══════════════════════════════════════
   CMG WELCOME SCREEN
══════════════════════════════════════ */
#cmgWelcome{
  position:fixed;inset:0;z-index:99999;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center, #0d2a5e 0%, #040d1f 100%);
  overflow:hidden;
}
/* animated star field */
#cmgWelcome .stars{
  position:absolute;inset:0;pointer-events:none;overflow:hidden;
}
#cmgWelcome .star{
  position:absolute;border-radius:50%;background:#fff;
  animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}

/* floating particles */
#cmgWelcome .particle{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:floatUp var(--pd,6s) ease-in-out infinite var(--pdelay,0s);
  opacity:0;
}
@keyframes floatUp{
  0%{transform:translateY(0) scale(0);opacity:0;}
  20%{opacity:.7;}
  80%{opacity:.4;}
  100%{transform:translateY(-120vh) scale(1.5);opacity:0;}
}

/* card */
#cmgCard{
  position:relative;z-index:2;
  background:linear-gradient(160deg,rgba(13,31,66,.95) 0%,rgba(26,58,110,.95) 100%);
  border:2px solid rgba(255,215,0,.6);
  border-radius:22px;padding:32px 28px 26px;
  width:92%;max-width:400px;text-align:center;
  box-shadow:0 0 60px rgba(255,215,0,.2),0 20px 60px rgba(0,0,0,.8);
  animation:cardPop .55s cubic-bezier(.175,.885,.32,1.275) forwards;
}
@keyframes cardPop{
  0%{transform:scale(.6) translateY(40px);opacity:0;}
  100%{transform:scale(1) translateY(0);opacity:1;}
}

/* gold glow ring */
#cmgCard::before{
  content:'';position:absolute;inset:-3px;border-radius:24px;z-index:-1;
  background:linear-gradient(45deg,#FFD700,#ff6b00,#FFD700,#00d4ff,#FFD700);
  background-size:300% 300%;
  animation:ringRotate 3s linear infinite;
  filter:blur(6px);opacity:.6;
}
@keyframes ringRotate{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}

.wBadge{
  display:inline-block;
  background:linear-gradient(135deg,#FFD700,#e6a800);
  color:#000;font-weight:900;font-size:11px;letter-spacing:2px;
  text-transform:uppercase;border-radius:20px;padding:4px 14px;margin-bottom:12px;
}
.wEmoji{font-size:54px;display:block;margin-bottom:4px;animation:bounce .8s ease-in-out infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-8px);}}

.wGreeting{font-size:13px;color:rgba(255,215,0,.7);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.wName{
  font-size:28px;font-weight:900;
  background:linear-gradient(90deg,#FFD700,#fff,#FFD700);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 2s linear infinite;margin-bottom:2px;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}

.wService{font-size:16px;font-weight:700;color:#fff;margin-bottom:2px;}
.wOrg{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-bottom:16px;}

/* tip box */
.wTip{
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);
  border-radius:10px;padding:10px 14px;margin-bottom:18px;
  font-size:12.5px;color:rgba(255,255,255,.78);line-height:1.55;font-style:italic;
}
.wTip span{color:#FFD700;font-weight:700;font-style:normal;}

/* progress dots (3 animated) */
.wDots{display:flex;justify-content:center;gap:6px;margin-bottom:16px;}
.wDot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,215,0,.3);
  animation:dotPulse 1.2s ease-in-out infinite;
}
.wDot:nth-child(2){animation-delay:.2s;}
.wDot:nth-child(3){animation-delay:.4s;}
@keyframes dotPulse{0%,100%{background:rgba(255,215,0,.3);transform:scale(1);}50%{background:#FFD700;transform:scale(1.4);}}

/* CTA button */
#cmgStartBtn{
  background:linear-gradient(45deg,#FFD700,#e6a800);
  color:#000;border:none;border-radius:14px;
  padding:15px 0;width:100%;font-size:17px;font-weight:900;
  cursor:pointer;letter-spacing:.4px;
  box-shadow:0 6px 24px rgba(255,215,0,.45);
  transition:transform .15s,box-shadow .15s;
  animation:ctaPulse 1.8s ease-in-out infinite;
}
@keyframes ctaPulse{
  0%,100%{box-shadow:0 6px 24px rgba(255,215,0,.4);}
  50%{box-shadow:0 6px 40px rgba(255,215,0,.9);}
}
#cmgStartBtn:active{transform:scale(.96);}

.wFooter{margin-top:12px;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:1px;}


/* ══ LIVE STAR SCORE BAR ══ */
#starBar{width:100%;max-width:560px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,215,0,0.25);border-radius:12px;padding:8px 12px;display:none;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:4px;}
#starBar .sb-label{font-size:11px;font-weight:bold;color:rgba(255,215,0,0.7);margin-right:6px;white-space:nowrap;}
.sb-star{font-size:20px;line-height:1;display:inline-block;opacity:0.25;transition:opacity 0.2s;}
.sb-star.earned{opacity:1;animation:starPop 0.45s cubic-bezier(0.175,0.885,0.32,1.6) forwards;}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg);}60%{transform:scale(1.5) rotate(10deg);}100%{transform:scale(1) rotate(0deg);}}
</style>
</head>

   answers:['It has no connection — the Anti-Money Laundering Act covers only corruption by government officials','Drug trafficking profits must be laundered — this act allows prosecution of traffickers for the financial crime too','The act requires drug traffickers to declare their earnings to the Ghana Revenue Authority annually','It only applies to foreign nationals trafficking drugs through Ghana and not to Ghanaian citizens themselves'],
   correct:1,

  {type:'text',
   question:'Kwame hears that some drugs are legally prescribed but still abused. What is an example?',
   answers:['Paracetamol — a widely abused prescription painkiller that causes severe addiction across West Africa','Tramadol and codeine — controlled painkillers legally prescribed by doctors but widely abused in Ghana','Vitamin C tablets — frequently abused by students who use them as energy boosters before examinations','Malaria drugs — abused by students who believe they enhance concentration during long study sessions'],

  {type:'text',
   question:'Akosua reads that some communities grow cannabis in Ghana. What is the legal status of cannabis cultivation?',
   answers:['Cannabis cultivation is fully legal throughout Ghana for any purpose without any licence or permit needed','Cultivation for personal use only is legal — it is only commercial cultivation and sale that is prohibited','Cannabis cultivation is illegal in Ghana without an official licence — even small plants can lead to prosecution','Cannabis is fully legal to cultivate in the Volta and Oti regions but illegal everywhere else in Ghana'],
   correct:2,

  {type:'text',
   question:'Ama learns that drug abuse affects families as a whole. What is one major family impact?',

  {type:'text',
   question:'Yaw reads about harm reduction strategies used in some countries. What does harm reduction mean?',
   answers:['Completely eliminating all drug use in a country through heavy criminal penalties for all users found','Reducing the total number of drug users each year by arresting a higher percentage of dealers nationally','Minimising the negative health and social consequences of drug use for people who cannot immediately stop','Only providing clean needles to intravenous drug users — harm reduction applies to no other drug types'],

  {type:'text',
   question:'Abena reads that NACOC runs school awareness campaigns. Why target students specifically?',
   answers:['Students have more free money than working adults and are therefore the most profitable market for dealers','Most drug use begins in adolescence when peer pressure is highest and the developing brain is most vulnerable','Students are targeted because they live in dormitories making group drug use very easy to organise secretly','School campaigns are only run because international donors fund them — NACOC has no domestic interest in youth'],
   correct:1,
   explain:'Adolescence is the most critical risk period because the brain\'s reward system is highly active while impulse control is still developing — making young people especially vulnerable to addiction. Early initiation leads to more severe dependence. School-based programmes reach young people before habits form.'},

  {type:'text',
   question:'Mensah reads that drug addiction is classified as a chronic brain disorder. What does this mean for treatment?',
   answers:['It means addicts are permanently brain damaged and cannot recover regardless of any treatment offered','It means addiction is purely a moral failing — brain disorder classification was rejected by medical science','It means treatment requires medical and psychological intervention — not just willpower or criminal punishment','It means only brain surgery can treat addiction — all other forms of treatment are completely ineffective'],
   correct:2,
   explain:'Addiction as a chronic brain disorder means the brain\'s structure changes — particularly the prefrontal cortex and reward systems. Recovery requires sustained treatment and support, not just willpower. Relapse is common and does not mean failure — it means more support is needed.'},

  {type:'text',
   question:'Esi sees a classmate who started using drugs looking increasingly unwell and isolated. What is the best response?',
   answers:['Report the classmate directly to the police — this will force them to stop using drugs immediately','Avoid them completely so you are not associated with drug use and risk damaging your own reputation','Talk to a trusted teacher or school counsellor so the classmate can receive the help and support they need','Share their situation on social media to raise awareness — public pressure will motivate them to seek treatment'],
   correct:2,
   explain:'Speak privately with the classmate, express genuine concern, and encourage them to seek help — from a school counsellor, trusted adult or NCC rehabilitation services. Involving supportive adults without punishment is more effective than police referral or avoidance. Early intervention saves lives.'},

  {type:'text',
   question:'Adwoa reads that some traditional healers in Ghana use cannabis in ceremonies. Does this make it legal?',
   answers:['Yes — traditional use of cannabis in certified ceremonies is fully protected under Ghana\'s Traditional Medicine Act','Yes — NACOC specifically exempts traditional medicine practitioners from all drug control laws in Ghana','No — traditional or religious use does not override Ghana\'s Narcotics Control Commission Act 2020','Yes — but only if the ceremony is registered with both the Chieftaincy Commission and the Ministry of Health'],
   correct:2,
   explain:'Traditional use does not create a legal exemption. Cannabis cultivation, possession and use for any unlicensed purpose — including ceremonies — remains a criminal offence in Ghana. Only licensed entities may handle cannabis under strict NCC supervision for approved medical or industrial purposes.'},

  {type:'text',
   question:'Kofi reads that shisha (hookah) is popular at some Ghanaian social venues. What is the health risk?',
   answers:['Shisha has no health risks — the water filters all harmful substances before the smoke reaches the lungs','Shisha is less harmful than cigarettes because the smoke is cooled — there is no risk of lung damage at all','Shisha smoke contains nicotine, carbon monoxide and toxins — one session can equal smoking many cigarettes','The only risk of shisha is mild dehydration — there are no respiratory or addiction risks associated with use'],
   correct:2,
   explain:'Shisha smoke contains the same toxins as cigarette smoke — carbon monoxide, heavy metals and carcinogens — but in higher concentrations because sessions last much longer. A one-hour shisha session exposes users to far more smoke than a single cigarette. The water does not filter harmful substances.'},

  {type:'text',
   question:'Kwame hears about the NACOC rehabilitation centre in Accra. What services does it provide?',
   answers:['It only provides temporary shelter for homeless drug users with no medical or counselling services offered','It provides medical detoxification, psychological counselling, vocational training and reintegration support','It is a detention facility where convicted drug users are held as an alternative to prison sentences','It only treats foreign nationals since Ghanaians are treated at general government hospitals across the country'],
   correct:1,
   explain:'NCC\'s rehabilitation centre provides medical detoxification to manage withdrawal safely, psychological counselling to address root causes, vocational skills training and relapse prevention support. Treatment is available to Ghanaians who voluntarily seek help — no criminal charges for self-referral.'},

  {type:'text',
   question:'Ama reads that peer refusal skills are the most effective protection against drug initiation. What are they?',
   answers:['Skills for identifying undercover NACOC officers who use peer relationships to trap drug users','The ability to confidently say no to peer pressure in social situations without losing friendships or respect','Physical self-defence techniques used to protect yourself when dealers become aggressive during a refusal','Academic skills that help students who use drugs to still perform well and avoid detection by their teachers'],
   correct:1,
   explain:'Peer refusal skills — practising confident, direct refusal without explanation or apology — are the most evidence-based protection against drug initiation. Role-playing refusal scenarios builds confidence. Remember: \'No thank you\' is a complete sentence requiring no justification.'},

  {type:'text',
   question:'Yaw reads that some drugs cause withdrawal symptoms when stopped. Why does this make quitting hard?',
   answers:['Withdrawal is mild discomfort only — the difficulty of quitting is entirely psychological and not physical','Withdrawal symptoms include severe physical and psychological distress making stopping without support very dangerous','Withdrawal is only experienced by people who have been using drugs for more than ten consecutive years','Withdrawal symptoms only occur with alcohol and heroin — all other drugs can be stopped without any effects'],
   correct:1,
   explain:'Withdrawal from opioids, alcohol and benzodiazepines causes severe physical symptoms — vomiting, tremors, seizures and intense cravings. These symptoms make unassisted quitting extremely difficult and sometimes medically dangerous. Medical supervision and gradual reduction is safer and more effective.'},

  {type:'text',
   question:'Abena reads about drug abuse and academic performance. What is the relationship?',
   answers:['Drug abuse has no effect on academic performance — students can use drugs and still perform at full capacity','Drugs like marijuana can actually improve academic performance by reducing exam anxiety in most students','Drug abuse impairs memory, concentration and attendance — all of which directly harm academic performance','The relationship depends entirely on the type of drug — stimulants always improve and depressants reduce grades'],
   correct:2,
   explain:'Drug abuse impairs memory, concentration and cognitive processing — all essential for academic success. Regular cannabis use is particularly linked to working memory impairment in young people. Students who use drugs regularly underperform academically, miss classes and are more likely to drop out.'},

  {type:'text',
   question:'Mensah hears about the connection between drug abuse and road accidents in Ghana. What is the link?',
   answers:['There is no connection — driving while on drugs is so rare in Ghana that it does not affect accident rates','Drugs only affect driving ability the first time they are used — experienced drug users drive safely','Drugs impair reaction time, judgement and coordination — driving under the influence significantly raises accident risk','Only alcohol causes driving impairment — other drugs actually sharpen driver attention and reaction speed'],
   correct:2,
   explain:'Drugs and alcohol impair reaction time, judgment and coordination — all critical for safe driving. Driving under the influence of any substance significantly increases accident risk. Ghana Police and MTTD conduct roadside impairment checks. Causing death by dangerous driving while impaired carries severe penalties.'},

  {type:'text',
   question:'Esi reads that Ghana signed the UN Convention Against Illicit Traffic in Narcotic Drugs. What does this require?',
   answers:['Ghana must legalise marijuana in line with the convention\'s harm reduction recommendations to member states','It requires Ghana to cooperate internationally on extradition, intelligence sharing and anti-trafficking operations','Ghana must spend at least 10% of its national budget on drug enforcement as required by the UN Convention','The convention only requires Ghana to publish annual drug statistics — no operational obligations are imposed'],
   correct:1,
   explain:'By signing the 1988 UN Convention Against Illicit Traffic in Narcotic Drugs, Ghana committed to criminalising drug trafficking, seizing drug assets, extraditing traffickers and cooperating internationally. The Convention does not require legalisation — it requires stricter enforcement against trafficking.'},

  {type:'text',
   question:'Adwoa hears about the dangers of buying drugs online through social media platforms. What is the specific risk?',
   answers:['Online drugs are always genuine pharmaceutical products — the only risk is paying too much for them','The drugs may be counterfeit, contaminated or mixed with lethal substances — you cannot know what you are taking','Online drug buying is only risky because NACOC monitors all social media transactions in real time in Ghana','The risk is purely financial — you may be scammed and lose your money but the drugs themselves are safe'],
   correct:1,
   explain:'Drugs bought online or through social media may be counterfeit, contaminated or adulterated with lethal substances. Online drug dealers frequently deceive buyers about content and purity. Purchasing controlled substances online is also a criminal offence regardless of the platform used.'},

  {type:'text',
   question:'Kofi reads that drug trafficking is punishable by up to 25 years imprisonment in Ghana. Why are the penalties so severe?',
   answers:['Severe penalties exist because the international community pressures Ghana to maintain high sentencing levels','The penalties reflect the serious social harm caused — trafficking destroys communities, families and individual lives','Long sentences are used only for foreign traffickers — Ghanaian traffickers typically receive much shorter terms','The penalties were set in colonial times and have never been reviewed or updated under independent Ghana'],
   correct:1,
   explain:'Ghana\'s severe trafficking penalties reflect the catastrophic social harm caused — destroyed families, increased crime, health epidemics and funding of criminal networks. Strong deterrent sentences are part of Ghana\'s commitment under international drug control conventions to protect society.'},

  {type:'text',
   question:'Kwame is asked by a friend to "just hold this bag for a minute" near a border checkpoint. What should he do?',
   answers:['Hold it briefly — you are not responsible for contents you did not pack into the bag yourself','Hold it and look inside quickly to satisfy yourself that the contents are harmless before agreeing to help','Firmly refuse and walk away — physical possession of a bag containing drugs makes you legally liable regardless','Accept it and hand it to a police officer nearby — this will protect you from any legal responsibility involved'],
   correct:2,
   explain:'Holding a bag for a stranger near a checkpoint is a recognised tactic used by traffickers. You become legally responsible for any contents from the moment you take it. \'Not knowing\' what was inside is not a legal defence in Ghana. Always refuse to hold items for people you do not know.'}
];

let QUESTIONS = [];
(function(){
  var bank = QUESTION_BANK.slice();
  for(var i=bank.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=bank[i];bank[i]=bank[j];bank[j]=t;}
  QUESTIONS = bank.slice(0,30);

<script>
let current=0,score=0,timerInterval,timeLeft,maxTime;
const Q=QUESTIONS;
const questionEl=document.getElementById('question'),
      answersEl=document.getElementById('answers'),
      resultEl=document.getElementById('result'),
      quizContainer=document.querySelector('.quiz-container'),
      progressEl=document.getElementById('progress'),
      timeEl=document.getElementById('time'),
      timerBarEl=document.getElementById('timerBar'),
      qCounterEl=document.getElementById('qCounter'),
      qTypeEl=document.getElementById('qType');

function getTime(idx){return idx<20?50:30;}
function startTimer(){
  clearInterval(timerInterval);
  maxTime=90;timeLeft=maxTime;timeEl.textContent=timeLeft;
  timerBarEl.style.transition='none';timerBarEl.style.width='100%';timerBarEl.style.background='#00ff00';
  requestAnimationFrame(()=>{timerBarEl.style.transition='width 1s linear,background 1s linear';});

  var yellowAt=Math.floor(maxTime*0.5);
  var redAt=Math.floor(maxTime*0.25);
  var _yellowed=false,_redded=false;

  function timerSpeak(text,pitch,rate){
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang='en-GB';u.pitch=pitch||1.05;u.rate=rate||0.95;u.volume=1.0;
    function pickV(){
      var vs=window.speechSynthesis.getVoices();
      return vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})||
             vs.find(function(v){return v.lang.startsWith('en-GB');})||
             vs.find(function(v){return v.lang.startsWith('en');});
    }
    var v=pickV();if(v)u.voice=v;
    speechSynthesis.speak(u);
  }

  timerInterval=setInterval(()=>{
    timeLeft--;timeEl.textContent=timeLeft;
    timerBarEl.style.width=(timeLeft/maxTime*100)+'%';
    timerBarEl.style.background=timeLeft/maxTime>0.5?'#00ff00':timeLeft/maxTime>0.25?'#ffd700':'#ff4444';

    var firstName=(localStorage.getItem('cadetName')||'Cadet').split(' ')[0];

    if(!_yellowed&&timeLeft<=yellowAt&&timeLeft>redAt){
      _yellowed=true;
      var msgs=['Keep going, '+firstName+'! You are halfway through your time.',
                firstName+', stay focused! You still have time — think carefully.',
                'You can do it, '+firstName+'! Choose your answer soon.'];
      timerSpeak(msgs[Math.floor(Math.random()*msgs.length)],1.1,0.95);
    }
    if(!_redded&&timeLeft<=redAt&&timeLeft>10){
      _redded=true;
      var rmsgs=[firstName+'! Time is running out — answer now!',
                 'Hurry, '+firstName+'! Only seconds left — pick your answer!',
                 firstName+', quick! Running out of time!'];
      timerSpeak(rmsgs[Math.floor(Math.random()*rmsgs.length)],1.2,1.1);
    }
    if(timeLeft<=10&&timeLeft>0){
      var AC=window.AudioContext||window.webkitAudioContext;
      if(AC){try{
        var ctx=new AC(),o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='square';o.frequency.value=400+(10-timeLeft)*80;
        g.gain.setValueAtTime(0.35,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
        o.start(ctx.currentTime);o.stop(ctx.currentTime+0.15);
      }catch(e){}}
      if(timeLeft===10) timerSpeak(firstName+'! Ten seconds! Answer now!',1.3,1.2);
      else if(timeLeft===5) timerSpeak('Five! '+firstName+' — now!',1.4,1.3);
      else if(timeLeft===3) timerSpeak('Three!',1.5,1.4);
      else if(timeLeft===2) timerSpeak('Two!',1.5,1.5);
      else if(timeLeft===1) timerSpeak('One!',1.5,1.5);
    }
    if(timeLeft<=0){clearInterval(timerInterval);handleTimeout();}
  },1000);
}
function speakFeedbackThenAdvance(msg,pitch){
  var PAUSE_AFTER=3500,FALLBACK=90000;
  function doAdvance(){current++;showQuestion();}
  if(!window.speechSynthesis){setTimeout(doAdvance,PAUSE_AFTER);return;}
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(msg);u.lang='en-GB';u.pitch=pitch||1.05;u.rate=0.88;u.volume=1.0;
  function pickVoice(){
    var vs=window.speechSynthesis.getVoices();
    return vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})
        ||vs.find(function(x){return x.lang.startsWith('en-GB');})
        ||vs.find(function(x){return x.lang.startsWith('en-US');})
        ||vs.find(function(x){return x.lang.startsWith('en');})
        ||vs[0]||null;
  }
  var advanced=false,fallbackTimer=null;
  function advance(){if(advanced)return;advanced=true;if(fallbackTimer)clearTimeout(fallbackTimer);setTimeout(doAdvance,PAUSE_AFTER);}
  u.onend=advance;u.onerror=advance;
  fallbackTimer=setTimeout(advance,FALLBACK);
  var vs=window.speechSynthesis.getVoices();
  if(vs.length>0){
    var v=pickVoice();if(v)u.voice=v;
    try{speechSynthesis.speak(u);}catch(e){advance();}
  } else {
    window.speechSynthesis.onvoiceschanged=function(){
      window.speechSynthesis.onvoiceschanged=null;
      var v2=pickVoice();if(v2)u.voice=v2;
      try{speechSynthesis.speak(u);}catch(e){advance();}
    };
  }
}
function handleTimeout(){
  var q=Q[current];
  if(!q) return;
  var btns=document.getElementById('answers').querySelectorAll('button');
  var nc=(window._currentNewCorrect!==undefined)?window._currentNewCorrect:q.correct;
  btns.forEach(function(b){b.disabled=true;});
  if(btns[nc]) btns[nc].classList.add('correct');
  if(window.sndWrong)sndWrong();
  var _ooh=document.getElementById('sndOohnewAudio');if(_ooh){_ooh.currentTime=0;_ooh.play().catch(function(){});}
  var el=document.getElementById('explanation');
  if(q.explain){el.textContent='💡 '+q.explain;el.style.display='block';}
  speakFeedbackThenAdvance('Time is up! The correct answer is option '+['A','B','C','D'][nc]+'.'+(q.explain?' '+q.explain:''),0.95);
}
function showQuestion(){
  if(window.speechSynthesis)speechSynthesis.cancel();
  var _expl=document.getElementById('explanation');if(_expl)_expl.style.display='none';
  if(current>=Q.length){showResult();return;}
  var q=Q[current];
  qCounterEl.textContent='Q'+(current+1)+' / '+Q.length;
  qTypeEl.textContent='💊 Narcotics Control';
  qTypeEl.style.background='rgba(200,50,50,0.2)';
  questionEl.textContent=q.question;
  var labels=['A','B','C','D'];
  var shuffled=q.answers.map(function(text,origIdx){return{text:text,orig:origIdx};});
  for(var si=shuffled.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var st=shuffled[si];shuffled[si]=shuffled[sj];shuffled[sj]=st;}
  var newCorrect=shuffled.findIndex(function(item){return item.orig===q.correct;});
  window._currentShuffled=shuffled;window._currentNewCorrect=newCorrect;
  answersEl.innerHTML='';
  shuffled.forEach(function(item,i){
    var btn=document.createElement('button');
    btn.innerHTML='<span class="opt-label">'+labels[i]+'</span>'+item.text;
    btn.onclick=(function(idx,b){return function(){checkAnswer(idx,b);};})(i,btn);
    answersEl.appendChild(btn);
  });
  progressEl.style.width=(current/Q.length*100)+'%';
  startTimer();
  if(window.speechSynthesis){
    speechSynthesis.cancel();
    var readText='Narcotics Control Quiz. Question '+(current+1)+'. '+q.question+'. Option A. '+shuffled[0].text+'. Option B. '+shuffled[1].text+'. Option C. '+shuffled[2].text+'. Option D. '+shuffled[3].text+'.';
    var uq=new SpeechSynthesisUtterance(readText);uq.lang='en-GB';uq.pitch=1.05;uq.rate=0.90;uq.volume=1.0;
    (function(){var vs=window.speechSynthesis.getVoices();var v=vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})||vs.find(function(x){return x.lang.startsWith('en-GB');})||vs.find(function(x){return x.lang.startsWith('en');});if(v)uq.voice=v;window.speechSynthesis.speak(uq);})();
    if(!window.speechSynthesis.getVoices().length){window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.onvoiceschanged=null;var vs=window.speechSynthesis.getVoices();var v=vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})||vs.find(function(x){return x.lang.startsWith('en-GB');})||vs.find(function(x){return x.lang.startsWith('en');});if(v)uq.voice=v;window.speechSynthesis.speak(uq);};}
  }
}
function checkAnswer(selected,clickedBtn){
  if(window.sndClick)sndClick();clearInterval(timerInterval);
  var btns=answersEl.querySelectorAll('button');btns.forEach(function(b){b.disabled=true;});
  var q=Q[current];
  if(!q) return;
  var nc=(window._currentNewCorrect!==undefined)?window._currentNewCorrect:q.correct;
  var labels=['A','B','C','D'];var ex=q.explain?' '+q.explain:'';
  if(selected===nc){
    clickedBtn.classList.add('correct');score++;if(window.sndCorrect)sndCorrect();
    (function(idx){var se=document.getElementById('sbStar'+idx);if(se)se.classList.add('earned');})(score-1);
    var _clap=document.getElementById('sndClapAudio');if(_clap){_clap.currentTime=0;_clap.play().catch(function(){});}
    var PRAISE=['Excellent!','Outstanding!','Brilliant!','Well done!','Correct!','Perfect!','Amazing!'];
    window._praiseIdx=(window._praiseIdx||0);var praise=PRAISE[window._praiseIdx%PRAISE.length];window._praiseIdx++;
    showExplanation();
    speakFeedbackThenAdvance(praise+' The correct answer is option '+labels[nc]+'.'+ex,1.15);
  }else{
    clickedBtn.classList.add('wrong');btns[nc].classList.add('correct');if(window.sndWrong)sndWrong();
    var _ooh=document.getElementById('sndOohnewAudio');if(_ooh){_ooh.currentTime=0;_ooh.play().catch(function(){});}
    showExplanation();
    speakFeedbackThenAdvance('That is not correct. You chose option '+labels[selected]+'. The correct answer is option '+labels[nc]+'.'+ex,0.95);
  }
}
function showExplanation(){
  var q=Q[current];
  if(q && q.explain){var el=document.getElementById('explanation');el.textContent='💡 '+q.explain;el.style.display='block';}
}
function showResult(){
  quizContainer.style.display='none';resultEl.style.display='block';
  resultEl.innerHTML='<h2>You scored '+score+' out of '+Q.length+'</h2>';
  var _pct=Math.round(score/Q.length*100);setTimeout(function(){if(window.sndWin)sndWin(_pct);if(window.voiceResult)voiceResult(_pct);},400);
  CMG_GUARD.complete('narcotics', score);
  localStorage.setItem(QUIZ_CONFIG.scoreKey,score);
  const badge=document.createElement('div');
  badge.style.cssText='margin-top:15px;padding:15px 28px;font-weight:bold;border-radius:14px;display:inline-block;font-size:18px;';
  if(score>=Q.length*0.85){
    badge.style.background='linear-gradient(45deg,#FFD700,#ffb300)';badge.style.color='#000';
    badge.textContent='🏅 GOLD — Certified Cadet!';
    confetti({particleCount:200,spread:120,origin:{y:0.6}});
    document.getElementById('winSound').play().catch(()=>{});
  }else if(score>=Q.length*0.5){
    badge.style.background='linear-gradient(45deg,#c0c0c0,#e0e0e0)';badge.style.color='#000';
    badge.textContent='🥈 SILVER — Cadet!';
  }else{
    badge.style.background='linear-gradient(45deg,#cd7f32,#b87333)';badge.style.color='#fff';
    badge.textContent='🥉 BRONZE — Keep Training!';
  }
  resultEl.appendChild(badge);
  let cd=6;
  const msg=document.createElement('p');msg.style.cssText='opacity:.7;font-size:13px;margin-top:12px;';
  msg.textContent='Returning to menu in '+cd+'s…';resultEl.appendChild(msg);
  const t=setInterval(()=>{cd--;
    if(cd<=0){clearInterval(t);window.location.href='quiz_questions.html';}
    else msg.textContent='Returning to menu in '+cd+'s…';
  },1000);
}
// quiz started via cmgStartQuiz()
</script>

<script>

// ══════════════════════════════════════════════════════
//  CMG WELCOME SCREEN ENGINE
// ══════════════════════════════════════════════════════
(function(){
  var TIPS = [
    "Read each question carefully before choosing your answer.",
    "Stay calm — take a breath before each question.",
    "Trust your training. You have prepared for this!",
    "Every correct answer earns Ghana a safer future.",
    "Focus! Your community is counting on you."
  ];

  // ── Build star field ─────────────────────────────────
  function buildStars(){
    var container = document.getElementById('cmgStars');
    if(!container) return;
    for(var i=0;i<80;i++){
      var s=document.createElement('div');
      s.className='star';
      var size=(Math.random()*2.5+0.5)+'px';
      s.style.cssText=[

  // ── Populate cadet name + tip ───────────────────────
  function populateCard(){
    var name   = localStorage.getItem('cadetName')   || 'Cadet';
    var gender = localStorage.getItem('cadetGender') || 'Male';
    var first  = name.split(' ')[0];
    var title  = gender==='Female' ? 'Cadetess' : 'Cadet';
    var el = document.getElementById('wCadetName');
    if(el) el.textContent = title+' '+first+'!';
    var tipEl = document.getElementById('wTip');
    if(tipEl){
      var tip = TIPS[Math.floor(Math.random()*TIPS.length)];
      tipEl.innerHTML = '<span>💡 Tip:</span> '+tip;
    }
    return {name:name, first:first, gender:gender, title:title};
  }

  // ── Welcome fanfare sound (Web Audio API) ──────────
  function playWelcomeSound(){
    var AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    var c;
    try{ c = new AC(); } catch(e){ return; }

    function o(freq,type,start,dur,vol){
      var osc=c.createOscillator();
      var g=c.createGain();
      osc.connect(g); g.connect(c.destination);
      osc.type=type; osc.frequency.value=freq;
      g.gain.setValueAtTime(vol,c.currentTime+start);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+start+dur);
      osc.start(c.currentTime+start);
      osc.stop(c.currentTime+start+dur);
    }
    // rising welcome chime — C E G C
    o(523,'sine',0.0,  0.5, 0.30);
    o(659,'sine',0.15, 0.5, 0.28);
    o(784,'sine',0.30, 0.5, 0.25);
    o(1047,'sine',0.46,0.7, 0.35);
    o(1319,'sine',0.46,0.7, 0.20);
    // subtle harmony layer
    o(262,'triangle',0.0,0.9,0.12);
    o(392,'triangle',0.3,0.8,0.10);
  }

  // ── Voice welcome ──────────────────────────────────
  function playVoiceWelcome(info){
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    setTimeout(function(){
      var msgs = [
        'Welcome '+info.first+'! Good luck on your quiz. You can do it!',
        'Hello '+info.title+' '+info.first+'! Show us what you know. Best of luck!',
        'Great to have you, '+info.first+'! Stay focused and do your best!'
      ];
      var text = msgs[Math.floor(Math.random()*msgs.length)];
      var u = new SpeechSynthesisUtterance(text);
      u.pitch=1.15; u.rate=1.0; u.volume=1.0;
      u.lang='en-GB';
      (function doSpeak(){
        var vs=window.speechSynthesis.getVoices();
        var female=vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})
                 ||vs.find(function(v){return v.lang.startsWith('en-GB');})
                 ||vs.find(function(v){return v.lang.startsWith('en');});
        if(female) u.voice=female;
        speechSynthesis.speak(u);
      })();
      if(!window.speechSynthesis.getVoices().length){
        window.speechSynthesis.onvoiceschanged=function(){
          var vs=window.speechSynthesis.getVoices();
          var female=vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})
                   ||vs.find(function(v){return v.lang.startsWith('en-GB');})
                   ||vs.find(function(v){return v.lang.startsWith('en');});
          if(female) u.voice=female;
          speechSynthesis.speak(u);
        };
      }
    }, 500);
  }

  // ── Init on DOM ready ──────────────────────────────
  function initWelcome(){
    buildStars();
    populateCard();
    // Sound & voice fire on button click (browser autoplay policy requires user gesture)
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', initWelcome);
  } else {
    initWelcome();
  }
})();

      // Rising welcome chime: C E G high-C
      ob(523,'sine',0.0, 0.22,0.35);
      ob(659,'sine',0.18,0.22,0.32);
      ob(784,'sine',0.36,0.22,0.28);
      ob(1047,'sine',0.54,0.35,0.40);
      ob(1319,'sine',0.54,0.35,0.22);
      // launch beep burst at end
      ob(1047,'square',0.95,0.10,0.30);
      ob(1319,'square',1.05,0.12,0.35);
      ob(1568,'square',1.15,0.18,0.40);

    (function doSpeak(){
        var vs=window.speechSynthesis.getVoices();
        var female=vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})
                 ||vs.find(function(v){return v.lang.startsWith('en-GB');})
                 ||vs.find(function(v){return v.lang.startsWith('en');});
        if(female) u.voice=female;
        speechSynthesis.speak(u);
      })();

  // ── 4. Fade out welcome screen ───────────────────────

        '<img src="../MEDIA/pendrive.png" alt="Pendrive"' +

            'text-shadow:0 0 12px rgba(255,215,0,0.5);margin-bottom:4px;">Your Quiz Key</div>' +

  // ── 5. Start the quiz ─────────────────────────────────

<script>
// ═══════════════════════════════════════════════════════
//  CMG QUIZ SOUND ENGINE  –  Web Audio API (offline)
// ═══════════════════════════════════════════════════════
(function(){
  var AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;
  var ctx = null;
  function getCtx(){
    if(!ctx){ ctx = new AC(); }
    if(ctx.state==='suspended') ctx.resume();
    return ctx;
  }
  function osc(freq,type,start,dur,gainVal,fadeOut){
    var c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(gainVal,c.currentTime+start);
    if(fadeOut) g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+start+dur);
    o.start(c.currentTime+start);o.stop(c.currentTime+start+dur);
  }
  function noise(start,dur,gainVal){
    var c=getCtx();
    var buf=c.createBuffer(1,c.sampleRate*dur,c.sampleRate);
    var data=buf.getChannelData(0);
    for(var i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
    var src=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();
    f.type='bandpass';f.frequency.value=2200;f.Q.value=0.8;
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(gainVal,c.currentTime+start);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+start+dur);
    src.start(c.currentTime+start);src.stop(c.currentTime+start+dur);
  }
  window.sndClick=function(){try{osc(800,'sine',0,0.04,0.18,true);osc(400,'square',0,0.04,0.07,true);}catch(e){}};
  window.sndCorrect=function(){try{
    osc(880,'sine',0,0.18,0.45,true);osc(1320,'sine',0,0.18,0.25,true);
    osc(1100,'sine',0.12,0.22,0.35,true);osc(1650,'sine',0.12,0.22,0.20,true);
    for(var i=0;i<7;i++) noise(0.28+i*0.1,0.07,0.5-i*0.03);
  }catch(e){}};
  window.sndWrong=function(){try{
    osc(220,'sawtooth',0,0.15,0.40,true);
    osc(180,'sawtooth',0,0.15,0.25,true);
    osc(150,'square',0.10,0.20,0.35,true);
  }catch(e){}};
  window.sndTick=function(){try{osc(1047,'square',0,0.07,0.22,true);}catch(e){}};
  window.sndWin=function(pct){try{
    if(pct>=80){
      [523,659,784,1047,1319].forEach(function(f,i){
        osc(f,'sine',i*0.12,0.35,0.35,true);
        osc(f*2,'triangle',i*0.12,0.25,0.18,true);
      });
      for(var i=0;i<14;i++) noise(0.55+i*0.09,0.07,0.55-i*0.02);
    } else if(pct>=50){
      osc(523,'sine',0,0.28,0.35,true);
      osc(659,'sine',0.14,0.28,0.30,true);
      osc(784,'sine',0.28,0.28,0.25,true);
      for(var j=0;j<7;j++) noise(0.5+j*0.1,0.07,0.35-j*0.02);
    } else {
      osc(440,'sine',0,0.30,0.20,true);
      osc(392,'sine',0.20,0.30,0.15,true);
    }
  }catch(e){}};

  var voices=[],praiseIdx=0;
  function loadV(){ voices=window.speechSynthesis?speechSynthesis.getVoices():[]; }
  if(window.speechSynthesis){ speechSynthesis.onvoiceschanged=loadV; loadV(); }
  function speak(t,pitch,rate,vol){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(t);
  u.lang='en-GB'; u.pitch=pitch||1.05; u.rate=rate||0.92; u.volume=vol||1;
  function pickVoice(){
    var vs=window.speechSynthesis.getVoices();
    return vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})
        ||vs.find(function(v){return v.lang.startsWith('en-GB');})
        ||vs.find(function(v){return v.lang.startsWith('en');});
  }
  function doSpeak(){ var v=pickVoice(); if(v) u.voice=v; speechSynthesis.speak(u); }
  window.speechSynthesis.onvoiceschanged=function(){
    window.speechSynthesis.onvoiceschanged=null;
    speechSynthesis.cancel();
    var v=pickVoice(); if(v) u.voice=v; speechSynthesis.speak(u);
  };
  if(window.speechSynthesis.getVoices().length>0){
    window.speechSynthesis.onvoiceschanged=null; doSpeak();
  }
}
  var PRAISE=['Excellent!','Outstanding!','Brilliant!','Well done!','Correct!','Perfect!','Amazing!'];
  window.voiceCorrect=function(){speak(PRAISE[praiseIdx%PRAISE.length],1.2,1.1,1.0);praiseIdx++;};
  window.voiceWrong=function(){speak('Not quite. Try next!',0.9,0.95,0.85);};
  window.voiceResult=function(pct){
    if(pct>=80)      speak('Amazing result! You are a champion!',1.2,1.0,1.0);
    else if(pct>=50) speak('Good effort! Keep studying!',1.1,1.0,0.9);
    else             speak('Keep practising! You will improve!',1.0,0.95,0.85);
  };
})();

// ══════════════════════════════════════
//  BACKGROUND MUSIC ENGINE (plays ../MEDIA/bg_music.mp3 at 20% volume)
// ══════════════════════════════════════
var _bgMusic = (function(){
  var a = new Audio();
  a.src     = '../MEDIA/bg_music.mp3';
  a.loop    = true;
  a.volume  = 0.20;
  a.preload = 'auto';
  return a;
})();

function startBgMusic(){
  _bgMusic.currentTime = 0;
  var p = _bgMusic.play();
  if(p && p.catch){ p.catch(function(){}); }
}

function stopBgMusic(){
  var step = _bgMusic.volume / 18;
  var fade = setInterval(function(){
    if(_bgMusic.volume > step){
      _bgMusic.volume = Math.max(0, _bgMusic.volume - step);
    } else {
      _bgMusic.volume = 0;
      _bgMusic.pause();
      clearInterval(fade);
    }
  }, 50);
}

</script>
