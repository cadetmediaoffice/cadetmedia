<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tourism, Arts & Culture – Ghana Tourism Authority</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function(){
  'use strict';
  var _cs=document.createElement('style');
  _cs.id='cmg-cloak';
  _cs.textContent='body{visibility:hidden!important;pointer-events:none!important;}';
  document.head.appendChild(_cs);
  if(window.history&&window.history.pushState) window.history.pushState({cmgGuard:true},'',window.location.href);
  window.CMG_GUARD={
    init:function(opts){
      var quizKey=opts.quizKey||'unknown';
      var repeatable=opts.repeatable===true;
      var HUB='cadetnationalquiz.html';
      if(localStorage.getItem('cmgActivated')!=='true'||!localStorage.getItem('cadetName')||!localStorage.getItem('cmgCode')){
        window.location.replace('activate.html');return;
      }
      if(localStorage.getItem(quizKey+'Completed')==='true'&&!repeatable){window.location.replace(HUB);return;}
      var n=localStorage.getItem('cadetName')||'',c=localStorage.getItem('cmgCode')||'',exp=n+'|'+c;
      var sk=localStorage.getItem('cmgSessionKey');
      if(!sk){localStorage.setItem('cmgSessionKey',exp);}
      else if(sk!==exp){window.location.replace('activate.html');return;}
      localStorage.setItem('cmgLastPage',window.location.pathname.split('/').pop());
      window.addEventListener('popstate',function(){
        if(localStorage.getItem(quizKey+'Completed')==='true'&&!repeatable){window.location.replace(HUB);}
        else if(!localStorage.getItem('cmgActivated')){window.location.replace('activate.html');}
        else if(window.history&&window.history.pushState) window.history.pushState({cmgGuard:true},'',window.location.href);
      });
      var el=document.getElementById('cmg-cloak');if(el)el.parentNode.removeChild(el);
      document.body.style.visibility='';document.body.style.pointerEvents='';
    },
    complete:function(quizKey,score,repeatable){
      localStorage.setItem(quizKey+'Score',String(score));
      if(!repeatable)localStorage.setItem(quizKey+'Completed','true');
      if(window.history&&window.history.replaceState) window.history.replaceState({cmgDone:true},'',window.location.href);
      window.location.replace('cadetnationalquiz.html');
    }
  };
})();
</script>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(160deg,#150028 0%,#2a0055 30%,#3d007a 60%,#5200a0 80%,#6600c0 100%);
  animation:tourismFlicker 5s ease-in-out infinite alternate;
  color:#fff;display:flex;flex-direction:column;align-items:center;padding:15px;margin:0;min-height:100vh;}
.logos{display:flex;flex-direction:column;align-items:center;width:100%;max-width:900px;margin-bottom:10px;}
.logos img:first-child{height:150px;margin-bottom:8px;}
.all-services-logo{width:700px;max-width:95%;display:block;margin:0 auto 10px auto;
  filter:drop-shadow(0 0 15px rgba(255,255,255,0.6)) drop-shadow(0 0 30px rgba(255,215,0,0.6));
  animation:fadeInLogo 2s ease-out,floatLogo 4s ease-in-out infinite;}
@keyframes fadeInLogo{from{opacity:0;transform:scale(0.7);}to{opacity:1;transform:scale(1);}}
@keyframes floatLogo{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
h1{font-size:20px;margin:5px 0 12px;text-align:center;}
.quiz-container{background:rgba(8,0,20,0.65);position:relative;z-index:1;padding:20px;border-radius:12px;
  width:100%;max-width:560px;display:flex;flex-direction:column;gap:12px;}
.timer-row{display:flex;align-items:center;gap:10px;font-size:14px;}
.timer-bar-container{flex:1;background:rgba(255,255,255,0.2);border-radius:12px;height:12px;}
.timer-bar{width:100%;height:100%;background:#00ff00;border-radius:12px;}
.progress-bar{width:100%;background:rgba(255,255,255,0.2);border-radius:12px;overflow:hidden;height:10px;}
.progress{height:100%;width:0%;background:#f2c300;transition:width 0.3s;}
.meta-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.q-counter{font-size:12px;opacity:0.65;}
.q-type{font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;letter-spacing:.5px;}
#question{font-size:15px;font-weight:bold;line-height:1.6;}
.answers{display:flex;flex-direction:column;gap:8px;}
.answers button{background:rgba(255,255,255,0.08);color:#fff;
  border:2px solid rgba(255,255,255,0.15);border-radius:10px;padding:11px 13px;
  font-size:13px;font-weight:bold;cursor:pointer;text-align:left;transition:all 0.2s;}
.answers button:hover:not(:disabled){background:rgba(255,255,255,0.2);transform:scale(1.02);}
.answers button.correct{background:rgba(0,200,80,0.5)!important;border-color:#00c850!important;}
.answers button.wrong{background:rgba(220,50,50,0.5)!important;border-color:#dc3232!important;}
.answers button:disabled{cursor:default;}
.result{text-align:center;display:none;padding:25px 15px;}

/* ══════════════════════════════════════
   CMG WELCOME SCREEN
══════════════════════════════════════ */
#cmgWelcome{
  position:fixed;inset:0;z-index:99999;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center, #300060 0%, #0a0015 100%);
  overflow:hidden;
}
/* animated star field */
#cmgWelcome .stars{
  position:absolute;inset:0;pointer-events:none;overflow:hidden;
}
#cmgWelcome .star{
  position:absolute;border-radius:50%;background:#fff;
  animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}

/* floating particles */
#cmgWelcome .particle{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:floatUp var(--pd,6s) ease-in-out infinite var(--pdelay,0s);
  opacity:0;
}
@keyframes floatUp{
  0%{transform:translateY(0) scale(0);opacity:0;}
  20%{opacity:.7;}
  80%{opacity:.4;}
  100%{transform:translateY(-120vh) scale(1.5);opacity:0;}
}

/* card */
#cmgCard{
  position:relative;z-index:2;
  background:linear-gradient(160deg,rgba(20,0,40,.97) 0%,rgba(50,0,80,.97) 100%);
  border:2px solid rgba(255,215,0,.6);
  border-radius:22px;padding:32px 28px 26px;
  width:92%;max-width:400px;text-align:center;
  box-shadow:0 0 60px rgba(255,215,0,.2),0 20px 60px rgba(0,0,0,.8);
  animation:cardPop .55s cubic-bezier(.175,.885,.32,1.275) forwards;
}
@keyframes cardPop{
  0%{transform:scale(.6) translateY(40px);opacity:0;}
  100%{transform:scale(1) translateY(0);opacity:1;}
}

/* gold glow ring */
#cmgCard::before{
  content:'';position:absolute;inset:-3px;border-radius:24px;z-index:-1;
  background:linear-gradient(45deg,#FFD700,#ff6b00,#FFD700,#00d4ff,#FFD700);
  background-size:300% 300%;
  animation:ringRotate 3s linear infinite;
  filter:blur(6px);opacity:.6;
}
@keyframes ringRotate{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}

.wBadge{
  display:inline-block;
  background:linear-gradient(135deg,#FFD700,#e6a800);
  color:#000;font-weight:900;font-size:11px;letter-spacing:2px;
  text-transform:uppercase;border-radius:20px;padding:4px 14px;margin-bottom:12px;
}
.wEmoji{font-size:54px;display:block;margin-bottom:4px;animation:bounce .8s ease-in-out infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-8px);}}

.wGreeting{font-size:13px;color:rgba(255,215,0,.7);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.wName{
  font-size:28px;font-weight:900;
  background:linear-gradient(90deg,#FFD700,#fff,#FFD700);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 2s linear infinite;margin-bottom:2px;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}

.wService{font-size:16px;font-weight:700;color:#fff;margin-bottom:2px;}
.wOrg{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-bottom:16px;}

/* tip box */
.wTip{
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);
  border-radius:10px;padding:10px 14px;margin-bottom:18px;
  font-size:12.5px;color:rgba(255,255,255,.78);line-height:1.55;font-style:italic;
}
.wTip span{color:#FFD700;font-weight:700;font-style:normal;}

/* progress dots (3 animated) */
.wDots{display:flex;justify-content:center;gap:6px;margin-bottom:16px;}
.wDot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,215,0,.3);
  animation:dotPulse 1.2s ease-in-out infinite;
}
.wDot:nth-child(2){animation-delay:.2s;}
.wDot:nth-child(3){animation-delay:.4s;}
@keyframes dotPulse{0%,100%{background:rgba(255,215,0,.3);transform:scale(1);}50%{background:#FFD700;transform:scale(1.4);}}

/* CTA button */
#cmgStartBtn{
  background:linear-gradient(45deg,#FFD700,#e6a800);
  color:#000;border:none;border-radius:14px;
  padding:15px 0;width:100%;font-size:17px;font-weight:900;
  cursor:pointer;letter-spacing:.4px;
  box-shadow:0 6px 24px rgba(255,215,0,.45);
  transition:transform .15s,box-shadow .15s;
  animation:ctaPulse 1.8s ease-in-out infinite;
}
@keyframes ctaPulse{
  0%,100%{box-shadow:0 6px 24px rgba(255,215,0,.4);}
  50%{box-shadow:0 6px 40px rgba(255,215,0,.9);}
}
#cmgStartBtn:active{transform:scale(.96);}

.wFooter{margin-top:12px;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:1px;}

.q-image-wrap{
  width:100%;border-radius:12px;overflow:hidden;
  border:2px solid rgba(180,0,255,0.4);background:#0a0018;
  position:relative;padding:10px;box-sizing:border-box;
}
.q-image-wrap svg{width:100%!important;height:auto!important;max-height:220px;display:block;}
.q-image-wrap>img{width:100%!important;height:auto!important;max-height:220px;display:block;object-fit:contain;border-radius:6px;}
.q-image-wrap>div{width:100%!important;display:flex!important;gap:4px!important;box-sizing:border-box;}
.q-image-wrap>div>img{flex:1!important;min-width:0!important;max-height:190px!important;object-fit:cover!important;border-radius:6px!important;display:block!important;}
.q-image-label{position:absolute;top:8px;left:8px;background:rgba(80,0,130,0.9);color:#fff;font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;z-index:2;}


/* ══ LIVE STAR SCORE BAR ══ */
#starBar{width:100%;max-width:560px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,215,0,0.25);border-radius:12px;padding:8px 12px;display:none;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:4px;}
#starBar .sb-label{font-size:11px;font-weight:bold;color:rgba(255,215,0,0.7);margin-right:6px;white-space:nowrap;}
.sb-star{font-size:20px;line-height:1;display:inline-block;opacity:0.25;transition:opacity 0.2s;}
.sb-star.earned{opacity:1;animation:starPop 0.45s cubic-bezier(0.175,0.885,0.32,1.6) forwards;}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg);}60%{transform:scale(1.5) rotate(10deg);}100%{transform:scale(1) rotate(0deg);}}
</style>
</head>

  // ── IMAGE QUESTIONS ──
  {type:"image",svgKey:"gta_badge",question:"This is the Ghana Tourism Authority badge. Which ministry does the GTA operate under?",answers:["Ministry of Tourism, Arts and Culture", "Ministry of Foreign Affairs", "Ministry of Finance", "Ministry of the Interior"],correct:0,explain:"The Ghana Tourism Authority (GTA) operates under the Ministry of Tourism, Arts and Culture. The GTA was established by the Tourism Act 2011 (Act 817) to promote, regulate and develop tourism in Ghana. Its mandate includes licensing tourism businesses, promoting Ghana as a destination and protecting tourists."},

  {type:"image",svgKey:"gta_badge",question:"The GTA badge shows its tourist complaints number. What should a tourist do if they are cheated or mistreated in Ghana?",answers:["Leave Ghana immediately and complain to their home country embassy", "Call the GTA Tourist Complaints Line on 0800 111 333 or contact +233 302 682 601 to ", "Accept it — tourist complaints have no resolution process in Ghana", "Post on social media only — the GTA does not accept direct complaints"],correct:1,explain:"The GTA Tourist Complaints Line (0800 111 333) allows tourists and Ghanaians to report: overcharging, poor service, unsafe conditions, harassment, or any tourism-related complaint. The GTA investigates complaints and can revoke the licence of tourism businesses that mistreat tourists. Good tourist treatment protects Ghana's reputation as a destination."},

  {type:"image",svgKey:"cape_coast_castle",question:"This image shows Cape Coast Castle. What makes it a UNESCO World Heritage Site?",answers:["It is the largest castle in West Africa by floor area", "It was built by Ghanaians during the pre-colonial era as a royal palace", "It is the site of Ghana's first national parliament after independence in 1957", "It is one of Ghana's Forts and Castles designated in 1979 as a UNESCO World Heritage Site"],correct:3,explain:"Cape Coast Castle (built 1653, British) and Elmina Castle (built 1482, Portuguese) are among Ghana's 'Forts and Castles, Volta, Greater Accra, Central and Western Regions' inscribed as a UNESCO World Heritage Site in 1979. They served as holding points for enslaved Africans before the Middle Passage. The Door of No Return symbolises the separation of Africans from their homeland."},

  {type:"image",svgKey:"cape_coast_castle",question:"This image shows the Door of No Return at Cape Coast Castle. What was its significance during the transatlantic slave trade?",answers:["It was the exit used by European traders leaving the castle after completing business", "It was a gate used for ceremonial purposes by the Fante people who lived near the castle", "It was the entrance used by British officials during the colonial administration", "The door through which enslaved Africans passed to board ships for the Americas — never to return to Africa"],correct:3,explain:"The Door of No Return was the final point of departure for enslaved Africans forced onto ships bound for the Americas. Walking through it meant permanent separation from Africa, family and freedom. It is now a powerful symbol of the African diaspora's connection to Ghana. During the Year of Return (2019), many African-Americans passed through the door in reverse — symbolically returning."},

  {type:"image",svgKey:"kakum_canopy",question:"This image shows the Kakum canopy walkway. How high above the rainforest floor is the walkway and how long is it?",answers:["40 metres high and 550 metres long across 7 rope bridges — a world-class ecotourism attraction", "5 metres high and 50 metres long — suitable for young children", "20 metres high and 200 metres long — the same height as a standard building", "15 metres high and 100 metres long — built in 2010 as part of Ghana's ecotourism programme"],correct:0,explain:"Kakum National Park's canopy walkway stretches 550 metres across 7 rope bridges suspended 40 metres above the forest floor — giving visitors a treetop view of the rainforest canopy and its wildlife. The park covers 333km² in the Central Region. It is home to forest elephants, Diana monkeys, bongo antelopes and over 600 butterfly species."},

  {type:"image",svgKey:"kakum_canopy",question:"This image shows Kakum National Park. What type of tourism does Kakum best represent?",answers:["Cultural heritage tourism — visiting historical sites", "Agritourism — learning about traditional farming techniques in the forest", "Medical tourism — visiting Ghana for healthcare services", "Ecotourism — responsible travel to natural areas that conserves the environment and bene"],correct:3,explain:"Kakum exemplifies ecotourism — sustainable tourism in natural environments that: conserves biodiversity, educates visitors about the ecosystem, generates revenue that funds conservation, and benefits local communities (guides, accommodation, craft vendors). Ghana's ecotourism sites include Kakum, Mole National Park, Bui National Park, Tano Sacred Grove and many community-managed forest reserves."},

  {type:"image",svgKey:"mole_national_park",question:"This image shows Mole National Park with elephants. What is Mole National Park and why is it Ghana's most important wildlife tourism destination?",answers:["A small community park near Accra with domesticated animals for educational visits", "A marine national park in the Gulf of Guinea protecting sea turtles and dolphins", "Ghana's largest national park at 4,840km² in the Savanna Region with wild elephants, hippos", "A park located in the Volta Region known primarily for its butterfly and insect biodiversity"],correct:2,explain:"Mole National Park in the Savanna Region is Ghana's largest (4,840km²) and most important wildlife destination. It harbours: African elephants (the largest concentration in Ghana), hippos, warthogs, kob antelopes, baboons, over 344 bird species and leopards. Walking safaris with armed rangers bring tourists face-to-face with wildlife. The Mole Motel overlooks a watering hole where elephants gather daily."},

  {type:"image",svgKey:"mole_national_park",question:"This image shows elephants at Mole. What law protects Ghana's wildlife in national parks from hunting and poaching?",answers:["Only international laws apply — Ghana has no domestic wildlife protection legislation", "The Wildlife Resources Management Act 1974 (Act 499) and subsequent regulations — hunting, poaching or disturbing wildlife in protected areas is a criminal offence", "Wildlife protection only applies to endangered species — common animals like elephants have no legal protection in Ghana", "Wildlife is not legally protected in Ghana — hunting is permitted in all areas outside Accra"],correct:3,explain:"Ghana's Wildlife Resources Management Act 1974 (Act 499), managed by the Wildlife Division of the Forestry Commission, protects all wildlife in national parks and wildlife sanctuaries. Poaching, hunting without a licence in protected areas, and illegal wildlife trade are criminal offences attracting fines and imprisonment. Ghana is also a party to CITES (Convention on International Trade in Endangered Species)."},

  {type:"image",svgKey:"kente_weaving",question:"This image shows kente cloth. Where did kente cloth originate and who traditionally wore it?",answers:["Kente originated in Northern Ghana among the Dagomba people and was worn by farmers for protection in the fields", "Kente cloth originated in Bonwire in the Ashanti Region — it was traditionally royal fabric worn by Ashanti kings and chiefs at", "Kente was developed by the Ewe people of the Volta Region and spread throughout Ghana in the 20th century", "Kente originated in Lagos, Nigeria and was introduced to Ghana through trade in the colonial era"],correct:1,explain:"Kente originated in Bonwire in the Ashanti Region, according to tradition in the 17th century during the reign of Asantehene Osei Tutu. It was originally royal fabric worn exclusively by Ashanti kings, then extended to other royals and chiefs. Today it is worn by all Ghanaians at significant occasions — graduation, funerals, festivals and weddings. The Ewe people of Volta Region also have their own distinct kente tradition."},

  {type:"image",svgKey:"kente_weaving",question:"This kente image shows its colour symbolism. What does the colour gold (yellow) represent in kente symbolism?",answers:["Danger and warning — gold is used to indicate caution in traditional ceremonies", "Gold represents royalty, wealth, high status and spiritual purity in Akan culture and in kente symbolism", "Gold represents the earth and agricultural fertility — worn during harvest festivals only", "Gold has no symbolic meaning — colours in kente are purely aesthetic choices by the weaver"],correct:1,explain:"In kente colour symbolism: Gold/yellow = royalty, wealth, high status and spiritual purity (reflecting Ghana's gold heritage). Green = growth, renewal and prosperity. Red = sacrifice, political struggle and shedding of blood for the nation. Blue = peace, harmony and love. Black = maturation, intensified spiritual energy. White = purification and festive occasions. Each combination of colours tells a story."},

  {type:"image",svgKey:"ghana_festivals",question:"This image shows Ghana's major festivals. What is the Homowo festival and which people celebrate it?",answers:["A harvest festival of the Ashanti people celebrated with Odwira rites in September", "A fishing festival of the Fante people of Elmina celebrating the opening of the fishing season", "The Ga people's festival meaning Hooting at Hunger — celebrating survival of a historical famine with traditi", "A deer-hunting festival of the Effutu people of Winneba celebrated in May"],correct:2,explain:"Homowo (meaning hooting at hunger in Ga) is the most important festival of the Ga people of Greater Accra. It commemorates a great famine the Ga overcame in pre-colonial times. Celebrated in August/September, it involves: the traditional dish kpokpoi (palm nut soup with corn meal), pouring of libation to ancestors, family reunions, processions and drumming. It is a major tourism attraction in Accra."},

  {type:"image",svgKey:"ghana_festivals",question:"This festivals image shows the Aboakyir. What is unique about the Aboakyir festival of Winneba?",answers:["It involves the catching of a live crocodile by bare-handed swimmers in the lagoon", "It is a fire-walking ceremony performed only by the elders of the Effutu community", "It is a deer-hunting competition between two Asafo companies who race to catch a live deer with thei", "It is a boat racing festival on the Pra River unique to the Fante fishing communities"],correct:2,explain:"The Aboakyir (meaning catching of a live animal) of the Effutu people of Winneba is uniquely a deer-hunting competition. Two Asafo (warrior) companies race into the bush to catch a live deer with their bare hands — no weapons. The company that returns first with a live deer wins and presents it to the Omanhen (paramount chief). It is celebrated in May and is one of Ghana's most thrilling and unique tourism events."},

  {type:"image",svgKey:"year_of_return",question:"This image shows the Year of Return 2019. What was the Year of Return and who initiated it?",answers:["A campaign initiated by President Nana Akufo-Addo inviting the African diaspora to visit Ghana to recon", "A government programme to return Ghanaian workers from abroad back to work in Ghana", "A UNHCR programme to return Ghanaian refugees from neighbouring countries", "A cultural exchange programme for Ghanaian students to return from overseas universities"],correct:0,explain:"The Year of Return was a campaign initiated by Ghana's government under President Nana Akufo-Addo, in partnership with the Ghana Tourism Authority, to invite the African diaspora to visit Ghana in 2019 — marking 400 years since 1619 when the first enslaved Africans arrived in America. It was hugely successful: over 500,000 diaspora visitors, 30%+ increase in tourism revenue, and global media attention for Ghana."},

  {type:"image",svgKey:"year_of_return",question:"This image shows the Year of Return impact. What programme continued the Year of Return beyond 2019?",answers:["Return of the Africans (2021) — a permanent diaspora settlement programme with free land grants", "Beyond the Return (2020 onwards) — a long-term programme building on Year of Return to create permanent economic and", "End of Return (2022) — formally concluding the diaspora outreach initiative", "The Return Lives Here — a separate UNESCO programme managing diaspora tourism to slave heritage sites"],correct:1,explain:"Beyond the Return was launched in 2020 as the long-term follow-up to the Year of Return. Its pillars include: Diaspora homecoming, investing in Ghana, celebrating culture and heritage, connecting to roots and Pan-African unity. It aims to build permanent economic ties between Ghana and the diaspora through investment, real estate, cultural industries and regular diaspora visits — not just a single-year campaign."},

  {type:"image",svgKey:"ghana_attractions",question:"This map shows Ghana's major tourist attractions. Which attraction is the ONLY UNESCO World Heritage Site marked on this map?",answers:["Manhyia Palace in Kumasi", "Cape Coast Castle and Elmina Castle", "Kakum National Park canopy walkway", "Mole National Park elephant safari"],correct:1,explain:"Ghana's UNESCO World Heritage Site is the collection of Forts and Castles — including Cape Coast Castle, Elmina Castle (St George's Castle) and other forts along the coast — inscribed in 1979. Ghana also has the Asante Traditional Buildings inscribed in 1980. Kakum and Mole are important tourism destinations but do not currently hold UNESCO World Heritage status."},

  // ── TEXT QUESTIONS ──
  {type:"text",question:"What is the primary role of the Ghana Tourism Authority?",answers:["To sell airline tickets and arrange accommodation for tourists visiting Ghana", "To issue visas and immigration permits to tourists arriving at Kotoka Airport", "To manage Ghana's national parks and wildlife reserves", "To promote, license, regulate and develop the tourism industry in Ghana as established by th"],correct:3,explain:"The Ghana Tourism Authority (GTA), established by Act 817 of 2011, is responsible for: promoting Ghana as a tourism destination (domestically and internationally), licensing and regulating tourism businesses (hotels, tour operators, restaurants, car hire), setting standards for tourism services, investigating tourist complaints, and coordinating with the private sector to develop sustainable tourism."},

  {type:"text",question:"A tourist from Germany visits Kumasi and asks Kofi for directions to Manhyia Palace. Kofi does not know the way. What is the most helpful response?",answers:["Honestly say he does not know, suggest the tourist ask at the Kumasi Tourist Information Centre", "Pretend to know and give wrong directions — tourists always have GPS", "Tell the tourist Ghana is complicated and they need a local guide — turn them away", "Ignore the tourist — it is not his responsibility"],correct:0,explain:"Being a helpful, honest ambassador for Ghana is every citizen's role in tourism. Directing tourists to the Tourist Information Centre, GTA office or a tour guide is helpful and builds Ghana's reputation. Tourism is one of Ghana's major foreign exchange earners — friendly, helpful interactions with tourists encourage them to return and recommend Ghana to others. Every Ghanaian is a tourism ambassador."},

  {type:"text",question:"Ama visits Cape Coast Castle and sees a tourist chipping a piece from the wall as a souvenir. What should she do?",answers:["Firmly tell the tourist this is illegal and damaging to Ghana's heritage", "Allow it — tourists have special privileges at historical sites", "Chip her own piece to sell to other tourists", "Photograph it and post on social media without intervening"],correct:0,explain:"Vandalising a UNESCO World Heritage Site is a criminal offence under Ghana's Museums and Monuments Act. The Ghana Museums and Monuments Board (GMMB) manages protected sites. Any person damaging a protected monument faces prosecution, fines and potential imprisonment. Ama should intervene calmly, alert site security, and report to GMMB. Protecting cultural heritage is a civic responsibility."},

  {type:"text",question:"What is ecotourism and which Ghanaian sites best represent it?",answers:["Tourism in built-up urban city centres focused on shopping and nightlife", "Tourism exclusively for environmental scientists conducting field research", "Responsible travel to natural areas that conserves the environment, supports local welfare and educates visitors", "Very expensive international travel to remote wilderness areas inaccessible to ordinary tourists"],correct:2,explain:"Ecotourism is tourism in natural environments that: conserves biodiversity, educates visitors about ecosystems, benefits local communities economically, and minimises environmental impact. Ghana's ecotourism sites include: Kakum National Park, Mole National Park, Bui National Park, Tano Sacred Grove, Bobiri Forest Reserve, Ankasa Conservation Area, and numerous community ecotourism sites across all regions."},

  {type:"text",question:"What is the UNESCO designation and how many of Ghana's sites hold it?",answers:["UNESCO selects one site per continent annually — Ghana has never been selected", "UNESCO World Heritage status is only for man-made structures — Ghana has none because it only has natural sites", "Ghana has 5 UNESCO World Heritage Sites including Kakum National Park and Mole National Park", "Ghana has 2 UNESCO World Heritage Sites: Forts and Castles (1979) and Asante Traditional Buildings (1980)"],correct:3,explain:"Ghana has 2 UNESCO World Heritage Sites: (1) Forts and Castles, Volta, Greater Accra, Central and Western Regions (1979) — including Cape Coast Castle, Elmina Castle and other slave trade forts; (2) Asante Traditional Buildings (1980) — including the Asantehene's palace buildings and shrines around Kumasi. Ghana also has several sites on the UNESCO tentative list for future nomination."},

  {type:"text",question:"What is responsible tourism and why does it matter for Ghana's development?",answers:["Tourism that only visits artificial attractions built for foreigners — not traditional communities", "Tourism that is only available to wealthy foreigners who pay premium prices", "Tourism that is run entirely by the government without private sector involvement", "Tourism that minimises negative economic, social and environmental impacts while maximising benefits to local com"],correct:3,explain:"Responsible tourism ensures tourism creates lasting benefits for Ghana. This means: buying from local vendors rather than foreign-owned chains, hiring Ghanaian guides, respecting local customs and dress codes, not damaging natural and cultural sites, not supporting exploitation of animals or people, and ensuring tourism revenue stays in communities. Irresponsible tourism destroys the very resources tourists come to see."},

  {type:"text",question:"Esi is at Kakum National Park canopy walk and sees visitors dropping food wrappers in the forest. What should she do?",answers:["Drop her own wrappers — everyone else is doing it", "Collect the litter and also politely ask the visitors to use the bins provid", "Leave immediately so she is not associated with the littering", "Take photographs but do nothing — it is the park rangers' job"],correct:1,explain:"Littering in national parks damages the ecosystem tourists come to see, harms wildlife, and pollutes water sources. Esi should: collect the litter herself if safe to do so, politely ask visitors to use the provided bins, and report persistent littering to park rangers. The Forest Services Division (Forestry Commission) manages national parks and can expel visitors who violate park rules. Everyone is responsible for protecting Ghana's natural heritage."},

  {type:"text",question:"What is the difference between a heritage site and a natural attraction in Ghana's tourism context?",answers:["There is no difference — all tourism sites in Ghana are classified the same way by the GTA", "Heritage sites are only for African-American tourists — natural attractions are for all visitors", "Heritage sites are man-made or culturally significant locations like Cape Coast Castle", "Heritage sites are free to enter — natural attractions charge admission fees"],correct:2,explain:"Heritage sites are culturally or historically significant locations: Cape Coast Castle, Elmina Castle, Manhyia Palace, Larabanga Mosque (Ghana's oldest mosque), Asante shrine buildings. Natural attractions are wildlife and ecosystem destinations: Mole National Park, Kakum, Bui, Ankasa, Volta Lake, Wli Waterfalls, Paga Crocodile Pond, Ada Estuary. Ghana's tourism strength is the combination of both categories in a compact country."},

  {type:"text",question:"What is Manhyia Palace and why is it significant to Ghana's tourism?",answers:["The palace of the Asantehene (King of the Ashanti) in Kumasi — one of Ghana's most important cultural tourism sites", "A modern hotel in Kumasi named after the Ashanti kingdom for tourism branding purposes", "A colonial government building in Cape Coast used by British governors during the colonial period", "The official residence of Ghana's President in Accra — open to tourists on specific national holidays only"],correct:0,explain:"Manhyia Palace in Kumasi is the official residence of the Asantehene (King of the Ashanti). The adjacent Manhyia Palace Museum displays Ashanti royal history, royal regalia, artefacts and documents. The museum is built on the site of the original palace destroyed by British forces in 1896 and rebuilt in 1925. It is one of Ghana's most visited cultural attractions — connecting visitors to the Ashanti Kingdom's rich history."},

  {type:"text",question:"A tourist complains that a hotel in Accra charged them three times more than the published rate. Who should they report this to?",answers:["Report to the Ghana Tourism Authority (GTA) on 0800 111 333 or +233 302 682 601", "Pay under protest and write a negative review online only", "Accept the overcharge — hotels in Ghana can charge whatever they want", "Report to the Ghana Police Service on 191 — overcharging tourists is a criminal matter"],correct:0,explain:"The GTA licenses and rates hotels, guesthouses and tourism facilities. Overcharging tourists, false advertising, or poor service standards are violations of the Tourism Act. Tourists can report to: GTA on 0800 111 333, the Tourism Police Unit, or the Tourism Complaints platform. The GTA can investigate, downgrade the hotel's star rating, fine the establishment or revoke its operating licence."},

  {type:"text",question:"What is the Larabanga Mosque and why is it significant to Ghana's tourism?",answers:["A modern mosque built in Accra in 2005 as a symbol of Muslim-Christian harmony", "Ghana's oldest mosque built in the Sudanese-Sahelian architectural style in 1421 in the Northern Region", "A mosque built in Kumasi by the Zongo community in the 19th century", "A mosque built at Cape Coast by North African traders during the transatlantic slave trade period"],correct:1,explain:"Larabanga Mosque in the Northern Region (near Damongo) is believed to have been built in 1421, making it one of the oldest mosques in sub-Saharan Africa. Built in the Sudanese-Sahelian style (mud and wood), it resembles the Great Mosque of Djenné in Mali. It is a national monument and a major heritage tourism attraction. Legend holds it was miraculously built overnight by a Muslim traveller. It is on Ghana's UNESCO tentative list."},

  {type:"text",question:"What is the Nzulezu stilt village and what type of tourism does it offer?",answers:["A market village built on stilts over the Volta River in the Eastern Region", "A fishing village on stilts at Elmina in the Central Region used by European traders in the colonial era", "A community built entirely on stilts over Lake Tadane in the Western Region", "A modern eco-lodge built on stilts over the sea near Busua Beach in the Western Region"],correct:2,explain:"Nzulezu (meaning surface of water in Nzema) is an ancient village built entirely on stilts over Lake Tadane in the Western Region. A community of approximately 600 people has lived there for centuries — all buildings, pathways and community life are above water. Tourists access it by dugout canoe. It is a UNESCO tentative World Heritage Site and Ghana's most unique living cultural tourism attraction."},

  {type:"text",question:"How does tourism contribute to Ghana's economy?",answers:["Tourism contributes less than 1% of Ghana's GDP — it is a very minor sector", "Tourism primarily benefits foreign hotel chains — Ghanaian businesses receive very little of tourism revenue", "Tourism only benefits Accra — other regions receive no economic benefit from tourist visits", "Tourism contributes approximately 5-8% of GDP, is a major foreign exchange earner"],correct:3,explain:"Tourism is a significant contributor to Ghana's economy: it contributes approximately 5-8% of GDP, generates substantial foreign exchange earnings, employs hundreds of thousands of people directly (guides, hotels, transport) and indirectly (craft vendors, food producers, farmers supplying hotels), and drives rural development when tourists visit regional attractions. The GTA aims to make tourism one of Ghana's top three foreign exchange earners."},

  {type:"text",question:"What is the Wli Waterfalls and why do tourists visit it?",answers:["Ghana's highest waterfall in the Volta Region near Hohoe", "A man-made waterfall in Kumasi created as a fountain attraction for the city centre", "A waterfall on the Volta River created by the Akosombo Dam that tourists can view from a boat", "A series of artificial waterfalls in Accra's Aburi Gardens used for tourist photography"],correct:0,explain:"Wli (pronounced Vlee) Waterfalls in the Hohoe area of the Volta Region is Ghana's highest waterfall at approximately 80 metres. Tourists hike through the forest to reach the lower falls and can continue to the upper falls. The top of the falls hosts one of West Africa's largest colonies of straw-coloured fruit bats (over a million). It is one of Ghana's most visited natural attractions and a major ecotourism site."},

  {type:"text",question:"What is the role of Ghanaian youth in developing the tourism industry?",answers:["Youth have no role — tourism is managed exclusively by the GTA and large international hotel chains", "Youth participation in tourism is only relevant in Accra — regional tourism is entirely managed by community elders", "Youth should focus on other industries — tourism is not a viable career in Ghana", "Youth are essential: as tour guides, hospitality workers, craft vendors, digital content creators promoting Ghana online"],correct:3,explain:"Ghana's youth are central to tourism development: as trained tour guides and cultural interpreters, hospitality and hotel workers, digital influencers promoting Ghana on social media, craft artisans whose work tourists buy, eco-guides in national parks and forests, and entrepreneurs building tourism businesses. The GTA has youth training programmes. Tourism offers career opportunities in all regions — not just Accra."},

  {type:"text",question:"What is the Paga Crocodile Pond and what makes it unique?",answers:["A government-managed reptile park near Accra where tourists view crocodiles behind safety fences", "A crocodile farm in the Western Region that breeds crocodiles for export and tourist viewing", "A sacred crocodile pond in Paga in the Upper East Region where crocodiles live peacefully with the community", "A man-made lagoon near Elmina where crocodiles were kept by the Dutch during the colonial period"],correct:2,explain:"Paga Crocodile Pond (Paga Nania) in the Upper East Region is one of Ghana's most extraordinary tourism attractions. The local Kassena people consider the crocodiles sacred — believing they are the reincarnated spirits of ancestors. The crocodiles are completely tame and tourists can approach, touch and even sit on them. The experience is unique in the world. It is a powerful example of community-based tourism that generates revenue for the Paga community."},

  {type:"text",question:"What impact does over-tourism have on Ghana's heritage sites and natural attractions?",answers:["Over-tourism has no negative effects — more visitors always means more development", "The GTA encourages maximum visitor numbers at all times — there is no such concept as too many tourists", "Over-tourism only affects very small sites — large sites like Cape Coast Castle can accommodate unlimited visitors", "Over-tourism causes: physical damage to fragile sites (erosion, vandalism), commercialisation that degrades cultural authenticity"],correct:3,explain:"Over-tourism damages the very resources tourists come to see. At heritage sites: excessive footfall erodes fragile structures, noise disrupts cultural practices, commercialisation reduces authenticity. In natural areas: trail erosion, wildlife disturbance, pollution and habitat damage. The GTA and Forestry Commission set visitor limits at sensitive sites. Sustainable tourism means managing visitor numbers, collecting conservation levies and reinvesting in site maintenance."},

  {type:"text",question:"What is the Ghana Tourist Board classification system for hotels?",answers:["Hotels receive star ratings from online platforms like TripAdvisor only — the government does not classify hotels", "Hotels in Ghana are not classified — any establishment can call itself a hotel without meeting standards", "Hotels are classified by the Ministry of Finance based on their annual revenue and tax compliance", "The GTA classifies hotels from 1 to 5 stars based on facilities, service quality, safety standards and guest experience"],correct:3,explain:"The GTA classifies and rates tourism facilities (hotels, guesthouses, restaurants, tour operators, car hire companies) on a 1-5 star scale. Businesses apply for GTA registration, undergo physical inspection, and are rated based on: facilities, safety standards, service quality, hygiene and guest experience. GTA-rated establishments display their rating certificate. Tourists should choose GTA-rated establishments for assured standards. Unregistered tourism businesses operate illegally."},

  {type:"text",question:"As a student, how can you personally contribute to Ghana's tourism development?",answers:["By not visiting local tourist sites — tourism is only for foreign visitors and wealthy Ghanaians", "By visiting Ghana's own attractions, being a friendly ambassador to foreign tourists, sharing Ghana's beauty on social media", "By discouraging foreign tourists from visiting — Ghana's resources should only be enjoyed by Ghanaians", "Tourism development is entirely a government responsibility — individual students have no meaningful role"],correct:1,explain:"Every Ghanaian student is a tourism ambassador. You contribute by: visiting Ghana's own attractions (domestic tourism funds conservation and local businesses), being helpful and welcoming to foreign tourists you meet, sharing positive content about Ghana on social media, buying authentic Ghanaian crafts, respecting and protecting heritage sites and natural areas, and considering tourism-related careers. Domestic tourism — Ghanaians exploring their own country — is essential for sustainable tourism development."}

function goBack(){localStorage.removeItem('cadetName');localStorage.removeItem('cadetGender');localStorage.removeItem('cadetSchool');window.location.href='quiz_questions.html';}
function showQuestion(){
  if(window.speechSynthesis)speechSynthesis.cancel();
  document.getElementById('explanation').style.display='none';
  if(current>=QUESTIONS_ACTIVE.length){showResult();return;}
  var q=QUESTIONS_ACTIVE[current];
  document.getElementById('qCounter').textContent='Q'+(current+1)+' / '+QUESTIONS_ACTIVE.length;
  var qt=document.getElementById('qType');
  if(q.type==='image'&&q.svgKey){qt.textContent='🖼️ Image Question';qt.style.background='rgba(80,0,120,0.6)';}
  else{qt.textContent='🏛️ Ghana Tourism';qt.style.background='rgba(60,0,100,0.6)';}
  var imgArea=document.getElementById('qImageArea');
  if(q.svgKey&&IMAGES[q.svgKey]){imgArea.innerHTML='<div class="q-image-wrap"><span class="q-image-label">🏛️ Identify This</span>'+IMAGES[q.svgKey]+'</div>';}
  else{imgArea.innerHTML='';}
  document.getElementById('question').textContent=q.question;
  document.getElementById('progress').style.width=(current/QUESTIONS_ACTIVE.length*100)+'%';
  var ans=document.getElementById('answers');ans.innerHTML='';
  var labels=['A','B','C','D'];
  var shuffled=q.answers.map(function(text,origIdx){return{text:text,orig:origIdx};});
  for(var si=shuffled.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var st=shuffled[si];shuffled[si]=shuffled[sj];shuffled[sj]=st;}
  var newCorrect=shuffled.findIndex(function(item){return item.orig===q.correct;});
  window._currentShuffled=shuffled;window._currentNewCorrect=newCorrect;
  shuffled.forEach(function(item,i){
    var btn=document.createElement('button');
    btn.innerHTML='<span class="opt-label">'+labels[i]+'</span>'+item.text;
    btn.onclick=(function(idx,b){return function(){checkAnswer(idx,b);};})(i,btn);
    ans.appendChild(btn);
  });
  maxTime=90;startTimer();
  if(window.speechSynthesis){
    speechSynthesis.cancel();
    var readText='Ghana Tourism Quiz. Question '+(current+1)+'. '+q.question+'. Option A. '+shuffled[0].text+'. Option B. '+shuffled[1].text+'. Option C. '+shuffled[2].text+'. Option D. '+shuffled[3].text+'.';
    var uq=new SpeechSynthesisUtterance(readText);uq.lang='en-GB';uq.pitch=1.05;uq.rate=0.90;uq.volume=1.0;
    (function(){var vs=window.speechSynthesis.getVoices();var v=vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})||vs.find(function(x){return x.lang.startsWith('en-GB');})||vs.find(function(x){return x.lang.startsWith('en');});if(v)uq.voice=v;window.speechSynthesis.speak(uq);})();
    if(!window.speechSynthesis.getVoices().length){window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.onvoiceschanged=null;var vs=window.speechSynthesis.getVoices();var v=vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})||vs.find(function(x){return x.lang.startsWith('en-GB');})||vs.find(function(x){return x.lang.startsWith('en');});if(v)uq.voice=v;window.speechSynthesis.speak(uq);};}
  }
}
function startTimer(){
  clearInterval(timerInterval);timeLeft=maxTime;
  document.getElementById('time').textContent=timeLeft;
  var bar=document.getElementById('timerBar');bar.style.width='100%';bar.style.background='#00ff00';
  var yellowAt=Math.floor(maxTime*0.5);
  var redAt=Math.floor(maxTime*0.25);
  var _yellowed=false,_redded=false;

  function timerSpeak(text,pitch,rate){
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang='en-GB';u.pitch=pitch||1.05;u.rate=rate||0.95;u.volume=1.0;
    function pickV(){
      var vs=window.speechSynthesis.getVoices();
      return vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})||
             vs.find(function(v){return v.lang.startsWith('en-GB');})||
             vs.find(function(v){return v.lang.startsWith('en');});
    }
    var v=pickV();if(v)u.voice=v;
    speechSynthesis.speak(u);
  }

  timerInterval=setInterval(function(){
    timeLeft--;document.getElementById('time').textContent=timeLeft;
    var pct=timeLeft/maxTime*100;bar.style.width=pct+'%';bar.style.background=pct>50?'#00ff00':pct>25?'#ffd700':'#ff4444';

    var firstName=(localStorage.getItem('cadetName')||'Cadet').split(' ')[0];

    if(!_yellowed&&timeLeft<=yellowAt&&timeLeft>redAt){
      _yellowed=true;
      var msgs=['Keep going, '+firstName+'! You are halfway through your time.',
                firstName+', stay focused! You still have time — think carefully.',
                'You can do it, '+firstName+'! Choose your answer soon.'];
      timerSpeak(msgs[Math.floor(Math.random()*msgs.length)],1.1,0.95);
    }
    if(!_redded&&timeLeft<=redAt&&timeLeft>10){
      _redded=true;
      var rmsgs=[firstName+'! Time is running out — answer now!',
                 'Hurry, '+firstName+'! Only seconds left — pick your answer!',
                 firstName+', quick! Running out of time!'];
      timerSpeak(rmsgs[Math.floor(Math.random()*rmsgs.length)],1.2,1.1);
    }
    if(timeLeft<=10&&timeLeft>0){
      var AC=window.AudioContext||window.webkitAudioContext;
      if(AC){try{
        var ctx=new AC(),o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='square';o.frequency.value=400+(10-timeLeft)*80;
        g.gain.setValueAtTime(0.35,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
        o.start(ctx.currentTime);o.stop(ctx.currentTime+0.15);
      }catch(e){}}
      if(timeLeft===10) timerSpeak(firstName+'! Ten seconds! Answer now!',1.3,1.2);
      else if(timeLeft===5) timerSpeak('Five! '+firstName+' — now!',1.4,1.3);
      else if(timeLeft===3) timerSpeak('Three!',1.5,1.4);
      else if(timeLeft===2) timerSpeak('Two!',1.5,1.5);
      else if(timeLeft===1) timerSpeak('One!',1.5,1.5);
    }
    if(timeLeft<=0){clearInterval(timerInterval);timeExpired();}
  },1000);
}

  if(!window.speechSynthesis){setTimeout(doAdvance,PAUSE_AFTER);return;}
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(msg);u.lang='en-GB';u.pitch=pitch||1.05;u.rate=0.88;u.volume=1.0;
  function pickVoice(){
    var vs=window.speechSynthesis.getVoices();
    return vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})
        ||vs.find(function(x){return x.lang.startsWith('en-GB');})
        ||vs.find(function(x){return x.lang.startsWith('en-US');})
        ||vs.find(function(x){return x.lang.startsWith('en');})
        ||vs[0]||null;
  }
  var advanced=false,fallbackTimer=null;
  function advance(){if(advanced)return;advanced=true;if(fallbackTimer)clearTimeout(fallbackTimer);setTimeout(doAdvance,PAUSE_AFTER);}
  u.onend=advance;u.onerror=advance;
  fallbackTimer=setTimeout(advance,FALLBACK);
  var vs=window.speechSynthesis.getVoices();
  if(vs.length>0){
    var v=pickVoice();if(v)u.voice=v;
    try{speechSynthesis.speak(u);}catch(e){advance();}
  } else {
    window.speechSynthesis.onvoiceschanged=function(){
      window.speechSynthesis.onvoiceschanged=null;
      var v2=pickVoice();if(v2)u.voice=v2;
      try{speechSynthesis.speak(u);}catch(e){advance();}
    };
  }
}

(function(){
  var AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;
  var ctx = null;
  function getCtx(){
    if(!ctx){ ctx = new AC(); }
    if(ctx.state==='suspended') ctx.resume();
    return ctx;
  }
  function osc(freq,type,start,dur,gainVal,fadeOut){
    var c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(gainVal,c.currentTime+start);
    if(fadeOut) g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+start+dur);
    o.start(c.currentTime+start);o.stop(c.currentTime+start+dur);
  }
  function noise(start,dur,gainVal){
    var c=getCtx();
    var buf=c.createBuffer(1,c.sampleRate*dur,c.sampleRate);
    var data=buf.getChannelData(0);
    for(var i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
    var src=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();
    f.type='bandpass';f.frequency.value=2200;f.Q.value=0.8;
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(gainVal,c.currentTime+start);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+start+dur);
    src.start(c.currentTime+start);src.stop(c.currentTime+start+dur);
  }

  }catch(e){}};
  window.sndWrong=function(){try{
    osc(220,'sawtooth',0,0.15,0.40,true);

      for(var j=0;j<7;j++) noise(0.5+j*0.1,0.07,0.35-j*0.02);
    } else {
      osc(440,'sine',0,0.30,0.20,true);

  var voices=[],praiseIdx=0;

  function speak(t,pitch,rate,vol){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(t);
  u.lang='en-GB'; u.pitch=pitch||1.05; u.rate=rate||0.92; u.volume=vol||1;
  function pickVoice(){
    var vs=window.speechSynthesis.getVoices();
    return vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})
        ||vs.find(function(v){return v.lang.startsWith('en-GB');})
        ||vs.find(function(v){return v.lang.startsWith('en');});
  }
  function doSpeak(){ var v=pickVoice(); if(v) u.voice=v; speechSynthesis.speak(u); }

    window.speechSynthesis.onvoiceschanged=null;

function stopBgMusic(){
  var step = _bgMusic.volume / 18;
  var fade = setInterval(function(){
    if(_bgMusic.volume > step){
      _bgMusic.volume = Math.max(0, _bgMusic.volume - step);
    } else {
      _bgMusic.volume = 0;
      _bgMusic.pause();
      clearInterval(fade);
    }
  }, 50);
}

</script>
