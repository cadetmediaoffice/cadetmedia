<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Police & Community Safety Quiz – Cadet Media Ghana</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function(){
  'use strict';
  var _cs=document.createElement('style');
  _cs.id='cmg-cloak';
  _cs.textContent='body{visibility:hidden!important;pointer-events:none!important;}';
  document.head.appendChild(_cs);
  if(window.history&&window.history.pushState) window.history.pushState({cmgGuard:true},'',window.location.href);
  window.CMG_GUARD={
    init:function(opts){
      var quizKey=opts.quizKey||'unknown';
      var repeatable=opts.repeatable===true;
      var HUB='cadetnationalquiz.html';
      if(localStorage.getItem('cmgActivated')!=='true'||!localStorage.getItem('cadetName')||!localStorage.getItem('cmgCode')){
        window.location.replace('activate.html');return;
      }
      if(localStorage.getItem(quizKey+'Completed')==='true'&&!repeatable){window.location.replace(HUB);return;}
      var n=localStorage.getItem('cadetName')||'',c=localStorage.getItem('cmgCode')||'',exp=n+'|'+c;
      var sk=localStorage.getItem('cmgSessionKey');
      if(!sk){localStorage.setItem('cmgSessionKey',exp);}
      else if(sk!==exp){window.location.replace('activate.html');return;}
      localStorage.setItem('cmgLastPage',window.location.pathname.split('/').pop());
      window.addEventListener('popstate',function(){
        if(localStorage.getItem(quizKey+'Completed')==='true'&&!repeatable){window.location.replace(HUB);}
        else if(!localStorage.getItem('cmgActivated')){window.location.replace('activate.html');}
        else if(window.history&&window.history.pushState) window.history.pushState({cmgGuard:true},'',window.location.href);
      });
      var el=document.getElementById('cmg-cloak');if(el)el.parentNode.removeChild(el);
      document.body.style.visibility='';document.body.style.pointerEvents='';
    },
    complete:function(quizKey,score,repeatable){
      localStorage.setItem(quizKey+'Score',String(score));
      if(!repeatable)localStorage.setItem(quizKey+'Completed','true');
      if(window.history&&window.history.replaceState) window.history.replaceState({cmgDone:true},'',window.location.href);
      window.location.replace('cadetnationalquiz.html');
    }
  };
})();
</script>
<style>
*{box-sizing:border-box;}
@keyframes policeFlicker{
  0%  {background:linear-gradient(160deg,#000814 0%,#001f4d 30%,#003080 60%,#0050c8 85%,#1a6fd4 100%);}
  25% {background:linear-gradient(160deg,#000a1a 0%,#002255 30%,#003a99 60%,#005ce0 85%,#1e7ae0 100%);}
  50% {background:linear-gradient(160deg,#000610 0%,#001a42 30%,#002870 60%,#0044b0 85%,#1560c0 100%);}
  75% {background:linear-gradient(160deg,#000c1e 0%,#002460 30%,#003c8a 60%,#0054cc 85%,#1c74d8 100%);}
  100%{background:linear-gradient(160deg,#00070f 0%,#001c45 30%,#002c78 60%,#004ac0 85%,#185ec8 100%);}
}
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(160deg,#000814 0%,#001f4d 30%,#003080 60%,#0050c8 85%,#1a6fd4 100%);
  animation:policeFlicker 5s ease-in-out infinite alternate;
  color:#fff;display:flex;flex-direction:column;
  align-items:center;padding:15px;margin:0;min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 85%, rgba(0,80,200,0.20) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 85% 90%, rgba(0,120,255,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 50% 30% at 50% 100%, rgba(0,60,180,0.18) 0%, transparent 60%);
}
.logos{display:flex;flex-direction:column;align-items:center;width:100%;max-width:900px;margin-bottom:10px;position:relative;z-index:1;}
.logos img:first-child{height:110px;margin-bottom:8px;cursor:pointer;border-radius:50%;border:2px solid rgba(255,215,0,0.4);transition:box-shadow .2s;}
.logos img:first-child:hover{box-shadow:0 0 20px rgba(255,215,0,0.8);}
.all-services-logo{width:650px;max-width:95%;display:block;margin:0 auto 10px auto;
  filter:drop-shadow(0 0 15px rgba(255,255,255,0.6)) drop-shadow(0 0 30px rgba(255,215,0,0.6));
  animation:floatLogo 4s ease-in-out infinite;}
@keyframes floatLogo{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.cadet-bar{
  background:rgba(0,80,200,0.22);border:1px solid rgba(100,160,255,0.35);
  border-radius:8px;padding:7px 12px;font-size:12px;font-weight:bold;
  width:100%;max-width:560px;text-align:center;margin-bottom:4px;display:none;
  position:relative;z-index:1;
}
.quiz-container{
  background:rgba(0,10,30,0.55);padding:20px;border-radius:12px;
  width:100%;max-width:560px;display:flex;flex-direction:column;gap:12px;
  position:relative;z-index:1;
}
.timer-row{display:flex;align-items:center;gap:10px;font-size:14px;}
.timer-bar-container{flex:1;background:rgba(255,255,255,0.2);border-radius:12px;height:12px;}
.timer-bar{width:100%;height:100%;background:#00ff00;border-radius:12px;transition:width 1s linear,background 1s;}
.progress-bar{width:100%;background:rgba(255,255,255,0.2);border-radius:12px;overflow:hidden;height:10px;}
.progress{height:100%;width:0%;background:#f2c300;transition:width 0.3s;}
.meta-row{display:flex;justify-content:space-between;align-items:center;}
.q-counter{font-size:12px;opacity:0.65;}
.q-type{font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;}
.q-image-wrap{
  width:100%;border-radius:12px;overflow:hidden;
  border:2px solid rgba(100,160,255,0.4);background:#000d26;
  position:relative;display:flex;align-items:center;justify-content:center;padding:12px;
}
.q-image-wrap svg{width:100%!important;height:auto!important;max-height:220px;display:block;}
.q-image-wrap img{width:100%!important;height:auto!important;max-height:220px;display:block;object-fit:contain;border-radius:6px;}
.q-image-label{
  position:absolute;top:8px;left:8px;background:rgba(0,60,180,0.9);
  color:#fff;font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;
}
#question{font-size:15px;font-weight:bold;line-height:1.6;color:#fff;}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:stretch;}
.answers button{
  background:rgba(255,255,255,0.08);color:#fff;
  border:2px solid rgba(255,255,255,0.15);border-radius:10px;
  padding:10px 10px 10px 36px;font-size:12px;font-weight:bold;
  cursor:pointer;text-align:left;transition:all 0.2s;width:100%;
  line-height:1.5;position:relative;height:100%;
}
.answers button .opt-label{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  width:20px;height:20px;border-radius:50%;
  background:rgba(255,255,255,0.15);
  font-size:11px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  color:#FFD700;flex-shrink:0;
}
.answers button:hover:not(:disabled) .opt-label{background:rgba(255,215,0,0.3);}
.answers button.correct .opt-label{background:rgba(0,200,80,0.5);}
.answers button.wrong .opt-label{background:rgba(220,50,50,0.5);}
@media(max-width:420px){
  .answers{grid-template-columns:1fr;}
}
.answers button:hover:not(:disabled){background:rgba(255,255,255,0.2);transform:scale(1.02);}
.answers button.correct{background:rgba(0,200,80,0.5)!important;border-color:#00c850!important;}
.answers button.wrong{background:rgba(220,50,50,0.5)!important;border-color:#dc3232!important;}
.answers button:disabled{cursor:default;}
.explanation{
  background:rgba(0,80,200,0.15);border:1px solid rgba(100,160,255,0.35);
  border-radius:8px;padding:10px 13px;font-size:12px;line-height:1.6;
  color:#b0d0ff;display:none;
}
.result{text-align:center;display:none;padding:25px 15px;width:100%;max-width:560px;position:relative;z-index:1;}
@media(max-width:480px){
  .answers button{font-size:12px;padding:10px;}
  #question{font-size:13px;}
}

/* ══════════════════════════════════════
   CMG WELCOME SCREEN
══════════════════════════════════════ */
#cmgWelcome{
  position:fixed;inset:0;z-index:99999;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center, #001a5e 0%, #000510 100%);
  overflow:hidden;
}
/* animated star field */
#cmgWelcome .stars{
  position:absolute;inset:0;pointer-events:none;overflow:hidden;
}
#cmgWelcome .star{
  position:absolute;border-radius:50%;background:#fff;
  animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}

/* floating particles */
#cmgWelcome .particle{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:floatUp var(--pd,6s) ease-in-out infinite var(--pdelay,0s);
  opacity:0;
}
@keyframes floatUp{
  0%{transform:translateY(0) scale(0);opacity:0;}
  20%{opacity:.7;}
  80%{opacity:.4;}
  100%{transform:translateY(-120vh) scale(1.5);opacity:0;}
}

/* card */
#cmgCard{
  position:relative;z-index:2;
  background:linear-gradient(160deg,rgba(0,10,40,.97) 0%,rgba(0,30,90,.97) 100%);
  border:2px solid rgba(255,215,0,.6);
  border-radius:22px;padding:32px 28px 26px;
  width:92%;max-width:400px;text-align:center;
  box-shadow:0 0 60px rgba(255,215,0,.2),0 20px 60px rgba(0,0,0,.8);
  animation:cardPop .55s cubic-bezier(.175,.885,.32,1.275) forwards;
}
@keyframes cardPop{
  0%{transform:scale(.6) translateY(40px);opacity:0;}
  100%{transform:scale(1) translateY(0);opacity:1;}
}

/* gold glow ring */
#cmgCard::before{
  content:'';position:absolute;inset:-3px;border-radius:24px;z-index:-1;
  background:linear-gradient(45deg,#FFD700,#ff6b00,#FFD700,#00d4ff,#FFD700);
  background-size:300% 300%;
  animation:ringRotate 3s linear infinite;
  filter:blur(6px);opacity:.6;
}
@keyframes ringRotate{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}

.wBadge{
  display:inline-block;
  background:linear-gradient(135deg,#FFD700,#e6a800);
  color:#000;font-weight:900;font-size:11px;letter-spacing:2px;
  text-transform:uppercase;border-radius:20px;padding:4px 14px;margin-bottom:12px;
}
.wEmoji{font-size:54px;display:block;margin-bottom:4px;animation:bounce .8s ease-in-out infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-8px);}}

.wGreeting{font-size:13px;color:rgba(255,215,0,.7);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.wName{
  font-size:28px;font-weight:900;
  background:linear-gradient(90deg,#FFD700,#fff,#FFD700);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 2s linear infinite;margin-bottom:2px;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}

.wService{font-size:16px;font-weight:700;color:#fff;margin-bottom:2px;}
.wOrg{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-bottom:16px;}

/* tip box */
.wTip{
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);
  border-radius:10px;padding:10px 14px;margin-bottom:18px;
  font-size:12.5px;color:rgba(255,255,255,.78);line-height:1.55;font-style:italic;
}
.wTip span{color:#FFD700;font-weight:700;font-style:normal;}

/* progress dots (3 animated) */
.wDots{display:flex;justify-content:center;gap:6px;margin-bottom:16px;}
.wDot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,215,0,.3);
  animation:dotPulse 1.2s ease-in-out infinite;
}
.wDot:nth-child(2){animation-delay:.2s;}
.wDot:nth-child(3){animation-delay:.4s;}
@keyframes dotPulse{0%,100%{background:rgba(255,215,0,.3);transform:scale(1);}50%{background:#FFD700;transform:scale(1.4);}}

/* CTA button */
#cmgStartBtn{
  background:linear-gradient(45deg,#FFD700,#e6a800);
  color:#000;border:none;border-radius:14px;
  padding:15px 0;width:100%;font-size:17px;font-weight:900;
  cursor:pointer;letter-spacing:.4px;
  box-shadow:0 6px 24px rgba(255,215,0,.45);
  transition:transform .15s,box-shadow .15s;
  animation:ctaPulse 1.8s ease-in-out infinite;
}
@keyframes ctaPulse{
  0%,100%{box-shadow:0 6px 24px rgba(255,215,0,.4);}
  50%{box-shadow:0 6px 40px rgba(255,215,0,.9);}
}
#cmgStartBtn:active{transform:scale(.96);}

.wFooter{margin-top:12px;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:1px;}


/* ══ LIVE STAR SCORE BAR ══ */
#starBar{width:100%;max-width:560px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,215,0,0.25);border-radius:12px;padding:8px 12px;display:none;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:4px;}
#starBar .sb-label{font-size:11px;font-weight:bold;color:rgba(255,215,0,0.7);margin-right:6px;white-space:nowrap;}
.sb-star{font-size:20px;line-height:1;display:inline-block;opacity:0.25;transition:opacity 0.2s;}
.sb-star.earned{opacity:1;animation:starPop 0.45s cubic-bezier(0.175,0.885,0.32,1.6) forwards;}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg);}60%{transform:scale(1.5) rotate(10deg);}100%{transform:scale(1) rotate(0deg);}}
</style>
</head>

   correct:1,
   explain:'Bail is the temporary release of an accused person pending trial, subject to conditions — usually a financial surety and a requirement to appear in court on the specified date. Bail can be granted by a court or in less serious cases by a senior police officer. Jumping bail (not appearing in court) is a criminal offence.'},

  {type:'text',
   question:'Under the Domestic Violence Act of Ghana (Act 732), which of the following is classified as domestic violence?',
   answers:['Only physical beatings that result in visible injuries requiring hospital treatment','Physical, emotional, psychological, sexual and economic abuse within a domestic relationship','Only violence between married couples — unmarried partners are not covered by the Act','Only violence committed by men against women — male victims are not covered'],
   correct:1,
   explain:'Ghana\'s Domestic Violence Act (Act 732, 2007) covers physical, emotional, psychological, sexual and economic abuse. It protects all persons in a domestic relationship regardless of gender or marital status. Victims can obtain protection orders. DOVVSU provides support and can arrange shelter, medical help and legal assistance.'},

  {type:'text',
   question:'A student receives a call from someone claiming to be a police officer, demanding money to "drop charges" against a family member. What should the student do?',
   answers:['Pay the money quickly to protect the family member from going to jail', 'Hang up — genuine police officers do not demand money over the phone', 'Ask for the officer\'s name and pay through MoMo to be safe', 'Keep the person talking and record the call for evidence'],
   correct:1,
   explain:'This is a classic police impersonation scam. Genuine police officers do not call to demand money. This is extortion and impersonation — both serious crimes. Hang up, call 191 to report, and notify the family member directly. Do not pay anything. The Ghana Police Service regularly warns the public about these scams.'},

  {type:'image', svgKey:'dovvsu_sign',
   question:'DOVVSU is a specialised unit of the Ghana Police Service. What does the acronym DOVVSU stand for?',
   answers:['Department of Violent Victims Support and Unified response','Domestic Violence and Victim Support Unit','Division of Vulnerable Victims Support and Undercover operations','Department of Violence, Victimisation, Surveillance and Underreporting'],
   correct:1,
   explain:'DOVVSU stands for Domestic Violence and Victim Support Unit. It is a specialised unit of the Ghana Police Service that handles domestic violence, child abuse, sexual offences and victim support. DOVVSU has units in all regions. The dedicated helpline is 18555. DOVVSU coordinates with social welfare, hospitals and shelters.'},

  {type:'text',
   question:'What is "plea bargaining" in the Ghanaian criminal justice system?',
   answers:['A process where the accused pays a fine to avoid going to court entirely', 'A negotiation where the accused agrees to plead guilty to a lesser charge in exchange for a', 'A system where the accused can choose their own judge for a fairer trial', 'A community mediation process used instead of court for minor offences'],
   correct:1,
   explain:'Plea bargaining allows an accused person to negotiate with the prosecution — typically pleading guilty to a lesser offence in exchange for a more lenient sentence. It reduces court backlog and guarantees some conviction. In Ghana it is increasingly used for economic crimes and drug offences but must be approved by the court.'},

  {type:'text',
   question:'Kofi spots a person selling items he recognises as stolen from a recent robbery reported on the news. What should he do?',
   answers:['Buy the items cheaply and report the seller later after securing the deal','Report the seller to the police with as much description and location information as possible','Confront the seller directly and demand they return the stolen items','Do nothing — getting involved in robbery cases puts your life at risk'],
   correct:1,
   explain:'Receiving, buying or selling stolen property is a criminal offence. If you recognise stolen property being sold, report to the police on 191 with: location, description of the seller, items being sold, and any registration numbers or identifying features. Do not buy or touch the items — this could complicate the police investigation.'},

  {type:'text',
   question:'What is "resisting arrest" and what are the consequences in Ghana?',
   answers:['Saying "I did not do it" during an arrest — verbal denial constitutes legal resistance','Physically fighting, fleeing or obstructing a lawful arrest — this is a criminal offence that adds charges','Asking for a lawyer before answering questions — this is your right, not resistance','Crying or expressing distress during an arrest — emotional reactions are protected by law'],
   correct:1,
   explain:'Resisting lawful arrest — physically fighting, fleeing or obstructing police — is a separate criminal offence in Ghana on top of whatever original charge led to the arrest. Even if you believe the arrest is unlawful, the correct response is to comply and challenge it in court. A lawyer can apply for habeas corpus if the arrest is unlawful.'},

  {type:'text',
   question:'A man in the market shouts that a young boy pickpocketed him and calls for people to beat the child. What is the legal and correct response?',
   answers:['Join the crowd — mob justice is faster and more effective than the slow court system','Stop the mob action, detain the child calmly and hand them to the police — mob justice is illegal','Let the community deal with it — this is a recognised form of traditional justice','Call DOVVSU since the accused is a child'],
   correct:1,
   explain:'Mob justice — beating, lynching or harming a suspect — is illegal in Ghana and constitutes assault or murder. Even if the person is guilty, only the courts can punish them. Restrain, do not harm. Call police on 191. If the accused is a child, the police will refer them to the Juvenile Court. Mob justice kills innocent people and violates constitutional rights.'},

  {type:'text',
   question:'What is the purpose of the Police Complaints Unit and how can citizens access it?',
   answers:['It is a media relations unit that handles press enquiries about police operations','It receives and investigates complaints from the public about police misconduct or poor service','It is a legal advice unit that helps citizens understand their rights before going to court','It manages court appearances for police officers who are called as witnesses'],
   correct:1,
   explain:'The Police Complaints Unit (part of PIPSB) receives and investigates complaints about police misconduct — corruption, brutality, unprofessional conduct, false arrest and extortion. Citizens can submit complaints at police headquarters, regional HQs, or to CHRAJ. Complaints should include date, time, location, officer\'s name or service number if known.'},

  {type:'text',
   question:'What legal document authorises the police to enter and search a private home?',
   answers:['A verbal instruction from a senior officer of Inspector rank or above','A search warrant issued by a magistrate or judge specifying the premises and items sought','A notification letter sent to the homeowner 24 hours before the search takes place','Only the President of Ghana can authorise entry into a private dwelling'],
   correct:1,
   explain:'Under Article 18 of the 1992 Constitution, every person\'s home is inviolable. Police must obtain a search warrant from a court before entering a private home — except in specific urgent circumstances (e.g. hearing a crime in progress). The warrant must specify the premises and what is being searched for. A warrantless search can be challenged in court.'},

  {type:'text',
   question:'Esi is sexually harassed by a teacher at school. She is ashamed and wants to stay quiet. What should she understand?',
   answers:['She is right to stay quiet — reporting will make the situation worse and damage her reputation','Sexual harassment is a criminal offence — she should report to DOVVSU, school authorities or the police','She should only report if there are witnesses to confirm her account','Sexual harassment by teachers is a school disciplinary matter, not a criminal one'],
   correct:1,
   explain:'Sexual harassment is a criminal offence in Ghana under the Criminal Offences Act and the Domestic Violence Act. Teachers are in a position of authority — abuse of that position makes the offence more serious. Students should report to DOVVSU (18555), school authorities, the Ghana Education Service or the police. Shame belongs to the perpetrator, not the victim.'},

  {type:'text',
   question:'What is the role of the Attorney General in Ghana\'s criminal justice system?',
   answers:['The Attorney General is the head of the Ghana Police Service and oversees all arrests','The Attorney General heads the prosecution service and decides which criminal cases go to court','The Attorney General is the senior judge who presides over the Supreme Court','The Attorney General approves all police search warrants and arrest orders'],
   correct:1,
   explain:'The Attorney General of Ghana is the principal legal adviser to the government and head of the prosecution service. The AG\'s Department decides whether to prosecute criminal cases, enters nolle prosequi to drop charges, and conducts prosecutions in serious cases. The AG is not part of the police — the police investigate, the AG prosecutes.'},

  {type:'text',
   question:'A student is caught with drugs at school. A police officer offers to "make it disappear" for money. The student pays. Who has committed a crime?',
   answers:['Only the student — the officer was just offering a service', 'Both the student and the officer — the student for drug possession', 'Only the officer — the student was a victim of police extortion', 'Neither — this is an informal resolution that saves court time and resources'],
   correct:1,
   explain:'Both have committed crimes. The student: drug possession. The police officer: extortion, corruption and abuse of office — all serious criminal offences. The officer\'s conduct should be reported to PIPSB and CHRAJ. Paying a bribe also makes the student an accessory to corruption. The correct action is to cooperate with due process and seek legal representation.'},

  {type:'image', svgKey:'footbridge',
   question:'This pedestrian footbridge is visible on a busy highway. A student says crossing directly is faster. What should they understand?',
   answers:['Crossing directly is fine if there is a gap in traffic — personal risk assessment is sufficient','Footbridges exist because direct crossing at high speeds is extremely dangerous — use the bridge always','Direct crossing is only risky at night — during daytime it is safe with care','The bridge is optional for adults but mandatory only for school children in uniform'],
   correct:1,
   explain:'Footbridges over highways are provided specifically because high-speed traffic makes direct crossing extremely dangerous. In Ghana, many road fatalities involve pedestrians crossing busy highways. The law requires pedestrians to use designated crossings. Police and MTTD enforce pedestrian compliance near footbridges on major roads.'},

  {type:'text',
   question:'What does "contempt of court" mean and what can happen to someone found guilty?',
   answers:['Laughing or showing disrespect in a courtroom — the judge can ask the person to leave','Deliberately disobeying a court order or disrupting court proceedings — punishable by fine or imprisonment','Losing a court case and publicly disagreeing with the verdict — it is a form of free speech','Arriving late to a court hearing — the judge can charge a penalty fee for wasted court time'],
   correct:1,
   explain:'Contempt of court covers: disobeying court orders, disrupting proceedings, disrespecting the court\'s authority, or publishing material that prejudices a fair trial. In Ghana, courts can impose fines and imprisonment for contempt. Following court orders — including bail conditions, injunctions and subpoenas — is legally required.'},

  {type:'text',
   question:'Kofi\'s uncle is arrested and tells Kofi to call a "bail bondsman" to pay the police directly for his release. What should Kofi know?',
   answers:['Bail bondsmen are registered officers who legally facilitate release from police custody for a fee','No legitimate bail process involves paying money directly to police — this is likely a bribe or scam','Bail bondsmen are lawyers who post bail money on behalf of arrested persons for a commission','The uncle\'s advice is correct — this is the fastest and most reliable way to secure bail in Ghana'],
   correct:1,
   explain:'In Ghana, bail is granted by a court or senior police officer under defined legal procedures. No one should demand direct payment to police for release — this is bribery. "Bail bondsmen" as informal middlemen are not a recognised legal role. If someone demands payment for release, refuse and report to PIPSB and CHRAJ. Seek a lawyer.'},

  {type:'text',
   question:'What is the Ghana Police Cyber Crime Unit\'s mandate?',
   answers:['To police social media content and remove posts that criticise the government', 'To investigate electronic and computer-related crimes including online fraud', 'To monitor all internet traffic in Ghana to prevent terrorist communications', 'To regulate mobile money platforms and resolve MoMo disputes between customers'],
   correct:1,
   explain:'The Ghana Police Cyber Crime Unit investigates digital crimes: online fraud, identity theft, hacking, computer intrusion, cyberbullying, electronic blackmail and child exploitation online. Report cybercrime at the nearest police station or directly to the Cyber Crime Unit. The Cyber Security Authority of Ghana (CSA) also handles cyber incident reporting.'},

  {type:'text',
   question:'A police officer fires a warning shot into the air to disperse a crowd. A bystander is injured by the falling bullet. Who is legally responsible?',
   answers:['No one — warning shots are a standard policing tool and any injury is accidental', 'The officer and potentially the Ghana Police Service — police are accountable for harm caused by', 'Only the crowd members who caused the disturbance that required the warning shot', 'The officer is immune from liability as warning shots are authorised use of force'],
   correct:1,
   explain:'Falling bullets from warning shots can be lethal. Police officers are individually accountable for their use of force. The Ghana Police Service can also be sued for harm caused by officers on duty. Victims can file complaints with PIPSB, CHRAJ and pursue civil claims. Excessive or reckless use of force is contrary to police standing orders.'},

  {type:'text',
   question:'What is the function of the National Identification Authority (NIA) Ghana Card, and why do police request it?',
   answers:['The Ghana Card is a travel document — police use it only to verify international travel history','The Ghana Card is the national identity document — police use it to verify a person\'s identity, address and legal status in Ghana','The Ghana Card is a voter registration card — police use it only during election periods','The Ghana Card is a tax identification document — police use it to check if a person has outstanding tax debts'],
   correct:1,
   explain:'The Ghana Card (GhanaCard) issued by the National Identification Authority (NIA) is Ghana\'s primary national identity document. It contains biometric data including fingerprints and photo. Police request it to verify identity during investigations, stops and checks. Carrying your GhanaCard is advisable and helps resolve identity queries quickly.'},

  {type:'text',
   question:'A student\'s bicycle is stolen from outside a shop. The student thinks it is not worth reporting because it is a small matter. Why is reporting important?',
   answers:['It is not important — police only investigate serious crimes and will dismiss the report', 'Reporting creates an official record, may recover the property, and helps police identify repeat offenders', 'Reporting is only useful if the student has insurance — otherwise the police cannot help', 'Only the victim\'s parents can report theft on behalf of a student under 18'],
   correct:1,
   explain:'Every report to police matters. Reporting theft: creates an official crime record, gives you a reference number for insurance, helps police identify patterns of theft in an area, and may lead to recovery of the bicycle if stopped or found. Police track stolen items using serial numbers. Report all crimes — small or large.'},

  {type:'image', svgKey:'traffic_light_pedestrian',
   question:'This image shows a pedestrian traffic light showing a RED figure. What must a pedestrian do?',
   answers:['Cross quickly — red means the other traffic is stopped so it is the safest time to cross','Wait — the red figure means do not cross, vehicles have the right of way','The red figure is advisory only — pedestrians can use their own judgement','Cross only if you can see no vehicles approaching within 50 metres'],
   correct:1,
   explain:'A RED pedestrian signal means STOP and WAIT. Do not cross regardless of how clear the road appears. Vehicles may be turning from side streets or approaching from different directions. Crossing on red is a traffic offence and extremely dangerous. Only cross when the GREEN figure shows and you have checked that vehicles have stopped.'},

  {type:'text',
   question:'What is the legal definition of "murder" under Ghana\'s Criminal Offences Act?',
   answers:['Any death that occurs during a criminal act, whether intentional or accidental','Causing the death of another person with malice aforethought — the intention to kill or cause grievous harm','Any killing that is not ruled accidental or in self-defence by a court','Causing death through extreme negligence, such as dangerous driving that kills a pedestrian'],
   correct:1,
   explain:'Murder under Ghana\'s Criminal Offences Act requires "malice aforethought" — the intention to kill or cause grievous bodily harm. Murder carries the death penalty or life imprisonment in Ghana. Manslaughter (unintentional killing) carries lesser penalties. The distinction between murder and manslaughter centres on intent.'},

  {type:'text',
   question:'A police officer asks to search your bag without a warrant during a stop on the street. What are your rights?',
   answers:['You must comply immediately — officers can search anyone, anywhere, at any time', 'You can ask the reason for the search; police need reasonable suspicion for a stop-and-search', 'You have no right to refuse any police request — resistance leads to automatic arrest', 'Only female officers can search female persons; if no female officer is present the search cannot proceed'],
   correct:1,
   explain:'Under Ghana\'s law, police need reasonable grounds to conduct a stop-and-search. Ask the officer to state the reason. In practice, cooperating while verbally noting your objection is wise. Record the officer\'s name and service number. If a search was unlawful, report to PIPSB or CHRAJ and consult a lawyer. Female persons should be searched by female officers.'},

  {type:'text',
   question:'What does "habeas corpus" mean and when can it be used in Ghana?',
   answers:['A court order requiring a witness to appear and give testimony in a criminal trial', 'A legal application to a court demanding that a detained person be brought before the court to determine', 'A police warrant authorising the arrest and detention of a named suspect', 'A legal document allowing police to search a property for evidence of a specific crime'],
   correct:1,
   explain:'Habeas corpus (Latin: "you shall have the body") is a fundamental legal right — a person\'s lawyer or family can apply to a High Court demanding that the detaining authority produce the detained person and justify the detention. If the court finds the detention unlawful, the person is released immediately. It is a cornerstone of protection against unlawful imprisonment.'},

  {type:'text',
   question:'Kwame is a witness to a serious crime and receives a subpoena. He ignores it and does not appear in court. What are the consequences?',
   answers:['Nothing — witnesses cannot be legally forced to testify in Ghana','He can be found in contempt of court and face arrest, fine or imprisonment for failing to attend','He only faces consequences if the accused is found not guilty due to his absence','The court will simply find another witness — missing a subpoena has no personal consequences'],
   correct:1,
   explain:'A subpoena (witness summons) is a court order requiring a person to appear and testify. Ignoring a subpoena is contempt of court — punishable by fine and imprisonment. In Ghana, reluctant witnesses can be arrested and brought to court by warrant. Witness testimony is crucial to justice — the court takes non-attendance very seriously.'},

  {type:'text',
   question:'What is the role of the Legal Aid Commission in Ghana\'s justice system?',
   answers:['It provides free legal services to police officers who are sued for conduct on duty', 'It provides free legal representation to persons who cannot afford a lawyer', 'It trains lawyers and judges for the Ghanaian court system', 'It reviews and appeals all death penalty convictions in Ghana'],
   correct:1,
   explain:'The Legal Aid Commission of Ghana provides free legal advice and representation to indigent persons — those who cannot afford private legal fees. This is especially important in criminal cases where the accused faces imprisonment. Every person charged with a crime has the right to legal representation under Article 19 of the 1992 Constitution.'},

  {type:'text',
   question:'A driver is approaching a school zone sign showing a speed limit of 30 km/h. The road ahead is clear and no children are visible. What must the driver do?',
   answers:['Maintain normal speed — the 30 km/h limit only applies when children are visibly crossing', 'Reduce speed to 30 km/h and remain alert — the limit applies at all times in a school zone regardless of', 'Slow down only when the MTTD officer is present to enforce the limit', 'Sound the horn twice to warn any hidden children then pass at normal speed'],
   correct:1,
   explain:'School zone speed limits apply at ALL times — not just when children are visible. Drivers who exceed the limit face fines and prosecution by MTTD. Children can step onto the road unexpectedly. The 30 km/h limit gives drivers enough time to stop safely if a child appears suddenly.'},

  {type:'text',
   question:'Ghana\'s Police Service operates under which government ministry?',
   answers:['The Ministry of Justice — because law enforcement is part of the legal system','The Ministry of the Interior — which oversees internal security and public order institutions','The Ministry of Defence — because police share law enforcement with the military','The Ministry of Local Government — because police are deployed at the district level'],
   correct:1,
   explain:'The Ghana Police Service operates under the Ministry of the Interior, which is responsible for internal security, public order and related institutions including the Police Service, Immigration Service, Prisons Service and NADMO. The Inspector General of Police (IGP) heads the Police Service and is accountable through the Minister of the Interior.'},

  {type:'text',
   question:'What is the legal status of a "caution" given by police in Ghana?',
   answers:['A caution is the most serious form of punishment — equivalent to a fine plus a criminal record','A caution is an official warning issued instead of arrest for minor offences — it is recorded but not a conviction','A caution given by police has no legal standing and can be ignored completely','A caution automatically becomes a criminal conviction if the person reoffends within five years'],
   correct:1,
   explain:'A police caution is a formal warning given for minor first-time offences as an alternative to arrest and prosecution. It is recorded in police files. While not a criminal conviction, a record of cautions can be considered if the person reoffends. Accepting a caution is voluntary — a person can choose to go to court instead if they believe they are innocent.'},

  {type:'text',
   question:'Ama overhears a classmate planning to bring a weapon to school tomorrow. What should she do?',
   answers:['Say nothing — reporting a classmate is considered betrayal and could make her a target','Report immediately to a trusted teacher, the school head, or call 191 — early warning prevents violence','Wait until she actually sees the weapon before reporting — acting on rumours is unfair','Confront the classmate privately and ask them not to do it'],
   correct:1,
   explain:'Reporting a credible threat of violence is not betrayal — it is potentially saving lives. Tell a trusted teacher, the headteacher, or call 191 immediately. If you believe the threat is serious and imminent, call police directly. Threats to bring weapons to school must always be taken seriously. Early reporting allows police and school to intervene before harm occurs.'},

  {type:'text',
   question:'What does the term "burden of proof" mean in Ghanaian criminal law?',
   answers:['The defendant must prove they are innocent — the court assumes guilt until proven otherwise','The prosecution must prove the accused is guilty beyond reasonable doubt — the accused is presumed innocent','Both the prosecution and defence share equal responsibility for proving their claims in court','The burden falls on the police to prove they had reasonable grounds for the arrest'],
   correct:1,
   explain:'In Ghana\'s criminal justice system, the accused is presumed innocent until proven guilty. The prosecution carries the burden of proving guilt "beyond reasonable doubt." This is a very high standard — any reasonable doubt must lead to acquittal. The accused does not have to prove innocence. This protects citizens from wrongful conviction.'},

  {type:'text',
   question:'A student posts a false rumour on social media saying a classmate committed a crime. The classmate\'s reputation is damaged. What law has been potentially broken?',
   answers:['No law — social media posts are protected by freedom of expression under the Constitution', 'Criminal libel and defamation laws — posting false statements that damage someone\'s reputation is a criminal and', 'Only the platform (Facebook, TikTok) is legally responsible — users cannot be held liable for posts', 'The classmate can only sue if the post received more than 1000 shares or views'],
   correct:1,
   explain:'Ghana\'s Criminal Offences Act includes criminal libel — publishing false statements that damage a person\'s reputation. Civil defamation claims are also available. Social media posts are not exempt from these laws. The Electronic Transactions Act extends these provisions to digital content. False accusations of crime on social media can result in arrest, prosecution and compensation claims.'},

  {type:'text',
   question:'A police officer demands a bribe at a checkpoint in exchange for passing without inspection. What should a driver do?',
   answers:['Pay the bribe — it is faster and the amount is usually small', 'Refuse, note the officer\'s service number and post location', 'Argue loudly with the officer — public pressure will make them back down', 'Drive off quickly — engaging with a corrupt officer is dangerous and pointless'],
   correct:1,
   explain:'Refusing to pay a bribe is your right and civic duty. Note the officer\'s service number, name, location, time and post. Report to the Police Professional Standards Bureau (PIPSB) or CHRAJ on their toll-free corruption hotline. The Ghana Police Service has a zero-tolerance policy on corruption. Your report helps clean up the service.'},

  {type:'text',
   question:'What is the Ghana Police Service\'s official position on the use of lethal force?',
   answers:['Officers may use lethal force freely to maintain order — public safety outweighs individual rights','Lethal force is a last resort, justified only when there is immediate threat to life and lesser force is insufficient','Officers are encouraged to use lethal force early to deter criminals from resisting arrest','There are no rules governing police use of force — officers use their individual judgement'],
   correct:1,
   explain:'Ghana Police standing orders and the 1992 Constitution require that force used by police be proportionate, necessary and a last resort. Lethal force is only justified when there is an immediate and serious threat to life and no lesser option is available. Excessive force is a disciplinary and criminal matter. Officers who misuse force can be prosecuted.'},

  {type:'text',
   question:'Under Ghana\'s Right to Information Act (Act 989), what right do citizens have regarding information held by public institutions like the Police Service?',
   answers:['Citizens have no right to request information from security agencies — all police records are confidential','Citizens have the right to request and receive information held by public institutions, subject to defined exemptions','Only journalists and lawyers can request information under the RTI Act','Citizens can only request their own personal records — information about others is always exempt'],
   correct:1,
   explain:'Ghana\'s Right to Information Act (Act 989, 2019) gives every citizen the right to request information from public institutions. The Police Service must respond within 14 days. Exemptions exist for national security and ongoing investigations, but these must be specifically justified. The RTI Act is a powerful accountability tool for citizens.'},

  {type:'text',
   question:'What is the difference between the Ghana Police Service and the Ghana Armed Forces in terms of their roles?',
   answers:['There is no difference — both are law enforcement agencies that can arrest civilians anywhere', 'Police maintain internal law and order and protect civilians; the Military defends Ghana against external', 'The Military handles all serious crimes while the Police handle only minor offences', 'The Police operate only in cities while the Military polices all rural and border areas'],
   correct:1,
   explain:'The Ghana Police Service is responsible for internal law and order — crime prevention, civilian protection and criminal investigation. The Ghana Armed Forces primarily defend the nation against external threats. Military deployment for internal security requires constitutional or legal authorisation (e.g. a state of emergency). Soldiers do not routinely have police powers over civilians.'},

  {type:'text',
   question:'A person is convicted of a crime but believes the trial was unfair. What is their legal option?',
   answers:['They must accept the verdict — once convicted there is no way to challenge the outcome','They can appeal to a higher court — the Court of Appeal or Supreme Court can review the conviction and sentence','They can only appeal if new evidence emerges after the trial — dissatisfaction with the verdict alone is not grounds','They can request the President to overrule the judge and order a retrial'],
   correct:1,
   explain:'Ghana\'s justice system has an appeal process. A convicted person can appeal to the Court of Appeal — which reviews whether the law was correctly applied and whether the trial was fair. A further appeal to the Supreme Court is possible on constitutional grounds. The right of appeal is guaranteed under the 1992 Constitution and is a fundamental safeguard against miscarriages of justice.'},

  {type:'text',
   question:'What is the significance of the Ghana Police Service\'s motto "Service with Integrity"?',
   answers:['It means the police only serve the government and political leaders in power','It means police should serve all citizens equally, honestly and professionally — without corruption, bias or abuse','It is a ceremonial phrase used at parades that has no practical meaning for daily police work','It means the police service is self-funding and does not depend on government budgets'],
   correct:1,
   explain:'"Service with Integrity" captures the two core obligations of the Ghana Police Service: SERVICE — commitment to protecting and assisting all citizens equally regardless of background; and INTEGRITY — performing duties honestly, without corruption, and with respect for human rights. Every police officer is expected to embody both values in every interaction with the public.'}

function launchQuiz(name,school,gender){
  var bank=QUESTION_BANK.slice();
  for(var i=bank.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=bank[i];bank[i]=bank[j];bank[j]=t;}
  QUESTIONS_ACTIVE=bank.slice(0,30);
  var sb=document.getElementById('starBar');
  if(sb){
    sb.style.display='flex';
    sb.innerHTML='<span class="sb-label">⭐ Score:</span>';
    for(var si=0;si<QUESTIONS_ACTIVE.length;si++){
      var s=document.createElement('span');
      s.className='sb-star';s.id='sbStar'+si;s.textContent='★';
      sb.appendChild(s);
    }
  }
  document.getElementById('quizContainer').style.display='flex';
  var bar=document.getElementById('cadetBar');bar.style.display='block';
  var title=gender==='Female'?'Cadetess':'Cadet';
  bar.innerHTML='👮 <strong>'+title+' '+name+'</strong> &nbsp;·&nbsp; '+school+' &nbsp;<span onclick="goBack()" style="font-size:11px;opacity:.5;cursor:pointer;text-decoration:underline;font-weight:normal;">Not you?</span>';
  showQuestion();
}

function goBack(){localStorage.removeItem('cadetName');localStorage.removeItem('cadetGender');localStorage.removeItem('cadetSchool');window.location.href='quiz_questions.html';}

function showQuestion(){
  if(window.speechSynthesis) speechSynthesis.cancel();
  document.getElementById('explanation').style.display='none';
  if(current>=QUESTIONS_ACTIVE.length){showResult();return;}
  var q=QUESTIONS_ACTIVE[current];
  document.getElementById('qCounter').textContent='Q'+(current+1)+' / '+QUESTIONS_ACTIVE.length;
  var qt=document.getElementById('qType');
  if(q.type==='image'){qt.textContent='🖼️ Image Question';qt.style.background='rgba(0,60,180,0.4)';}
  else{qt.textContent='👮 Ghana Police Service';qt.style.background='rgba(0,40,120,0.4)';}
  var imgArea=document.getElementById('qImageArea');
  if(q.svgKey&&IMAGES[q.svgKey]){imgArea.innerHTML='<div class="q-image-wrap"><span class="q-image-label">👮 Identify This</span>'+IMAGES[q.svgKey]+'</div>';}
  else{imgArea.innerHTML='';}
  document.getElementById('question').textContent=q.question;
  document.getElementById('progress').style.width=(current/QUESTIONS_ACTIVE.length*100)+'%';
  var ans=document.getElementById('answers');ans.innerHTML='';
  var labels=['A','B','C','D'];
  var shuffled=q.answers.map(function(text,origIdx){return{text:text,orig:origIdx};});
  for(var si=shuffled.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var st=shuffled[si];shuffled[si]=shuffled[sj];shuffled[sj]=st;}
  var newCorrect=shuffled.findIndex(function(item){return item.orig===q.correct;});
  window._currentShuffled=shuffled;window._currentNewCorrect=newCorrect;
  shuffled.forEach(function(item,i){
    var btn=document.createElement('button');
    btn.innerHTML='<span class="opt-label">'+labels[i]+'</span>'+item.text;
    btn.onclick=(function(idx,b){return function(){checkAnswer(idx,b);};})(i,btn);
    ans.appendChild(btn);
  });
  maxTime=q.type==='image'?90:70;
  startTimer();
  if(window.speechSynthesis){
    speechSynthesis.cancel();
    var readText='Ghana Police Service Quiz. Question '+(current+1)+'. '+q.question+'. Option A. '+shuffled[0].text+'. Option B. '+shuffled[1].text+'. Option C. '+shuffled[2].text+'. Option D. '+shuffled[3].text+'.';
    var uq=new SpeechSynthesisUtterance(readText);
    uq.lang='en-GB';uq.pitch=1.05;uq.rate=0.90;uq.volume=1.0;
    (function(){var vs=window.speechSynthesis.getVoices();var v=vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})||vs.find(function(x){return x.lang.startsWith('en-GB');})||vs.find(function(x){return x.lang.startsWith('en');});if(v)uq.voice=v;window.speechSynthesis.speak(uq);})();
    if(!window.speechSynthesis.getVoices().length){window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.onvoiceschanged=null;var vs=window.speechSynthesis.getVoices();var v=vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})||vs.find(function(x){return x.lang.startsWith('en-GB');})||vs.find(function(x){return x.lang.startsWith('en');});if(v)uq.voice=v;window.speechSynthesis.speak(uq);};}
  }
}

function startTimer(){
  clearInterval(timerInterval);timeLeft=maxTime;
  document.getElementById('time').textContent=timeLeft;
  var bar=document.getElementById('timerBar');bar.style.width='100%';bar.style.background='#00ff00';
  var yellowAt=Math.floor(maxTime*0.5);
  var redAt=Math.floor(maxTime*0.25);
  var _yellowed=false,_redded=false;

  function timerSpeak(text,pitch,rate){
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang='en-GB';u.pitch=pitch||1.05;u.rate=rate||0.95;u.volume=1.0;
    function pickV(){
      var vs=window.speechSynthesis.getVoices();
      return vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})||
             vs.find(function(v){return v.lang.startsWith('en-GB');})||
             vs.find(function(v){return v.lang.startsWith('en');});
    }
    var v=pickV();if(v)u.voice=v;
    speechSynthesis.speak(u);
  }

  timerInterval=setInterval(function(){
    timeLeft--;document.getElementById('time').textContent=timeLeft;
    var pct=timeLeft/maxTime*100;bar.style.width=pct+'%';bar.style.background=pct>50?'#00ff00':pct>25?'#ffd700':'#ff4444';

    var firstName=(localStorage.getItem('cadetName')||'Cadet').split(' ')[0];

    if(!_yellowed&&timeLeft<=yellowAt&&timeLeft>redAt){
      _yellowed=true;
      var msgs=['Keep going, '+firstName+'! You are halfway through your time.',
                firstName+', stay focused! You still have time — think carefully.',
                'You can do it, '+firstName+'! Choose your answer soon.'];
      timerSpeak(msgs[Math.floor(Math.random()*msgs.length)],1.1,0.95);
    }
    if(!_redded&&timeLeft<=redAt&&timeLeft>10){
      _redded=true;
      var rmsgs=[firstName+'! Time is running out — answer now!',
                 'Hurry, '+firstName+'! Only seconds left — pick your answer!',
                 firstName+', quick! Running out of time!'];
      timerSpeak(rmsgs[Math.floor(Math.random()*rmsgs.length)],1.2,1.1);
    }
    if(timeLeft<=10&&timeLeft>0){
      var AC=window.AudioContext||window.webkitAudioContext;
      if(AC){try{
        var ctx=new AC(),o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='square';o.frequency.value=400+(10-timeLeft)*80;
        g.gain.setValueAtTime(0.35,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
        o.start(ctx.currentTime);o.stop(ctx.currentTime+0.15);
      }catch(e){}}
      if(timeLeft===10) timerSpeak(firstName+'! Ten seconds! Answer now!',1.3,1.2);
      else if(timeLeft===5) timerSpeak('Five! '+firstName+' — now!',1.4,1.3);
      else if(timeLeft===3) timerSpeak('Three!',1.5,1.4);
      else if(timeLeft===2) timerSpeak('Two!',1.5,1.5);
      else if(timeLeft===1) timerSpeak('One!',1.5,1.5);
    }
    if(timeLeft<=0){clearInterval(timerInterval);timeExpired();}
  },1000);
}

function speakFeedbackThenAdvance(msg,pitch){
  var PAUSE_AFTER=3500,FALLBACK=90000;
  function doAdvance(){current++;showQuestion();}
  if(!window.speechSynthesis){setTimeout(doAdvance,PAUSE_AFTER);return;}
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(msg);u.lang='en-GB';u.pitch=pitch||1.05;u.rate=0.88;u.volume=1.0;
  function pickVoice(){
    var vs=window.speechSynthesis.getVoices();
    return vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})
        ||vs.find(function(x){return x.lang.startsWith('en-GB');})
        ||vs.find(function(x){return x.lang.startsWith('en-US');})
        ||vs.find(function(x){return x.lang.startsWith('en');})
        ||vs[0]||null;
  }
  var advanced=false,fallbackTimer=null;
  function advance(){if(advanced)return;advanced=true;if(fallbackTimer)clearTimeout(fallbackTimer);setTimeout(doAdvance,PAUSE_AFTER);}
  u.onend=advance;u.onerror=advance;
  fallbackTimer=setTimeout(advance,FALLBACK);
  var vs=window.speechSynthesis.getVoices();
  if(vs.length>0){
    var v=pickVoice();if(v)u.voice=v;
    try{speechSynthesis.speak(u);}catch(e){advance();}
  } else {
    window.speechSynthesis.onvoiceschanged=function(){
      window.speechSynthesis.onvoiceschanged=null;
      var v2=pickVoice();if(v2)u.voice=v2;
      try{speechSynthesis.speak(u);}catch(e){advance();}
    };
  }
}

function timeExpired(){
  var q=QUESTIONS_ACTIVE[current];
  if(!q) return;
  var btns=document.getElementById('answers').querySelectorAll('button');btns.forEach(function(b){b.disabled=true;});
  var newCorrect=(window._currentNewCorrect!==undefined)?window._currentNewCorrect:q.correct;
  if(btns[newCorrect]) btns[newCorrect].classList.add('correct');if(window.sndWrong)sndWrong();
  var _ooh=document.getElementById('sndOohnewAudio');if(_ooh){_ooh.currentTime=0;_ooh.play().catch(function(){});}
  var explainText=q.explain?' '+q.explain:'';
  showExplanation();
  speakFeedbackThenAdvance('Time is up! The correct answer is option '+['A','B','C','D'][newCorrect]+'.'+explainText,0.95);
}

function checkAnswer(sel,btn){
  if(window.sndClick)sndClick();clearInterval(timerInterval);
  var btns=document.getElementById('answers').querySelectorAll('button');btns.forEach(function(b){b.disabled=true;});
  var q=QUESTIONS_ACTIVE[current];
  if(!q) return;
  var newCorrect=(window._currentNewCorrect!==undefined)?window._currentNewCorrect:q.correct;
  var labels=['A','B','C','D'];var explainText=q.explain?' '+q.explain:'';
  if(sel===newCorrect){
    btn.classList.add('correct');score++;if(window.sndCorrect)sndCorrect();
    (function(idx){var se=document.getElementById('sbStar'+idx);if(se)se.classList.add('earned');})(score-1);
    var _clap=document.getElementById('sndClapAudio');if(_clap){_clap.currentTime=0;_clap.play().catch(function(){});}
    var PRAISE=['Excellent!','Outstanding!','Brilliant!','Well done!','Correct!','Perfect!','Amazing!'];
    window._praiseIdx=(window._praiseIdx||0);var praise=PRAISE[window._praiseIdx%PRAISE.length];window._praiseIdx++;
    showExplanation();
    speakFeedbackThenAdvance(praise+' The correct answer is option '+labels[newCorrect]+'.'+explainText,1.15);
  } else {
    btn.classList.add('wrong');btns[newCorrect].classList.add('correct');if(window.sndWrong)sndWrong();
    var _ooh=document.getElementById('sndOohnewAudio');if(_ooh){_ooh.currentTime=0;_ooh.play().catch(function(){});}
    showExplanation();
    speakFeedbackThenAdvance('That is not correct. You chose option '+labels[sel]+'. The correct answer is option '+labels[newCorrect]+'.'+explainText,0.95);
  }
}

function showExplanation(){var q=QUESTIONS_ACTIVE[current];if(q && q.explain){var el=document.getElementById('explanation');el.textContent='💡 '+q.explain;el.style.display='block';}}

function showResult(){
  clearInterval(timerInterval);document.getElementById('quizContainer').style.display='none';
  stopBgMusic();
  var pct=Math.round(score/QUESTIONS_ACTIVE.length*100);
  setTimeout(function(){if(window.sndWin)sndWin(pct);if(window.voiceResult)voiceResult(pct);},400);
  var badge,msg;
  if(pct>=85){badge='🏅 GOLD';msg='Outstanding Police & Community Safety Knowledge!';}
  else if(pct>=70){badge='🥈 SILVER';msg='Excellent work — great civic awareness!';}
  else if(pct>=50){badge='🥉 BRONZE';msg='Good effort — keep studying your rights!';}
  else{badge='🎓 PARTICIPANT';msg='Study police and community safety and try again!';}
  localStorage.setItem('policeScore',score+'/'+QUESTIONS_ACTIVE.length);
  if(pct>=70){confetti({particleCount:200,spread:120,origin:{y:0.6}});}
  document.getElementById('result').style.display='block';
  document.getElementById('result').innerHTML=
    '<div style="font-size:54px;margin-bottom:10px;">👮</div>'+
    '<h2 style="font-size:22px;margin-bottom:6px;">'+badge+'</h2>'+
    '<p style="font-size:32px;font-weight:900;color:#FFD700;">'+score+' / '+QUESTIONS_ACTIVE.length+'</p>'+
    '<p style="font-size:18px;margin:6px 0 4px;">'+pct+'%</p>'+
    '<p style="opacity:.7;font-size:14px;margin-bottom:6px;">'+msg+'</p>'+
    '<p style="font-size:13px;opacity:.6;margin-bottom:20px;">🔓 Health & Ambulance quiz is now unlocked!</p>'+
    '<button onclick="CMG_GUARD.complete(\'police\','+score+')" style="padding:14px 32px;background:linear-gradient(45deg,#FFD700,#e6a800);color:#000;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;box-shadow:0 4px 18px rgba(255,215,0,0.4);width:100%;margin-bottom:10px;">🏠 Back to Quiz Menu</button>'+
    '<button onclick="window.location.href=\'ambulance_quiz.html\'" style="padding:12px 32px;background:rgba(255,255,255,0.1);color:#fff;border:2px solid rgba(255,255,255,0.3);border-radius:12px;font-size:14px;font-weight:bold;cursor:pointer;width:100%;">⏭ Go Directly to Next Quiz</button>';
  setTimeout(function(){ CMG_GUARD.complete('police',score); },10000);
}
</script>
<script>

// ══════════════════════════════════════════════════════
//  CMG WELCOME SCREEN ENGINE
// ══════════════════════════════════════════════════════
(function(){
  var TIPS = [
    "Read each question carefully before choosing your answer.",
    "Stay calm — take a breath before each question.",
    "Trust your training. You have prepared for this!",
    "Every correct answer earns Ghana a safer future.",
    "Focus! Your community is counting on you."
  ];

  // ── Build star field ─────────────────────────────────
  function buildStars(){
    var container = document.getElementById('cmgStars');
    if(!container) return;
    for(var i=0;i<80;i++){
      var s=document.createElement('div');
      s.className='star';
      var size=(Math.random()*2.5+0.5)+'px';
      s.style.cssText=[
        'width:'+size,'height:'+size,
        'left:'+(Math.random()*100)+'%',
        'top:'+(Math.random()*100)+'%',
        '--d:'+(Math.random()*3+2)+'s',
        '--delay:-'+(Math.random()*4)+'s'
      ].join(';');
      container.appendChild(s);
    }
    // floating gold particles
    for(var j=0;j<18;j++){
      var p=document.createElement('div');
      p.className='particle';
      var ps=(Math.random()*6+3)+'px';
      p.style.cssText=[
        'width:'+ps,'height:'+ps,
        'left:'+(Math.random()*100)+'%',
        'bottom:0',
        'background:'+(Math.random()>.5?'#FFD700':'rgba(255,255,255,.6)'),
        '--pd:'+(Math.random()*5+5)+'s',
        '--pdelay:-'+(Math.random()*8)+'s'
      ].join(';');
      container.appendChild(p);
    }
  }

  // ── Populate cadet name + tip ───────────────────────
  function populateCard(){
    var name   = localStorage.getItem('cadetName')   || 'Cadet';
    var gender = localStorage.getItem('cadetGender') || 'Male';
    var first  = name.split(' ')[0];
    var title  = gender==='Female' ? 'Cadetess' : 'Cadet';
    var el = document.getElementById('wCadetName');
    if(el) el.textContent = title+' '+first+'!';
    var tipEl = document.getElementById('wTip');
    if(tipEl){
      var tip = TIPS[Math.floor(Math.random()*TIPS.length)];
      tipEl.innerHTML = '<span>💡 Tip:</span> '+tip;
    }
    return {name:name, first:first, gender:gender, title:title};
  }

  // ── Welcome fanfare sound (Web Audio API) ──────────
  function playWelcomeSound(){
    var AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    var c;
    try{ c = new AC(); } catch(e){ return; }

    function o(freq,type,start,dur,vol){
      var osc=c.createOscillator();
      var g=c.createGain();
      osc.connect(g); g.connect(c.destination);
      osc.type=type; osc.frequency.value=freq;
      g.gain.setValueAtTime(vol,c.currentTime+start);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+start+dur);
      osc.start(c.currentTime+start);
      osc.stop(c.currentTime+start+dur);
    }
    // rising welcome chime — C E G C
    o(523,'sine',0.0,  0.5, 0.30);
    o(659,'sine',0.15, 0.5, 0.28);
    o(784,'sine',0.30, 0.5, 0.25);
    o(1047,'sine',0.46,0.7, 0.35);
    o(1319,'sine',0.46,0.7, 0.20);
    // subtle harmony layer
    o(262,'triangle',0.0,0.9,0.12);
    o(392,'triangle',0.3,0.8,0.10);
  }

  // ── Voice welcome ──────────────────────────────────
  function playVoiceWelcome(info){
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    setTimeout(function(){
      var msgs = [
        'Welcome '+info.first+'! Good luck on your quiz. You can do it!',
        'Hello '+info.title+' '+info.first+'! Show us what you know. Best of luck!',
        'Great to have you, '+info.first+'! Stay focused and do your best!'
      ];
      var text = msgs[Math.floor(Math.random()*msgs.length)];
      var u = new SpeechSynthesisUtterance(text);
      u.pitch=1.15; u.rate=1.0; u.volume=1.0;
      u.lang='en-GB';
      (function doSpeak(){
        var vs=window.speechSynthesis.getVoices();
        var female=vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})
                 ||vs.find(function(v){return v.lang.startsWith('en-GB');})
                 ||vs.find(function(v){return v.lang.startsWith('en');});
        if(female) u.voice=female;
        speechSynthesis.speak(u);
      })();
      if(!window.speechSynthesis.getVoices().length){
        window.speechSynthesis.onvoiceschanged=function(){
          var vs=window.speechSynthesis.getVoices();
          var female=vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})
                   ||vs.find(function(v){return v.lang.startsWith('en-GB');})
                   ||vs.find(function(v){return v.lang.startsWith('en');});
          if(female) u.voice=female;
          speechSynthesis.speak(u);
        };
      }
    }, 500);
  }

  // ── Init on DOM ready ──────────────────────────────
  function initWelcome(){
    buildStars();
    populateCard();
    // Sound & voice fire on button click (browser autoplay policy requires user gesture)
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', initWelcome);
  } else {
    initWelcome();
  }
})();

// Called by the Start button

  var school = localStorage.getItem('cadetSchool') || 'School';

  // ── 2. Welcome chime (user gesture unlocks audio) ───

      var c=new AC();

        var o=c.createOscillator(),g=c.createGain();

        o.type=t;o.frequency.value=f;

      '<div style="display:flex;flex-direction:column;align-items:center;gap:18px;">' +
        '<img src="../MEDIA/pendrive.png" alt="Pendrive"' +
          ' style="width:340px;max-width:95%;height:auto;' +
          'filter:drop-shadow(0 0 24px rgba(255,215,0,0.45));' +
          'animation:pdPulse 2.8s ease-in-out infinite;">' +
        '<div style="text-align:center;">' +
          '<div style="font-size:13px;font-weight:900;color:#FFD700;' +
            'letter-spacing:2px;text-transform:uppercase;' +
            'text-shadow:0 0 12px rgba(255,215,0,0.5);margin-bottom:4px;">Your Quiz Key</div>' +
          '<div style="font-size:11px;color:rgba(255,255,255,0.45);line-height:1.5;">' +
            'Enter the code on<br>your pendrive label' +
          '</div>' +
        '</div>' +
      '</div>';
    if(!document.getElementById('pdStyle')){
      var st = document.createElement('style');
      st.id  = 'pdStyle';
      st.textContent =
        '@keyframes pdPulse{' +
        '0%,100%{transform:scale(1) rotate(-4deg);}' +
        '50%{transform:scale(1.06) rotate(4deg);}}';
      document.head.appendChild(st);
    }
    document.body.appendChild(pd);
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){ pd.style.left = '0'; });
    });
  }, 500);
  // ── 5. Start the quiz ─────────────────────────────────
  if(typeof launchQuiz === 'function'){
    launchQuiz(name, school, gender);
  } else {
    showQuestion();
  }
}

</script>

<script>
// ═══════════════════════════════════════════════════════
//  CMG QUIZ SOUND ENGINE  –  Web Audio API (offline)
// ═══════════════════════════════════════════════════════
(function(){
  var AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;
  var ctx = null;
  function getCtx(){
    if(!ctx){ ctx = new AC(); }
    if(ctx.state==='suspended') ctx.resume();
    return ctx;
  }
  function osc(freq,type,start,dur,gainVal,fadeOut){
    var c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(gainVal,c.currentTime+start);
    if(fadeOut) g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+start+dur);
    o.start(c.currentTime+start);o.stop(c.currentTime+start+dur);
  }
  function noise(start,dur,gainVal){
    var c=getCtx();
    var buf=c.createBuffer(1,c.sampleRate*dur,c.sampleRate);
    var data=buf.getChannelData(0);
    for(var i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
    var src=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();
    f.type='bandpass';f.frequency.value=2200;f.Q.value=0.8;
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(gainVal,c.currentTime+start);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+start+dur);
    src.start(c.currentTime+start);src.stop(c.currentTime+start+dur);
  }
  window.sndClick=function(){try{osc(800,'sine',0,0.04,0.18,true);osc(400,'square',0,0.04,0.07,true);}catch(e){}};
  window.sndCorrect=function(){try{
    osc(880,'sine',0,0.18,0.45,true);osc(1320,'sine',0,0.18,0.25,true);
    osc(1100,'sine',0.12,0.22,0.35,true);osc(1650,'sine',0.12,0.22,0.20,true);
    for(var i=0;i<7;i++) noise(0.28+i*0.1,0.07,0.5-i*0.03);
  }catch(e){}};
  window.sndWrong=function(){try{
    osc(220,'sawtooth',0,0.15,0.40,true);
    osc(180,'sawtooth',0,0.15,0.25,true);
    osc(150,'square',0.10,0.20,0.35,true);
  }catch(e){}};
  window.sndTick=function(){try{osc(1047,'square',0,0.07,0.22,true);}catch(e){}};
  window.sndWin=function(pct){try{
    if(pct>=80){
      [523,659,784,1047,1319].forEach(function(f,i){
        osc(f,'sine',i*0.12,0.35,0.35,true);
        osc(f*2,'triangle',i*0.12,0.25,0.18,true);
      });
      for(var i=0;i<14;i++) noise(0.55+i*0.09,0.07,0.55-i*0.02);
    } else if(pct>=50){
      osc(523,'sine',0,0.28,0.35,true);
      osc(659,'sine',0.14,0.28,0.30,true);
      osc(784,'sine',0.28,0.28,0.25,true);
      for(var j=0;j<7;j++) noise(0.5+j*0.1,0.07,0.35-j*0.02);
    } else {
      osc(440,'sine',0,0.30,0.20,true);
      osc(392,'sine',0.20,0.30,0.15,true);
    }
  }catch(e){}};

  var voices=[],praiseIdx=0;
  function loadV(){ voices=window.speechSynthesis?speechSynthesis.getVoices():[]; }
  if(window.speechSynthesis){ speechSynthesis.onvoiceschanged=loadV; loadV(); }
  function speak(t,pitch,rate,vol){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(t);
  u.lang='en-GB'; u.pitch=pitch||1.05; u.rate=rate||0.92; u.volume=vol||1;
  function pickVoice(){
    var vs=window.speechSynthesis.getVoices();
    return vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})
        ||vs.find(function(v){return v.lang.startsWith('en-GB');})
        ||vs.find(function(v){return v.lang.startsWith('en');});
  }
  function doSpeak(){ var v=pickVoice(); if(v) u.voice=v; speechSynthesis.speak(u); }
  window.speechSynthesis.onvoiceschanged=function(){
    window.speechSynthesis.onvoiceschanged=null;
    speechSynthesis.cancel();
    var v=pickVoice(); if(v) u.voice=v; speechSynthesis.speak(u);
  };
  if(window.speechSynthesis.getVoices().length>0){
    window.speechSynthesis.onvoiceschanged=null; doSpeak();
  }
}
  var PRAISE=['Excellent!','Outstanding!','Brilliant!','Well done!','Correct!','Perfect!','Amazing!'];
  window.voiceCorrect=function(){speak(PRAISE[praiseIdx%PRAISE.length],1.2,1.1,1.0);praiseIdx++;};
  window.voiceWrong=function(){speak('Not quite. Try next!',0.9,0.95,0.85);};
  window.voiceResult=function(pct){
    if(pct>=80)      speak('Amazing result! You are a champion!',1.2,1.0,1.0);
    else if(pct>=50) speak('Good effort! Keep studying!',1.1,1.0,0.9);
    else             speak('Keep practising! You will improve!',1.0,0.95,0.85);
  };
})();

// ══════════════════════════════════════
//  BACKGROUND MUSIC ENGINE (plays ../MEDIA/bg_music.mp3 at 20% volume)
// ══════════════════════════════════════
var _bgMusic = (function(){
  var a = new Audio();
  a.src     = '../MEDIA/bg_music.mp3';
  a.loop    = true;
  a.volume  = 0.20;
  a.preload = 'auto';
  return a;
})();

function startBgMusic(){
  _bgMusic.currentTime = 0;
  var p = _bgMusic.play();
  if(p && p.catch){ p.catch(function(){}); }
}

function stopBgMusic(){
  var step = _bgMusic.volume / 18;
  var fade = setInterval(function(){
    if(_bgMusic.volume > step){
      _bgMusic.volume = Math.max(0, _bgMusic.volume - step);
    } else {
      _bgMusic.volume = 0;
      _bgMusic.pause();
      clearInterval(fade);
    }
  }, 50);
}

</script>
