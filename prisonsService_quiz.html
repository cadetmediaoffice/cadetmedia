<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ghana Prisons Service Quiz – Cadet Media Ghana</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function(){
  'use strict';
  var _cs=document.createElement('style');
  _cs.id='cmg-cloak';
  _cs.textContent='body{visibility:hidden!important;pointer-events:none!important;}';
  document.head.appendChild(_cs);
  if(window.history&&window.history.pushState) window.history.pushState({cmgGuard:true},'',window.location.href);
  window.CMG_GUARD={
    init:function(opts){
      var quizKey=opts.quizKey||'unknown';
      var repeatable=opts.repeatable===true;
      var HUB='cadetnationalquiz.html';
      if(localStorage.getItem('cmgActivated')!=='true'||!localStorage.getItem('cadetName')||!localStorage.getItem('cmgCode')){
        window.location.replace('activate.html');return;
      }
      if(localStorage.getItem(quizKey+'Completed')==='true'&&!repeatable){window.location.replace(HUB);return;}
      var n=localStorage.getItem('cadetName')||'',c=localStorage.getItem('cmgCode')||'',exp=n+'|'+c;
      var sk=localStorage.getItem('cmgSessionKey');
      if(!sk){localStorage.setItem('cmgSessionKey',exp);}
      else if(sk!==exp){window.location.replace('activate.html');return;}
      localStorage.setItem('cmgLastPage',window.location.pathname.split('/').pop());
      window.addEventListener('popstate',function(){
        if(localStorage.getItem(quizKey+'Completed')==='true'&&!repeatable){window.location.replace(HUB);}
        else if(!localStorage.getItem('cmgActivated')){window.location.replace('activate.html');}
        else if(window.history&&window.history.pushState) window.history.pushState({cmgGuard:true},'',window.location.href);
      });
      var el=document.getElementById('cmg-cloak');if(el)el.parentNode.removeChild(el);
      document.body.style.visibility='';document.body.style.pointerEvents='';
    },
    complete:function(quizKey,score,repeatable){
      localStorage.setItem(quizKey+'Score',String(score));
      if(!repeatable)localStorage.setItem(quizKey+'Completed','true');
      if(window.history&&window.history.replaceState) window.history.replaceState({cmgDone:true},'',window.location.href);
      window.location.replace('cadetnationalquiz.html');
    }
  };
})();
</script>
<style>
*{box-sizing:border-box;}
@keyframes prisonsFlicker{
  0%  {background:linear-gradient(160deg,#0a0a0a 0%,#1a1a2e 30%,#2d2d44 60%,#3d3d5c 85%,#4a4a6e 100%);}
  25% {background:linear-gradient(160deg,#0d0d0d 0%,#1e1e35 30%,#333355 60%,#444468 85%,#525278 100%);}
  50% {background:linear-gradient(160deg,#080808 0%,#161628 30%,#282840 60%,#383858 85%,#454570 100%);}
  75% {background:linear-gradient(160deg,#0b0b0b 0%,#1c1c32 30%,#30304e 60%,#404062 85%,#4e4e74 100%);}
  100%{background:linear-gradient(160deg,#090909 0%,#181828 30%,#2a2a44 60%,#3a3a5a 85%,#484870 100%);}
}
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(160deg,#0a0a0a 0%,#1a1a2e 30%,#2d2d44 60%,#3d3d5c 85%,#4a4a6e 100%);
  animation:prisonsFlicker 6s ease-in-out infinite alternate;
  color:#fff;display:flex;flex-direction:column;align-items:center;padding:15px;margin:0;min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 85%, rgba(80,80,120,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 85% 90%, rgba(60,60,100,0.15) 0%, transparent 70%);
}
.logos{display:flex;flex-direction:column;align-items:center;width:100%;max-width:900px;margin-bottom:10px;position:relative;z-index:1;}
.logos img:first-child{height:110px;margin-bottom:8px;cursor:pointer;border-radius:50%;border:2px solid rgba(255,215,0,0.4);transition:box-shadow .2s;}
.logos img:first-child:hover{box-shadow:0 0 20px rgba(255,215,0,0.8);}
.all-services-logo{width:650px;max-width:95%;display:block;margin:0 auto 10px auto;
  filter:drop-shadow(0 0 15px rgba(255,255,255,0.6)) drop-shadow(0 0 30px rgba(255,215,0,0.6));
  animation:floatLogo 4s ease-in-out infinite;}
@keyframes floatLogo{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.cadet-bar{
  background:rgba(80,80,120,0.22);border:1px solid rgba(120,120,180,0.35);
  border-radius:8px;padding:7px 12px;font-size:12px;font-weight:bold;
  width:100%;max-width:560px;text-align:center;margin-bottom:4px;display:none;
  position:relative;z-index:1;
}
.quiz-container{
  background:rgba(5,5,20,0.60);padding:20px;border-radius:12px;
  width:100%;max-width:560px;display:flex;flex-direction:column;gap:12px;
  position:relative;z-index:1;
}
.timer-row{display:flex;align-items:center;gap:10px;font-size:14px;}
.timer-bar-container{flex:1;background:rgba(255,255,255,0.2);border-radius:12px;height:12px;}
.timer-bar{width:100%;height:100%;background:#00ff00;border-radius:12px;transition:width 1s linear,background 1s;}
.progress-bar{width:100%;background:rgba(255,255,255,0.2);border-radius:12px;overflow:hidden;height:10px;}
.progress{height:100%;width:0%;background:#b0b0e0;transition:width 0.3s;}
.meta-row{display:flex;justify-content:space-between;align-items:center;}
.q-counter{font-size:12px;opacity:0.65;}
.q-type{font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;}
.q-image-wrap{
  width:100%;border-radius:12px;overflow:hidden;
  border:2px solid rgba(120,120,180,0.4);background:#05050f;
  position:relative;display:flex;align-items:center;justify-content:center;padding:12px;
}
.q-image-wrap svg{width:100%!important;height:auto!important;max-height:220px;display:block;}
.q-image-wrap img{width:100%!important;height:auto!important;max-height:220px;display:block;object-fit:contain;border-radius:6px;}
.q-image-label{
  position:absolute;top:8px;left:8px;background:rgba(40,40,100,0.9);
  color:#fff;font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;
}
#question{font-size:15px;font-weight:bold;line-height:1.6;color:#fff;}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:stretch;}
.answers button{
  background:rgba(255,255,255,0.08);color:#fff;
  border:2px solid rgba(255,255,255,0.15);border-radius:10px;
  padding:10px 10px 10px 36px;font-size:12px;font-weight:bold;
  cursor:pointer;text-align:left;transition:all 0.2s;width:100%;
  line-height:1.5;position:relative;height:100%;
}
.answers button .opt-label{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  width:20px;height:20px;border-radius:50%;
  background:rgba(255,255,255,0.15);font-size:11px;font-weight:900;
  display:flex;align-items:center;justify-content:center;color:#FFD700;flex-shrink:0;
}
.answers button:hover:not(:disabled) .opt-label{background:rgba(255,215,0,0.3);}
.answers button.correct .opt-label{background:rgba(0,200,80,0.5);}
.answers button.wrong .opt-label{background:rgba(220,50,50,0.5);}
@media(max-width:420px){.answers{grid-template-columns:1fr;}}
.answers button:hover:not(:disabled){background:rgba(255,255,255,0.2);transform:scale(1.02);}
.answers button.correct{background:rgba(0,200,80,0.5)!important;border-color:#00c850!important;}
.answers button.wrong{background:rgba(220,50,50,0.5)!important;border-color:#dc3232!important;}
.answers button:disabled{cursor:default;}
.explanation{
  background:rgba(80,80,140,0.15);border:1px solid rgba(120,120,200,0.35);
  border-radius:8px;padding:10px 13px;font-size:12px;line-height:1.6;
  color:#c0c0ff;display:none;
}
.result{text-align:center;display:none;padding:25px 15px;width:100%;max-width:560px;position:relative;z-index:1;}
@media(max-width:480px){.answers button{font-size:12px;padding:10px;}#question{font-size:13px;}}

/* ══ CMG WELCOME SCREEN ══ */
#cmgWelcome{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#1a1a3e 0%,#050510 100%);overflow:hidden;}
#cmgWelcome .stars{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
#cmgWelcome .star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}
#cmgWelcome .particle{position:absolute;border-radius:50%;pointer-events:none;animation:floatUp var(--pd,6s) ease-in-out infinite var(--pdelay,0s);opacity:0;}
@keyframes floatUp{0%{transform:translateY(0) scale(0);opacity:0;}20%{opacity:.7;}80%{opacity:.4;}100%{transform:translateY(-120vh) scale(1.5);opacity:0;}}
#cmgCard{position:relative;z-index:2;background:linear-gradient(160deg,rgba(5,5,20,.97) 0%,rgba(20,20,50,.97) 100%);border:2px solid rgba(255,215,0,.6);border-radius:22px;padding:32px 28px 26px;width:92%;max-width:400px;text-align:center;box-shadow:0 0 60px rgba(255,215,0,.2),0 20px 60px rgba(0,0,0,.8);animation:cardPop .55s cubic-bezier(.175,.885,.32,1.275) forwards;}
@keyframes cardPop{0%{transform:scale(.6) translateY(40px);opacity:0;}100%{transform:scale(1) translateY(0);opacity:1;}}
#cmgCard::before{content:'';position:absolute;inset:-3px;border-radius:24px;z-index:-1;background:linear-gradient(45deg,#FFD700,#9090ff,#FFD700,#6060cc,#FFD700);background-size:300% 300%;animation:ringRotate 3s linear infinite;filter:blur(6px);opacity:.6;}
@keyframes ringRotate{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}
.wBadge{display:inline-block;background:linear-gradient(135deg,#FFD700,#e6a800);color:#000;font-weight:900;font-size:11px;letter-spacing:2px;text-transform:uppercase;border-radius:20px;padding:4px 14px;margin-bottom:12px;}
.wEmoji{font-size:54px;display:block;margin-bottom:4px;animation:bounce .8s ease-in-out infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-8px);}}
.wGreeting{font-size:13px;color:rgba(255,215,0,.7);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.wName{font-size:28px;font-weight:900;background:linear-gradient(90deg,#FFD700,#fff,#FFD700);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 2s linear infinite;margin-bottom:2px;}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.wService{font-size:16px;font-weight:700;color:#fff;margin-bottom:2px;}
.wOrg{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-bottom:16px;}
.wTip{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);border-radius:10px;padding:10px 14px;margin-bottom:18px;font-size:12.5px;color:rgba(255,255,255,.78);line-height:1.55;font-style:italic;}
.wTip span{color:#FFD700;font-weight:700;font-style:normal;}
.wDots{display:flex;justify-content:center;gap:6px;margin-bottom:16px;}
.wDot{width:8px;height:8px;border-radius:50%;background:rgba(255,215,0,.3);animation:dotPulse 1.2s ease-in-out infinite;}
.wDot:nth-child(2){animation-delay:.2s;}.wDot:nth-child(3){animation-delay:.4s;}
@keyframes dotPulse{0%,100%{background:rgba(255,215,0,.3);transform:scale(1);}50%{background:#FFD700;transform:scale(1.4);}}
#cmgStartBtn{background:linear-gradient(45deg,#FFD700,#e6a800);color:#000;border:none;border-radius:14px;padding:15px 0;width:100%;font-size:17px;font-weight:900;cursor:pointer;letter-spacing:.4px;box-shadow:0 6px 24px rgba(255,215,0,.45);transition:transform .15s,box-shadow .15s;animation:ctaPulse 1.8s ease-in-out infinite;}
@keyframes ctaPulse{0%,100%{box-shadow:0 6px 24px rgba(255,215,0,.4);}50%{box-shadow:0 6px 40px rgba(255,215,0,.9);}}
#cmgStartBtn:active{transform:scale(.96);}
.wFooter{margin-top:12px;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:1px;}

/* ══ LIVE STAR SCORE BAR ══ */
#starBar{width:100%;max-width:560px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,215,0,0.25);border-radius:12px;padding:8px 12px;display:none;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:4px;}
#starBar .sb-label{font-size:11px;font-weight:bold;color:rgba(255,215,0,0.7);margin-right:6px;white-space:nowrap;}
.sb-star{font-size:20px;line-height:1;display:inline-block;opacity:0.25;transition:opacity 0.2s;}
.sb-star.earned{opacity:1;animation:starPop 0.45s cubic-bezier(0.175,0.885,0.32,1.6) forwards;}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg);}60%{transform:scale(1.5) rotate(10deg);}100%{transform:scale(1) rotate(0deg);}}
</style>
</head>

{type:"image",svgKey:"prisons_badge",question:"This is the crest of the Ghana Prisons Service. What are the three Rs that form the core mission?",answers:["Reformation, Rehabilitation, Reintegration", "Resist, Reform, Release", "Remand, Retrial, Release", "Restrict, Restrain, Repatriate"],correct:0,explain:"The Ghana Prisons Service mission is the three Rs: Reformation (changing attitudes), Rehabilitation (restoring capability through skills and education), and Reintegration (returning to society as a productive citizen)."},

  {type:"image",svgKey:"handcuffs",question:"These handcuffs represent lawful arrest. Under the 1992 Constitution, what is the maximum time before a person must appear in court?",answers:["24 hours", "48 hours", "72 hours", "One week"],correct:1,explain:"Article 14(3) of Ghana's 1992 Constitution requires that any arrested person not released must appear before a court within 48 hours. Holding someone beyond this without charge is unconstitutional."},

  {type:"image",svgKey:"scales_justice",question:"These scales represent justice. What does presumption of innocence mean?",answers:["Police assume everyone is innocent and cannot arrest anyone", "The accused must prove innocence before trial begins", "Only first-time offenders are presumed innocent", "An accused person is considered innocent until proven guilty beyond"],correct:3,explain:"Article 19 of Ghana's Constitution: every accused person is presumed innocent until proven guilty beyond reasonable doubt. This prevents wrongful punishment and protects citizens."},

  {type:"image",svgKey:"rehab_workshop",question:"This image shows vocational training in prison. Why does the Ghana Prisons Service offer carpentry, tailoring and farming?",answers:["To rehabilitate inmates with skills so they can reintegrate as", "To use inmates as cheap labour for government projects", "To punish inmates with physical labour", "Because prisons need to be self-sufficient"],correct:0,explain:"Vocational training is central to rehabilitation. Inmates who learn carpentry, tailoring, farming or ICT can earn legitimately after release, reducing the likelihood of reoffending."},

  {type:"image",svgKey:"contraband",question:"This image shows items prohibited in prisons. A visitor smuggles a mobile phone to an inmate. What is the consequence?",answers:["A verbal warning only", "Criminal prosecution and possible", "Only a ban from future visits", "The inmate alone is punished"],correct:1,explain:"Smuggling contraband into prison is a criminal offence under the Prisons Act. Both visitor and inmate can be prosecuted. Mobile phones allow criminal networks to operate from inside prison."},

  {type:"image",svgKey:"mob_justice",question:"This image shows a mob attacking a suspect. Why is mob justice illegal and what should be done instead?",answers:["It is legal if the crowd is large enough", "It is only illegal if the suspect dies", "It is illegal — call police on 191 and let the legal", "It is legal for theft but not violent crimes"],correct:2,explain:"Mob justice is assault or murder under Ghana law regardless of guilt. Even a guilty person has the right to a fair trial. Call 191, restrain without violence, and let the courts decide."},

  {type:"image",svgKey:"legal_rights",question:"This poster shows rights when arrested. A person is not told why they are being arrested. What should they do?",answers:["Comply fully and ask nothing", "Wait until the police station before asking", "Pay for a lawyer before asking anything", "Assert their right to be informed of the reason"],correct:3,explain:"Article 14 of Ghana's Constitution guarantees: right to know the reason for arrest, right to remain silent, right to consult a lawyer, and right to appear in court within 48 hours."},

  {type:"image",svgKey:"drug_refuse",question:"This image shows a student refusing drugs. What is the connection between drug use and imprisonment?",answers:["Drug use leads to addiction, which leads to crime", "There is no connection", "Only drug dealers go to prison — users face no consequences", "Drug use only leads to prison if combined with other crimes"],correct:0,explain:"Drug use leads to addiction, which often leads to theft, robbery and dealing to fund the habit. Under Ghana's Narcotic Drugs Act, possession and use of controlled substances can result in imprisonment."},

  {type:"image",svgKey:"community_policing",question:"This image shows a citizen reporting crime to police. How does community reporting help the Prisons Service mission?",answers:["It directly reduces the Prisons Service workload by keeping criminals free", "Early reporting leads to intervention before crime escalates", "Community reporting has no effect on the Prisons Service", "It is only relevant to the Police Service"],correct:1,explain:"Community crime prevention and the Prisons Service are linked. Early reporting leads to intervention before crime escalates, meaning fewer people end up convicted and imprisoned."},

  {type:"image",svgKey:"overcrowding",question:"Ghana's prisons operate at around 270 percent capacity. What is the most serious consequence?",answers:["Inmates receive larger food rations as more is budgeted", "Officers earn more overtime pay", "Rapid spread of diseases, poor sanitation and inability to run rehabilitation", "Overcrowded prisons are actually safer because inmates monitor each other"],correct:2,explain:"Ghana's prisons hold three times their intended population. Consequences: rapid spread of TB and skin infections, severe sanitation problems, reduced food per inmate, and inability to provide education and vocational training."},

  {type:"image",svgKey:"parole_officer",question:"This image shows a parole officer meeting a released prisoner. What are the conditions of parole?",answers:["The parolee has complete freedom with no restrictions", "The parolee must wear an electronic tag at all times", "Conditions only apply for the first month", "Regular reporting, staying within a designated area"],correct:3,explain:"Parole is supervised early release for good behaviour. Conditions include: regular reporting, remaining in a specified area, seeking employment, and not committing any offence. Violating parole means immediate return to prison."},

  {type:"image",svgKey:"prison_gate",question:"This image shows prison gates. Which government ministry has oversight of the Ghana Prisons Service?",answers:["Ministry of Health", "Ministry of Justice", "Ministry of Interior", "Ministry of Defence"],correct:2,explain:"The Ghana Prisons Service operates under the Ministry of Interior, which also oversees the Police Service, Immigration Service and NADMO. The Inspector General of Prisons reports through the Minister of Interior."},

  {type:"image",svgKey:"gang_recruit",question:"This image shows gang recruitment. What is the relationship between gang membership and imprisonment?",answers:["Gang membership does not increase imprisonment risk", "It only leads to prison for organised crimes like drug trafficking", "It is only dangerous in urban areas", "Gang membership significantly increases criminal activity and the probability"],correct:3,explain:"Gang membership dramatically increases criminal activity and likelihood of imprisonment. Gangs normalise illegal behaviour, create pressure to commit crimes, and involve members in robbery, drug dealing and assault."},

  {type:"image",svgKey:"voting_ballot",question:"This ballot box represents civic rights. Do convicted prisoners in Ghana retain voting rights?",answers:["No — convicted prisoners lose voting rights for the", "Yes — all prisoners retain full voting rights", "Yes — but only for local elections", "No — but they can vote by proxy through family"],correct:0,explain:"In Ghana, convicted prisoners lose voting rights for the duration of their sentence. Upon release, all voting rights are restored. Remand prisoners (awaiting trial) technically retain voting rights."},

  {type:"image",svgKey:"court_building",question:"This image shows a court building. What is the purpose of the Juvenile Court in Ghana?",answers:["To try all cases involving anyone under 25", "To handle criminal cases for persons under 18", "To process all minor traffic cases", "To handle only cases where children are victims, not accused"],correct:1,explain:"Ghana's Juvenile Courts handle criminal cases where the accused is under 18. Proceedings are not public, a social welfare officer assesses the child, and sentences focus on rehabilitation. Records are sealed at age 18."},

  {type:"image",svgKey:"remand_sign",question:"This sign shows a Remand Home and Borstal Institute. What is the key difference?",answers:["Remand Homes are for adults awaiting trial; Borstals are for juvenile adults", "Both hold the same category — the names are interchangeable", "Remand Homes hold juveniles awaiting trial", "Remand Homes are private; Borstals are government-run"],correct:2,explain:"A Remand Home holds unconvicted juveniles (under 18) awaiting trial. A Borstal Institution holds convicted juveniles serving sentences focused on education and rehabilitation. Ghana has both in Accra, Kumasi and Sekondi."},

  {type:"text",question:"What does the Ghana Prisons Service motto We Care We Reform mean in practice?",answers:["Officers care about pay and reform buildings when damaged", "Officers must care medically and reform appearance before release", "The government cares about safety by reforming laws governing imprisonment", "The service treats inmates with dignity while actively changing their behaviour and"],correct:3,explain:"The motto reflects the dual mission: caring for the welfare, health and dignity of inmates, and actively reforming their attitudes and skills through education, vocational training, counselling and religious programmes."},

  {type:"text",question:"What are the visiting rights of inmates in Ghana?",answers:["Inmates have the right to receive visits from family and legal representatives", "Inmates have no right to family visits — only earned after 5 years", "Family can only visit on birthdays and Christmas", "Only lawyers can visit — family visits are rarely permitted"],correct:0,explain:"Inmates in Ghana have the right to receive family visits and visits from legal representatives. Visits are subject to scheduled days, visitor searches, and supervised visiting areas. Family bonds during imprisonment significantly reduce reoffending after release."},

  {type:"text",question:"What is the role of the Social Welfare Officer in Ghana's Prisons Service?",answers:["To manage the prison budget and food procurement", "To assist with inmate rehabilitation through counselling", "To enforce discipline and administer punishments", "To manage the prison farm and vocational workshops"],correct:1,explain:"Social Welfare Officers provide counselling, liaise with families, assist with reintegration planning, assess juvenile offenders for the Juvenile Court, and manage welfare needs of vulnerable inmates. They are central to the rehabilitation mission."},

  {type:"text",question:"What is the difference between a prison and a remand home in Ghana?",answers:["There is no difference — both are the same facility with different names", "Prisons are for violent offenders; remand homes are for non-violent offenders", "Prisons hold convicted adult offenders; Remand homes hold juveniles awaiting trial", "Prisons are run by the Prisons Service; remand homes by the Police Service"],correct:2,explain:"Prisons hold convicted adults serving sentences. Remand Homes hold juveniles under 18 awaiting trial who have not yet been convicted. The Juvenile Justice Act requires separation of young offenders from adult criminals."},

  {type:"text",question:"Why is education provided to inmates in Ghanaian prisons?",answers:["To provide cheap teaching labour for community schools", "To satisfy international aid conditions for prison funding", "Because the law requires every adult to complete secondary education", "To reduce idleness, improve literacy and increase chances of legitimate"],correct:3,explain:"Education in prisons reduces dangerous idleness, improves literacy, provides WAEC and vocational qualifications, builds self-esteem, and most critically increases chances of legitimate employment after release. Educated, employed ex-offenders are far less likely to reoffend."},

  {type:"text",question:"What support exists for newly released prisoners in Ghana?",answers:["No support exists — the person manages entirely alone", "The Ghana Prisons Service has reintegration programmes and NGOs provide skills training and employment support", "The government automatically provides housing and a monthly stipend", "Released prisoners are guaranteed government employment"],correct:0,explain:"Reintegration is a major challenge. The Prisons Service has reintegration programmes, and various NGOs provide skills training, counselling and employment support for ex-offenders. Stigma in the job market remains a significant barrier."},

  {type:"text",question:"What is the Prisons Service Act and what does it govern?",answers:["An international treaty on treatment of prisoners", "The law that establishes the Ghana Prisons Service", "A religious code of conduct for officers and inmates", "A military regulation because officers wear uniform"],correct:1,explain:"The Prisons Service Act (Act 101, amended by Act 490) establishes the Ghana Prisons Service, defines officer powers, sets regulations for managing prisons, and specifies treatment and rights of inmates."},

  {type:"text",question:"Should you carry a message to a prison on someone else's behalf?",answers:["Yes if the person is a trusted family member", "Yes, accept only if it appears harmless after inspection", "No — carrying unauthorised messages risks criminal charges and could", "Accept and hand it to a prison officer not the inmate"],correct:2,explain:"Carrying items or messages to prison for others is potentially being used as a criminal accomplice. Contraband is often concealed in innocent-looking items. Refuse firmly and report any pressure to police on 191."},

  {type:"text",question:"Is corporal punishment allowed in Ghana's prisons?",answers:["Yes — physical exercise as punishment is mandatory", "Yes — solitary confinement up to 30 days is allowed", "Yes — community service as physical punishment is allowed", "No — physical beating is prohibited under Ghana's Constitution and the"],correct:3,explain:"Corporal punishment (beating as punishment) is prohibited under Ghana's Constitution and the UN Minimum Standards Rules for Treatment of Prisoners. Any officer who beats an inmate can face criminal charges."},

  {type:"text",question:"A prison officer demands payment from an inmate's family for better conditions. What should the family do?",answers:["Refuse and report to Prisons Service headquarters or CHRAJ", "Negotiate a lower amount", "Pay — it is the only way to ensure good treatment", "Accept it as normal practice"],correct:0,explain:"Demanding money for better treatment is corruption and abuse of office — a criminal offence. Report to Prisons Service headquarters, CHRAJ or the Police Service with the officer's name, rank and incident details."},

  {type:"text",question:"Why are inmates separated by category in Ghana's prisons?",answers:["Purely for administrative convenience", "To prevent remand prisoners being influenced by convicted criminals", "Because different crime types require different buildings", "To make counting inmates easier"],correct:1,explain:"Separation by category is a fundamental principle: remand prisoners must not be housed with convicted criminals, juveniles must be protected from adult criminals, and gender separation provides safety and appropriate care. These are required by Ghana's Prisons Act and international standards."},

  {type:"text",question:"What is a Borstal institution in Ghana?",answers:["A military training school for children of officers", "A maximum security prison for the most dangerous adults", "A reformatory for convicted young offenders under 18 focusing on", "A detention centre for undocumented immigrants"],correct:2,explain:"Borstal Institutions hold convicted young offenders under 18. The focus is entirely on reformation: education, vocational training, counselling and structured activities. Ghana has Borstals in Accra, Kumasi and Sekondi-Takoradi."},

  {type:"text",question:"What should the public do if they spot an escaped prisoner?",answers:["Attempt to apprehend and return them personally", "Post on social media with their photo", "Ignore it — escaped prisoners are the prison's responsibility", "Call police on 191 immediately with description and location"],correct:3,explain:"Call 191 immediately. Provide description, location and direction of movement. Do NOT approach an escaped prisoner — they may be desperate and dangerous. Do not share unverified social media information that could compromise police operations."},

  {type:"text",question:"What is the purpose of the Prison Chaplaincy programme?",answers:["To provide spiritual care, counselling and moral guidance to inmates of all faiths", "To convert all inmates to Christianity", "To perform ceremonies exclusively for officers", "To ensure prisoners attend services as mandatory part of their sentence"],correct:0,explain:"The Prison Chaplaincy (Christian, Muslim and traditional) provides spiritual care, counselling, emotional support and moral guidance. Religious programmes have been shown to significantly reduce reoffending among inmates who engage with them."},

  {type:"text",question:"Where will a 15-year-old arrested for shoplifting have their case heard?",answers:["Adult court — same as any criminal", "Juvenile Court — focused on rehabilitation and", "Police station — settled without going to court", "Family court — parents pay compensation"],correct:1,explain:"Under the Juvenile Justice Act 2003, all criminal cases for persons under 18 are heard in Juvenile Court. Proceedings are not public, a social welfare officer assesses the child's background, and the court focuses on rehabilitation. Juvenile records are sealed at 18."},

  {type:"text",question:"What does life imprisonment mean in Ghana?",answers:["The prisoner serves exactly 25 years then is released", "Life imprisonment shortens to 15 years for good behaviour in all cases", "The prisoner remains in custody for the rest of their natural life with no", "The prisoner must work on the prison farm for life"],correct:2,explain:"Life imprisonment in Ghana means custody for the rest of natural life. They may apply for clemency through the Presidential Prerogative of Mercy under Article 72 of the Constitution, but there is no automatic release."},

  {type:"text",question:"Why is the prison system described as punitive, deterrent and rehabilitative simultaneously?",answers:["Punishment and deterrence are by courts; rehabilitation is left to NGOs", "It punishes to satisfy victims, deters future crime, and rehabilitates for release", "The three functions conflict and cannot be achieved simultaneously", "Only rehabilitation matters — punishment and deterrence are secondary"],correct:1,explain:"Ghana's Prisons Service serves three overlapping objectives: Punitive (loss of liberty is the punishment), Deterrent (imprisonment discourages crime in the wider population), and Rehabilitative (time in prison is used to develop skills and prepare for productive life)."},

  {type:"text",question:"What is the role of the Ghana Prisons Service in executing court orders?",answers:["The Prisons Service can modify sentences it disagrees with", "It can refuse prisoners if prisons are full beyond capacity", "It must receive every person committed by a court and execute orders including", "Officers can release prisoners early using their own discretion"],correct:2,explain:"The Prisons Service executes court orders: receiving persons committed to custody, holding them for the period ordered, releasing them when the order ends or conditions are met, and facilitating court appearances. Only courts can modify sentences — not the Prisons Service."},

  {type:"text",question:"What is the Committee of Mercy and what is its function?",answers:["It supervises disciplinary action against prison officers", "It selects inmates for the parole programme", "It mediates between inmates and prison management", "It advises the President on the Prerogative of Mercy"],correct:3,explain:"The Committee of Mercy advises the President on exercising the Prerogative of Mercy under Article 72 of the 1992 Constitution. The President can grant pardons, remit sentences or commute punishments on its advice. This is distinct from parole and appeals."},

  {type:"text",question:"What is an open prison or prison farm in Ghana?",answers:["A lower-security facility where low-risk inmates work in agriculture under", "A prison with no walls — inmates sleep at home and report daily", "An online programme where convicted persons check in by video", "A temporary holding facility at court premises"],correct:0,explain:"Open prisons (prison farms) house low-risk inmates who work in agriculture and light industry with more freedom of movement. Ghana has prison farms where inmates grow food — feeding the prison population and teaching agricultural skills. Inmates at open facilities are near the end of sentences with good behaviour."},

  {type:"text",question:"How does peer pressure lead young people into crime and prison in Ghana?",answers:["Peer pressure has no scientific link to criminal behaviour", "Friends who engage in crime normalise illegal activity", "Peer pressure only affects children under 10", "Peer pressure only factors in drug crimes"],correct:1,explain:"Research shows peer pressure is a major pathway to crime. When friends engage in theft, drugs or violence, there is intense social pressure to participate for acceptance. Prison officer surveys in Ghana found peer pressure was cited by the majority of first-time offenders as a contributing factor."},

  {type:"text",question:"How does good behaviour affect a prisoner's sentence in Ghana?",answers:["Inmates earn money held until release for positive behaviour", "All inmates automatically receive good behaviour credit after 6 months", "Inmates who follow rules and engage in rehabilitation may become eligible for early", "Good behaviour can reduce a sentence by one week maximum"],correct:2,explain:"Inmates who demonstrate consistent good conduct and actively participate in rehabilitation programmes become eligible for parole consideration or transfer to lower security facilities. Good behaviour credit is a powerful incentive for positive conduct."},

  {type:"text",question:"What does a suspended sentence mean in Ghana?",answers:["The person is imprisoned and the sentence pauses halfway", "The person serves the sentence in 6-month instalments", "The sentence is permanently cancelled with no criminal record", "The person does not go to prison provided they do not reoffend during the"],correct:3,explain:"A suspended sentence means the prison term is not immediately served. The person is released but must not commit any offence during the suspension period (typically 1–3 years). Reoffending activates the full original term on top of any new sentence. Used for first-time, non-violent offenders."},

  {type:"text",question:"Why is it important for communities not to stigmatise released prisoners?",answers:["Stigma prevents ex-offenders getting jobs, pushing them back into crime", "Communities should stigmatise them to deter others from crime", "Stigmatising is acceptable and realistic", "Support only matters for those wrongly convicted"],correct:0,explain:"Stigma against released prisoners is one of the biggest drivers of reoffending in Ghana. When ex-offenders cannot find employment or community acceptance, crime becomes the only option. Ex-offenders with strong community and family support have dramatically lower reoffending rates."},

  {type:"text",question:"What is Nsawam Medium Security Prison known for in Ghana?",answers:["It is the only female prison in Ghana", "It is Ghana's largest and most historically", "It is a women-only facility", "It holds only death row inmates"],correct:1,explain:"Nsawam Medium Security Prison is one of Ghana's oldest and largest prisons. It significantly exceeds its capacity and houses a large proportion of Ghana's total prison population, including remand prisoners. It has been the subject of multiple reform initiatives."},

  {type:"text",question:"What is the legal definition of assault and how can students avoid being charged?",answers:["Assault means killing someone — only in extreme bullying cases", "Assault only applies to adults — no student under 18 can be charged", "Assault means intentionally causing fear of immediate violence or actual", "Assault means stealing property"],correct:2,explain:"Under Ghana's Criminal Offences Act, assault involves threatening immediate unlawful violence or causing unlawful physical harm. Students can be charged regardless of age (handled in Juvenile Court). Avoid physical fighting, threatening behaviour and group attacks. Resolve conflicts by walking away or calling 191."},

  {type:"text",question:"What role do NGOs play in supporting the Ghana Prisons Service?",answers:["NGOs have no role — prisons are strictly government institutions", "NGOs only provide religious services", "NGOs run prisons as private contractors on behalf of government", "NGOs provide supplementary education, skills training, medical support"],correct:3,explain:"NGOs play a vital supplementary role: skills training workshops, adult literacy, legal aid, medical and mental health support, reintegration programmes for released prisoners, and advocacy for humane prison conditions. CHRAJ, Legal Aid Commission, prison fellowship groups and international NGOs all work within Ghana's prison system."},

  {type:"text",question:"Why is prevention better than imprisonment as a justice strategy?",answers:["Prevention stops crimes before they happen and is always better than", "Because imprisonment is too expensive for Ghana", "Because Ghana's prisons are full and cannot take more inmates", "Prevention only works for minor crimes"],correct:0,explain:"Crime prevention investment returns far greater social and economic benefits than imprisonment. Investment in education, youth employment, community programmes, early intervention and family support addresses root causes of crime. The Prisons Service actively participates in community outreach because prevention is cheaper and more effective than incarceration."},

  {type:"text",question:"When can a prison officer legally use physical force?",answers:["At any time to maintain discipline", "Only in strictly defined circumstances: prevent escape", "Yes, whenever an inmate is disrespectful", "No — no physical force under any circumstances"],correct:1,explain:"Prison officers may use proportionate, necessary force only in specific circumstances: preventing an escape, protecting themselves or others from imminent violence, or preventing serious self-harm. Excessive force is a disciplinary and criminal offence. Officers who abuse this power face prosecution."},

  {type:"text",question:"What is the significance of International Day Against Drug Abuse on 26 June for the Prisons Service?",answers:["The Prisons Service releases all drug offenders as a humanitarian gesture", "It is an internal prison holiday with no activities", "It raises awareness about the connection between drug abuse and crime", "A day for mass drug testing of all officers"],correct:2,explain:"Drug-related offences account for a substantial portion of inmates in Ghana. The Narcotic Control Commission works with the Prisons Service on drug rehabilitation programmes. June 26 is used for public education about the drug-to-prison pipeline."},

  {type:"text",question:"What is solitary confinement and what limits apply in Ghana's prisons?",answers:["Complete isolation as a standard daily routine", "A medical procedure for infectious disease", "A permanent housing arrangement for maximum-security inmates", "Temporary isolation as a last-resort disciplinary measure"],correct:3,explain:"Solitary confinement is temporary isolation used as a last resort for discipline. It is strictly regulated: limits on duration, mental health monitoring required, and it cannot constitute cruel or inhuman treatment. The UN Mandela Rules limit it to 15 consecutive days maximum."},

  {type:"text",question:"Why does youth unemployment drive crime rates in Ghana?",answers:["Youth unemployment removes legitimate income, increases idle time", "Unemployment and crime are not connected", "Only laziness drives crime — any willing person can find work", "Crime rates depend entirely on police presence"],correct:0,explain:"Economic factors strongly predict crime. Youth unemployment removes legitimate income, creates unstructured time, generates hopelessness, and makes gang recruitment more appealing. Ghana's crime prevention strategy includes investment in youth employment and skills training as direct crime reduction interventions."},

  {type:"text",question:"What is the Ghana Prisons Service Farm Programme?",answers:["A scheme allowing businesses to lease prison land commercially", "A prison-run agricultural programme where inmates grow food", "A decorative programme for planting flowers around prisons", "A government scheme to grow cash crops for export using prison labour"],correct:1,explain:"Prison farms are a core rehabilitation programme. Inmates grow vegetables, maize and other crops supplementing prison food supply and teaching practical agricultural skills. Released inmates with farming knowledge can generate income through agriculture — a major employment sector in Ghana."},

  {type:"text",question:"What is the difference between a fine and imprisonment as criminal sentences?",answers:["There is no difference — courts impose both simultaneously", "Fines are only for traffic offences; imprisonment only for violent crimes", "A fine is a monetary penalty; imprisonment means physical confinement", "Fines are imposed by police; imprisonment only by High Courts"],correct:2,explain:"A fine is a financial penalty paid to the court — the offender is not imprisoned. Imprisonment involves confinement in a Prisons Service facility. Courts consider the offence severity, circumstances and criminal history. Some offences carry mandatory imprisonment; others allow the court to choose fine, imprisonment or both."},

  {type:"text",question:"Can a convicted person in Ghana become a lawyer or doctor after release?",answers:["No — conviction permanently bars all professional careers", "Only government jobs are restricted — private sector has no restrictions", "Yes — there are no employment restrictions whatsoever after release", "It depends on the profession and offence — some professional bodies may consider certain"],correct:3,explain:"Criminal conviction can affect professional careers depending on the profession and offence. The Ghana Bar Association, Medical and Dental Council and other bodies have rules on fitness to practise that may consider criminal records. Not all professions are permanently closed — severity of offence, time elapsed and evidence of rehabilitation are considered. Juvenile records are sealed at 18."},

  {type:"text",question:"What does community service as a sentence mean in Ghana?",answers:["Unpaid work performed for the community as an alternative to", "The convicted person must move to a different community", "The convicted person pays for community projects", "Community members serve as part-time prison officers"],correct:0,explain:"Community service orders allow courts to sentence offenders to unpaid work in the community rather than imprisonment. Used for minor, non-violent and first-time offences. It keeps the offender in work and family life, avoids the criminalising effects of prison, and costs the state less."},

  {type:"text",question:"How does the Ghana Prisons Service handle inmates with mental health conditions?",answers:["Mentally ill inmates are immediately transferred to police custody", "Medical officers provide assessment and treatment", "Mental health is treated exactly as physical illness — no special provisions", "Mentally ill inmates are released immediately"],correct:1,explain:"The Prisons Service has medical staff who provide initial mental health assessment and care. Inmates with serious mental illness can be referred to Accra Psychiatric Hospital. Courts can also order psychiatric treatment instead of standard imprisonment for offenders with mental illness."},

  {type:"text",question:"What does habeas corpus mean and how does it protect citizens?",answers:["A court order requiring witnesses to testify", "A police right to hold suspects for investigation", "A legal application to a court demanding a detained person be", "A Latin term meaning the person has confessed"],correct:2,explain:"Habeas corpus means produce the body. A lawyer or family member can apply to the High Court demanding that the detaining authority produce the prisoner and justify why the detention is lawful. If the court finds it unlawful, it orders immediate release. This prevents imprisonment without due process."},

  {type:"text",question:"What is the purpose of ex-prisoner outreach programmes in schools?",answers:["To recruit young people for future criminal activities", "To fulfil a legal requirement for ex-prisoners to perform community service", "To provide prison officers with extra income from speaking fees", "To deter young people from crime by showing the real consequences of imprisonment"],correct:3,explain:"Ex-offender outreach in schools is a powerful deterrent. Hearing a genuine personal account of what prison is really like — loss of freedom, family separation, wasted years, stigma — is far more impactful than statistics. The Ghana Prisons Service and NGOs run such programmes to help young people understand the real cost of criminal choices."},

  {type:"text",question:"What is Ankaful Prison known for in Ghana?",answers:["It is Ghana's only maximum security prison holding the country's", "It is the only female prison in Ghana", "It is the oldest prison in Ghana built in colonial times", "It holds only drug offenders"],correct:0,explain:"Ankaful Maximum Security Prison in the Central Region is Ghana's designated maximum security facility. It holds the most high-risk convicted offenders — those who committed the most serious crimes or pose the greatest escape risk. It has higher staffing levels and more secure infrastructure than standard prisons."},

  {type:"text",question:"What additional protections do female prisoners have in Ghana?",answers:["Female prisoners have no additional rights beyond male prisoners", "Female prisoners must be supervised by female officers only, receive maternal care if pregnant", "Female prisoners automatically receive reduced sentences for the same offence", "Female prisoners must be released immediately if they become pregnant"],correct:1,explain:"Female inmates have specific protections: held in separate facilities from males, supervised only by female officers, receive appropriate healthcare including prenatal and postnatal care, and may keep infants with them in dedicated mother-and-baby units. Ghana has female prisons in Accra and other locations."},

  {type:"text",question:"Does sentence length effectively deter crime according to research?",answers:["Yes — longer sentences are proven to be the most effective deterrent in every country", "Long sentences have been proven to be the single most effective deterrent everywhere", "The certainty of getting caught deters crime more effectively than sentence length", "Long sentences only fail because prisons are too comfortable"],correct:2,explain:"Criminological research consistently shows certainty of detection deters crime more than sentence length. Criminals rarely calculate sentence length before offending. Improving police presence, community reporting and detection rates reduces crime more effectively than mandatory minimum sentences."},

  {type:"text",question:"What is the Ghana Prison Officers Association?",answers:["The official body that decides sentences for criminals on behalf of courts", "An international organisation that inspects Ghana's prisons", "A government body that approves prison construction projects", "A professional association representing the welfare"],correct:3,explain:"The Ghana Prison Officers Association (GPOA) is a professional body representing prison officers. It advocates for improved working conditions, fair pay, training and welfare of officers. Well-supported, well-trained prison officers are essential for effective rehabilitation programmes."},

  {type:"text",question:"What formal mechanism exists for inmates to raise grievances in Ghana?",answers:["Inmates can use the prison's internal complaint system", "Prisoners have no right to complain", "Inmates must wait until release to raise any complaints", "Only family members can raise complaints on behalf of inmates"],correct:0,explain:"Inmates have the right to raise grievances through: the prison's internal system, their lawyers, petitioning courts (habeas corpus for unlawful detention), CHRAJ which investigates human rights violations, and parliamentary oversight. Prison Chaplains and Social Welfare Officers also serve as confidential channels."},

  {type:"text",question:"What is restorative justice and is it used in Ghana?",answers:["Criminals restore stolen property directly to victims as their entire sentence", "An approach bringing victims, offenders and communities together to repair harm", "A programme where prisoners restore colonial buildings as community service", "A system where criminals pay financial restoration to government"],correct:1,explain:"Restorative justice focuses on repairing harm to victims and communities rather than solely punishing offenders. In Ghana, elements appear in victim-offender mediation for minor disputes, traditional community mediation, and the Juvenile Justice Act's emphasis on reintegration."},

  {type:"text",question:"What happens if you are asked by someone to carry a package to a prison?",answers:["Accept if it is a trusted family member making the request", "Accept only if the item appears harmless after inspection", "Refuse firmly — carrying any unauthorised item risks criminal charges and", "Accept and hand it to a prison officer rather than the inmate"],correct:2,explain:"Anyone asking you to carry items to a prison may be using you as an unwitting criminal accomplice. Contraband is often hidden in innocent-looking items. You face potential arrest and criminal charges. Refuse firmly and report any pressure to police on 191."},

  {type:"text",question:"What is a conditional discharge in Ghana's criminal sentencing?",answers:["The court discharges the accused before evidence is heard", "Police discharge a suspect if they pay a fee at the station", "An automatic discharge after serving half a sentence", "The court finds the person guilty but releases them without punishment"],correct:3,explain:"A conditional discharge finds the accused guilty but imposes no immediate punishment. The person is released on condition they do not commit any offence during a specified period (usually 1–3 years). If they comply, no further action is taken. Used for minor, first-time offences."},

  {type:"text",question:"How does organised crime operating from inside prisons undermine Ghana's justice system?",answers:["Criminal networks using contraband phones can coordinate robberies, fraud", "Crime in prisons only affects other inmates and has no external impact", "Organised prison crime is entirely prevented by security measures", "It only occurs in maximum security facilities"],correct:0,explain:"Contraband mobile phones allow crime bosses to direct operations from inside prison — documented in Ghana including robbery, fraud, drug networks and witness intimidation. This is why mobile phones are treated as serious contraband requiring criminal prosecution of smugglers."},

  {type:"text",question:"What is the purpose of the prison classification system in Ghana?",answers:["To classify inmates by ethnicity for communication management", "To assess each inmate's risk and needs so they are placed in the appropriate", "To rank inmates by crime severity for public reporting", "To classify previous crimes for statistical research only"],correct:1,explain:"Classification assesses each inmate on arrival: their crime, criminal history, behaviour risk, mental health, educational level, vocational needs and security risk. This determines which facility and which rehabilitation programmes they need, ensuring dangerous offenders are secured while low-risk inmates receive focused rehabilitation."},

  {type:"text",question:"What legal protection does a juvenile's criminal record have in Ghana?",answers:["Juvenile records are permanent and accessible to employers for 10 years after turning 18", "Records are only sealed if the person committed one offence and served their full sentence", "Juvenile records are sealed at age 18 — employers and educational institutions cannot access them", "Records are sealed but can be reopened at any time by police"],correct:2,explain:"Under Ghana's Juvenile Justice Act 2003, juvenile criminal records are sealed when the person turns 18. Employers, universities and other institutions cannot access the record, giving a genuine fresh start as an adult. This recognises that young people can change and should not be permanently marked by youthful mistakes."},

  {type:"text",question:"What is the UN Mandela Rules and how do they apply to Ghana?",answers:["Rules that only apply to UN member states during wartime", "A UN trade agreement funding prison construction in developing countries", "Rules mandating the death penalty for violent crimes in all UN member states", "International standards for humane treatment of prisoners that Ghana has adopted"],correct:3,explain:"The Nelson Mandela Rules (revised UN Minimum Rules for Treatment of Prisoners, 2015) are the international gold standard for humane incarceration. Ghana is committed to these standards as a UN member state. They are the benchmark used by CHRAJ and international monitoring bodies when assessing Ghana's prison conditions."},

  {type:"text",question:"What is the significance of Human Rights Day on 10 December for the Ghana Prisons Service?",answers:["It is International Human Rights Day — a reminder that convicted prisoners", "It is the day the Prisons Service was officially established", "It is the day Ghana signed the UN Convention Against Torture", "It has no special significance for the Prisons Service"],correct:0,explain:"10 December, Human Rights Day, marks the Universal Declaration of Human Rights in 1948. For the Ghana Prisons Service, it is a reminder that human rights do not end at the prison gate. Inmates retain dignity, freedom from torture, medical care, religious practice and legal representation. The Prisons Service uses it for public education and officer training."},

  {type:"text",question:"What skills best prepare a young Ghanaian for the Ghana Prisons Service?",answers:["Experience in agriculture only", "Physical fitness, emotional resilience, communication skills", "Ability to be physically intimidating to control inmates", "Fluency in foreign languages and computer programming"],correct:1,explain:"Effective prison officers need: physical fitness and safety training, emotional resilience for challenging situations, communication skills for de-escalation, knowledge of law and human rights, and genuine commitment to rehabilitation. The Prisons Staff Training College trains recruits in all these areas."},

  {type:"text",question:"Why does the Ghana Prisons Service participate in agricultural shows?",answers:["To sell goods and generate profit for the Prisons Service budget", "To recruit new staff from farming communities", "To showcase inmate skills, demonstrate rehabilitation success, build public confidence", "To comply with a government requirement for agencies to attend agricultural events"],correct:2,explain:"The Ghana Prisons Service participates in agricultural shows to showcase inmate-made products — furniture, clothing, crafts, farm produce. This demonstrates rehabilitation success, generates some income, builds positive public perception, and creates a market for inmate-made goods supporting the vocational training mission."},

  {type:"text",question:"Do prisoners in Ghana deserve adequate food and medical care?",answers:["No — prisoners forfeited basic needs when they committed crimes", "Only for violent offenders", "Only remand prisoners deserve adequate care — convicted criminals deserve poor conditions", "Yes — Ghana's Constitution and international standards guarantee basic rights including adequate food"],correct:3,explain:"Every person deprived of liberty retains fundamental human rights: right to life, freedom from torture, access to adequate food, water, medical care and basic dignity. These are protected by Ghana's Constitution and international law. Depriving prisoners of basic needs is both illegal and counterproductive — maltreated prisoners are more likely to reoffend."},

  {type:"text",question:"What is the purpose of Ghana's prison classification system?",answers:["To assess each inmate's risk and needs for appropriate", "To sort inmates by the language they speak", "To rank inmates publicly by crime severity", "For statistical research purposes only"],correct:0,explain:"On arrival, each inmate is classified by: crime committed, criminal history, behaviour risk, mental health, educational level, vocational needs and security risk. This determines the right facility, security level and rehabilitation programme mix. Good classification maximises safety while ensuring appropriate rehabilitation for each individual."},

  {type:"text",question:"As a Ghanaian student, what is your civic responsibility regarding the Ghana Prisons Service?",answers:["Students have no civic responsibility — it is entirely a government matter", "Stay crime-free, support rehabilitation by not stigmatising ex-offenders", "Visit prisons regularly and provide direct support to inmates", "The only responsibility is to pay taxes that fund the Prisons Service"],correct:1,explain:"Every citizen has a role: staying law-abiding, not stigmatising ex-offenders (giving them the support they need to succeed), reporting crime to protect communities, and being an informed citizen who advocates for reform. The Prisons Service serves all of society — its success depends on community understanding and support."},

  {type:"text",question:"What is a warrant of commitment versus a remand order?",answers:["They are identical documents with different names", "A warrant of commitment is issued by police; a remand order by the Attorney General", "A warrant of commitment sends a convicted person to prison", "Warrants are for civil debt; remand orders for criminal cases"],correct:2,explain:"A warrant of commitment is a court document committing a convicted person to prison to serve their sentence. A remand order commits an unconvicted person to custody while awaiting trial. Both are court orders the Prisons Service must comply with."},

  {type:"text",question:"What is a penitentiary and what philosophy does it represent?",answers:["A high-security prison only for death row inmates", "A colonial-era term with no relevance to modern prisons", "A technical term for the medical wing of a prison", "From the Latin for penitence — early prisons were designed to make"],correct:3,explain:"The word penitentiary comes from penitence — genuine remorse and moral reform. Early prison reformers believed that solitude and reflection would lead criminals to change. Modern corrections has evolved to include education and skills training, but the idea of rehabilitation through genuine transformation remains central."},

  {type:"text",question:"What does ex post facto law mean and why does the Constitution prohibit it?",answers:["A law criminalising or increasing punishment for an action that was not", "A law increasing prison sentences annually for non-cooperation", "A special court order for family prison visits", "A law applying only to former government officials"],correct:0,explain:"An ex post facto law makes something a crime retroactively or increases punishment for a past act. Article 19(5) of Ghana's Constitution prohibits such laws — a person cannot be convicted of something that was not a crime when they did it. This prevents the government from retroactively criminalising political opponents."},

  {type:"text",question:"What is Ghana's open prison farm programme?",answers:["A scheme where wealthy farmers lease prison land", "A programme where low-risk inmates work in agriculture under supervision", "A decorative programme planting flowers around prison buildings", "A cash crop export scheme using prison labour"],correct:1,explain:"Prison farms house low-risk inmates who work in agriculture with more freedom of movement than closed prisons. Inmates grow food supplementing the prison diet and learn agricultural skills. Ghana has prison farms where inmates near the end of sentences with good behaviour records participate."},

  {type:"text",question:"How does organised crime from inside prisons impact the wider community?",answers:["It only affects other inmates and has no external impact", "It is completely prevented by security measures", "Criminal networks using contraband phones can coordinate robberies", "It only occurs in maximum security facilities"],correct:2,explain:"Documented cases in Ghana show crime bosses directing operations from inside prison via contraband phones — including robbery coordination, drug network management and witness intimidation. This is why mobile phones are treated as serious contraband requiring criminal prosecution of smugglers."},

  {type:"text",question:"What is the Inspector General of Prisons role?",answers:["A judge who reviews all prison sentences for fairness", "The officer in charge of a single prison", "A UN inspector who visits all prisons annually", "The senior-most officer of the Ghana Prisons Service overseeing"],correct:3,explain:"The Inspector General of Prisons heads the Ghana Prisons Service, responsible for overall management of all prisons, supervision of officers, implementation of rehabilitation programmes, policy development and accountability to the Minister of Interior. The IGP reports to Parliament through the Minister."},

  {type:"text",question:"What is a victim impact statement in Ghana's justice system?",answers:["A formal statement by the crime victim describing the physical", "A witness statement describing what they saw — only in civil cases", "A statement from a prison officer about inmate behaviour", "A medical certificate describing physical injuries"],correct:0,explain:"A victim impact statement allows crime victims to formally describe to the court how the crime affected them — physically, psychematically and financially. Courts can consider these in sentencing. Ghana's criminal justice system increasingly recognises the importance of victims' voices alongside the rights of the accused."},

  {type:"text",question:"Why does Ghana's Prisons Service consider family involvement in rehabilitation important?",answers:["Family involvement has no proven benefit and is discouraged", "Strong family bonds during imprisonment and active family support on", "Family involvement is only important for juvenile inmates", "Family visits are only a reward for good behaviour"],correct:1,explain:"Inmates who maintain strong family bonds during imprisonment are significantly less likely to reoffend after release. Families provide: emotional support during imprisonment, housing and financial support on release, social accountability and motivation to change, and connections to legitimate employment networks. This is why family visits are a right, not merely a privilege."},

  {type:"text",question:"Why is it important to report suspicious behaviour even when unsure?",answers:["Because the law requires citizens to report all suspicious activity or face a fine", "Reporting creates danger for the person who reports — it is safer to stay silent", "Early reporting prevents crimes from escalating, protects potential victims", "Only adults over 21 are allowed to report crime to police in Ghana"],correct:2,explain:"Citizens of all ages who report suspicious behaviour potentially save lives. Early reporting: prevents crimes, protects innocent people, gives police intelligence, and can stop a young person from making a mistake that leads to prison. Report anonymously to 191. Staying silent makes you complicit in the harm that follows."},

  {type:"text",question:"What is deterrence theory and what are its limitations?",answers:["Deterrence means preventing all crime permanently — prisons make crime impossible", "Deterrence is the only valid purpose of imprisonment", "Deterrence only works on previously imprisoned people", "Deterrence makes potential criminals fearful of consequences"],correct:3,explain:"Deterrence theory holds that people avoid crime if punishment is known, certain and severe. However, research shows limitations: many crimes are impulsive and not rationally calculated, many offenders do not expect to be caught, and addiction overrides rational decision-making. Certainty of detection (good policing) deters crime more than severity of punishment."},

  {type:"text",question:"Can prison-made goods be sold to the public in Ghana?",answers:["Yes — the Prisons Service sells products from prison workshops to generate income", "No — prison products can only be used within the prison", "No — using prison labour commercially is illegal under Ghana's labour laws", "Yes — but every item must be labelled as made by a convicted criminal"],correct:0,explain:"The Ghana Prisons Service operates commercial workshops selling furniture, clothing, crafts and other products to government agencies and the public. Income supports vocational training programmes and supplements the prison budget. Purchasing prison-made products directly supports inmate rehabilitation."},

  {type:"text",question:"Why should you note a prison officer's service number when reporting misconduct?",answers:["Service numbers are only used internally for payroll — they have no public significance", "The service number uniquely identifies the officer — noting it when reporting misconduct ensures", "Service numbers are classified information not available to the public", "Service numbers only matter for officers above Superintendent rank"],correct:1,explain:"Every Ghana Prisons Service officer has a unique service number displayed on their uniform. When reporting misconduct, corruption or excessive force, noting the service number, name, rank, date, time and location makes an effective complaint possible. Without identifying information, investigations are difficult. Citizens have the right to ask for an officer's name and service number."},

  {type:"text",question:"What is the difference between justice and revenge in Ghana's criminal justice system?",answers:["Justice and revenge are the same — imprisonment is formalised revenge by the state", "Revenge is acceptable when the crime was particularly serious", "Justice involves proportionate lawful consequences by an impartial court aimed at", "Justice in Ghana only refers to financial compensation"],correct:2,explain:"The criminal justice system exists to replace the chaos of personal revenge with structured, proportionate, impartial justice. Revenge is personal, potentially disproportionate, and creates cycles of violence. Justice involves: impartial court, evidence-based guilt determination, proportionate sentence, rehabilitation opportunity and legal protection for all parties."},

  {type:"text",question:"What is Ghana's approach to HIV/AIDS among the prison population?",answers:["HIV-positive inmates are immediately released to prevent spreading the virus", "The Prisons Service does not address HIV/AIDS — it is purely a medical hospital matter", "HIV-positive inmates are held in completely separate facilities with no contact", "The Prisons Service works with the Ghana AIDS Commission and NGOs to provide testing"],correct:3,explain:"HIV/AIDS disproportionately affects prison populations worldwide. Ghana's Prisons Service works with the Ghana AIDS Commission and health NGOs to provide voluntary HIV testing, antiretroviral treatment to positive inmates, and prevention education. Treating HIV in prisons protects inmates, officers and communities when inmates are released."},

  {type:"text",question:"What does prison reform advocacy argue in Ghana?",answers:["That investment in rehabilitation, alternatives to incarceration for minor", "That all criminals should receive life sentences", "That Ghana should abolish all prisons immediately", "That only international funding can fix Ghana's prison problems"],correct:0,explain:"Prison reform advocates in Ghana argue for: shorter sentences for non-violent offences, expanded community service and diversion programmes, greater investment in rehabilitation, addressing overcrowding, improving prison conditions to meet international standards, and tackling root causes of crime through education and economic opportunity."},

  {type:"text",question:"What is the Prisons Staff Training College and what does it do?",answers:["A university offering degrees in criminology to the general public", "The institution that trains all new Ghana Prisons Service recruits in security, law", "A colonial-era building converted into a museum", "A training centre only for senior officers above the rank of Superintendent"],correct:1,explain:"The Prisons Staff Training College in Accra trains all recruits entering the Ghana Prisons Service. Training covers: security procedures, Ghanaian law, human rights obligations, rehabilitation theory and practice, conflict de-escalation, inmate welfare management and professional standards. Regular in-service training keeps existing officers updated."},

  {type:"text",question:"Why does research show community-based rehabilitation often outperforms imprisonment for minor offenders?",answers:["Because prisons are too expensive — cost is the only reason", "Community rehabilitation is not effective — prison always produces better outcomes", "Community rehabilitation keeps family bonds intact, avoids the criminalising effect of prison", "Community rehabilitation only works for juvenile offenders, not adults"],correct:2,explain:"Evidence across multiple countries shows that for non-violent, minor offenders, community-based rehabilitation (community service, probation, counselling, skills training) produces better reoffending outcomes than imprisonment. Prison can expose minor offenders to more serious criminals, break family and employment ties, and create a stigma that itself drives reoffending."},

  {type:"text",question:"What is a legitimate reason for prison transfers in Ghana?",answers:["Transfers are random to prevent inmates becoming comfortable", "Automatic transfer every 2 years for all inmates", "Transfers happen only when inmates pay through bribery", "Managing security risks, addressing overcrowding"],correct:3,explain:"Legitimate prison transfers: managing security threats (moving gang members away from associates), reducing overcrowding in specific facilities, giving access to specialist programmes not available locally, placing inmates closer to family for rehabilitation support, and protecting vulnerable inmates from threats. Transfers require proper authorisation."},

  {type:"text",question:"What does Ghana's criminal justice system aim to balance in sentencing?",answers:["Sentencing aims to balance: punishing the offender proportionately", "The system only aims to punish as severely as possible", "Sentencing is entirely about revenge for the victim", "Only the victim's wishes determine the sentence in Ghana's courts"],correct:0,explain:"Ghana's sentencing framework attempts to balance: punishment proportionate to the crime, general deterrence of future offenders, protection of the public from dangerous criminals, and rehabilitation to reduce reoffending. Courts consider all four objectives. Judges have discretion within statutory limits to find the appropriate balance for each case and offender."},

function startTimer(){
  clearInterval(timerInterval);timeLeft=maxTime;
  document.getElementById('time').textContent=timeLeft;
  var bar=document.getElementById('timerBar');bar.style.width='100%';bar.style.background='#00ff00';
  var yellowAt=Math.floor(maxTime*0.5);
  var redAt=Math.floor(maxTime*0.25);
  var _yellowed=false,_redded=false;

  function timerSpeak(text,pitch,rate){
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang='en-GB';u.pitch=pitch||1.05;u.rate=rate||0.95;u.volume=1.0;
    function pickV(){
      var vs=window.speechSynthesis.getVoices();
      return vs.find(function(v){return v.lang.startsWith('en-GB')&&v.name.toLowerCase().includes('female');})||
             vs.find(function(v){return v.lang.startsWith('en-GB');})||
             vs.find(function(v){return v.lang.startsWith('en');});
    }
    var v=pickV();if(v)u.voice=v;
    speechSynthesis.speak(u);
  }

  timerInterval=setInterval(function(){
    timeLeft--;document.getElementById('time').textContent=timeLeft;
    var pct=timeLeft/maxTime*100;bar.style.width=pct+'%';bar.style.background=pct>50?'#00ff00':pct>25?'#ffd700':'#ff4444';

    var firstName=(localStorage.getItem('cadetName')||'Cadet').split(' ')[0];

    if(!_yellowed&&timeLeft<=yellowAt&&timeLeft>redAt){
      _yellowed=true;
      var msgs=['Keep going, '+firstName+'! You are halfway through your time.',
                firstName+', stay focused! You still have time — think carefully.',
                'You can do it, '+firstName+'! Choose your answer soon.'];
      timerSpeak(msgs[Math.floor(Math.random()*msgs.length)],1.1,0.95);
    }
    if(!_redded&&timeLeft<=redAt&&timeLeft>10){
      _redded=true;
      var rmsgs=[firstName+'! Time is running out — answer now!',
                 'Hurry, '+firstName+'! Only seconds left — pick your answer!',
                 firstName+', quick! Running out of time!'];
      timerSpeak(rmsgs[Math.floor(Math.random()*rmsgs.length)],1.2,1.1);
    }
    if(timeLeft<=10&&timeLeft>0){
      var AC=window.AudioContext||window.webkitAudioContext;

        var ctx=new AC(),o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='square';o.frequency.value=400+(10-timeLeft)*80;
        g.gain.setValueAtTime(0.35,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
        o.start(ctx.currentTime);o.stop(ctx.currentTime+0.15);
      }catch(e){}}
      if(timeLeft===10) timerSpeak(firstName+'! Ten seconds! Answer now!',1.3,1.2);
      else if(timeLeft===5) timerSpeak('Five! '+firstName+' — now!',1.4,1.3);
      else if(timeLeft===3) timerSpeak('Three!',1.5,1.4);
      else if(timeLeft===2) timerSpeak('Two!',1.5,1.5);
      else if(timeLeft===1) timerSpeak('One!',1.5,1.5);
    }
    if(timeLeft<=0){clearInterval(timerInterval);timeExpired();}
  },1000);
}
function speakFeedbackThenAdvance(msg,pitch){
  var PAUSE_AFTER=3500,FALLBACK=90000;
  function doAdvance(){current++;showQuestion();}
  if(!window.speechSynthesis){setTimeout(doAdvance,PAUSE_AFTER);return;}
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(msg);u.lang='en-GB';u.pitch=pitch||1.05;u.rate=0.88;u.volume=1.0;
  function pickVoice(){
    var vs=window.speechSynthesis.getVoices();
    return vs.find(function(x){return x.lang.startsWith('en-GB')&&x.name.toLowerCase().includes('female');})
        ||vs.find(function(x){return x.lang.startsWith('en-GB');})
        ||vs.find(function(x){return x.lang.startsWith('en-US');})
        ||vs.find(function(x){return x.lang.startsWith('en');})
        ||vs[0]||null;
  }
  var advanced=false,fallbackTimer=null;
  function advance(){if(advanced)return;advanced=true;if(fallbackTimer)clearTimeout(fallbackTimer);setTimeout(doAdvance,PAUSE_AFTER);}
  u.onend=advance;u.onerror=advance;
  fallbackTimer=setTimeout(advance,FALLBACK);
  var vs=window.speechSynthesis.getVoices();
  if(vs.length>0){
    var v=pickVoice();if(v)u.voice=v;
    try{speechSynthesis.speak(u);}catch(e){advance();}
  } else {
    window.speechSynthesis.onvoiceschanged=function(){
      window.speechSynthesis.onvoiceschanged=null;
      var v2=pickVoice();if(v2)u.voice=v2;
      try{speechSynthesis.speak(u);}catch(e){advance();}
    };
  }
}
function timeExpired(){
  var q=QUESTIONS_ACTIVE[current];
  if(!q) return;
  var btns=document.getElementById('answers').querySelectorAll('button');btns.forEach(function(b){b.disabled=true;});

function checkAnswer(sel,btn){

  var btns=document.getElementById('answers').querySelectorAll('button');btns.forEach(function(b){b.disabled=true;});

    var _clap=document.getElementById('sndClapAudio');if(_clap){_clap.currentTime=0;_clap.play().catch(function(){});}
    var PRAISE=['Excellent!','Outstanding!','Brilliant!','Well done!','Correct!','Perfect!','Amazing!'];
    window._praiseIdx=(window._praiseIdx||0);var praise=PRAISE[window._praiseIdx%PRAISE.length];window._praiseIdx++;
    showExplanation();
    speakFeedbackThenAdvance(praise+' The correct answer is option '+labels[nc]+'.'+ex,1.15);
  }else{
    btn.classList.add('wrong');btns[nc].classList.add('correct');if(window.sndWrong)sndWrong();
    var _ooh=document.getElementById('sndOohnewAudio');if(_ooh){_ooh.currentTime=0;_ooh.play().catch(function(){});}
    showExplanation();
    speakFeedbackThenAdvance('That is not correct. You chose option '+labels[sel]+'. The correct answer is option '+labels[nc]+'.'+ex,0.95);
  }
}
function showExplanation(){var q=QUESTIONS_ACTIVE[current];if(q && q.explain){var el=document.getElementById('explanation');el.textContent='💡 '+q.explain;el.style.display='block';}}
function showResult(){

    '<p style="font-size:18px;margin:6px 0 4px;">'+pct+'%</p>'+
    '<p style="opacity:.7;font-size:14px;margin-bottom:6px;">'+msg+'</p>'+
    '<p style="font-size:13px;opacity:.6;margin-bottom:20px;">🔓 NADMO quiz is now unlocked!</p>'+
    '<button onclick="CMG_GUARD.complete(\'prisons\','+score+')" style="padding:14px 32px;background:linear-gradient(45deg,#FFD700,#e6a800);color:#000;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;box-shadow:0 4px 18px rgba(255,215,0,0.4);width:100%;margin-bottom:10px;">🏠 Back to Quiz Menu</button>'+
    '<button onclick="window.location.href=\'nadmo_quiz.html\'" style="padding:12px 32px;background:rgba(255,255,255,0.1);color:#fff;border:2px solid rgba(255,255,255,0.3);border-radius:12px;font-size:14px;font-weight:bold;cursor:pointer;width:100%;">⏭ Go Directly to Next Quiz</button>';
